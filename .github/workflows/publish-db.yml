################################################################################
#
# publish-db.yml — regenerate + publish db.json on GitHub Pages (TASKS.md
# P4.5, PLAN.md §10, docs/downloader-contract.md P0.6,
# docs/db-json-versioning.md, ADR 0018). The ONLY thing that produces and
# publishes this document; malformed output can crash or silently break the
# whole fleet's update path (docs/downloader-contract.md §1, §10).
# See docs/ci.md#publish-db-overview.
#
# TRIGGER: `release: types: [published]` (a draft release never fires this —
# see docs/ci.md#release-draft-gate) + manual `workflow_dispatch` (see the
# `tag` input's own description below for why it's required). Either path
# must be a PUBLISHED release — enforced in code by the "Guard against a
# draft release" step, not just implied by which trigger fired.
#
# STABLE URL: always deploys to the SAME GitHub Pages site and OVERWRITES the
# prior deploy — required so users configure `db_url` ONCE and every future
# release is simply available at it (TASKS.md P4.5's "Done when"). See
# docs/ci.md#stable-pages-url.
#
# One-time manual prereq this workflow cannot do for itself: enable
# Settings → Pages → Build and deployment → Source: GitHub Actions on this
# repo once, before the first run can deploy. See docs/ci.md#pages-prereq.
#
# VERSIONING (ADR 0018): db.json's `linux.version` must equal the shipped
# image's `/MiSTer.version` byte-for-byte (docs/downloader-contract.md §3) —
# get it wrong in either direction and devices never update, or re-flash on
# every Downloader run, forever. Never derive it from SOURCE_DATE_EPOCH or
# `publishedAt`. See docs/ci.md#mister-version-coupling.
#
################################################################################

name: Publish db.json

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Release tag to (re)publish db.json for, e.g. v2026.07.13-1. Must
          already be a PUBLISHED (non-draft) release. Required for a manual
          run — deliberately no "latest release" default, so this can never
          silently republish the wrong thing.
        required: true
        type: string

# One publish (and therefore one Pages deployment) in flight at a time; never
# cancel mid-deploy — an older run finishing last could overwrite a newer
# publish. See docs/ci.md#concurrency-single-pages-target.
concurrency:
  group: publish-db-pages
  cancel-in-progress: false

# Least privilege; the job below elevates only what deploying to Pages
# requires. See docs/ci.md#least-privilege-permissions.
permissions:
  contents: read

jobs:
  publish:
    name: Regenerate + publish db.json
    runs-on: ubuntu-26.04
    timeout-minutes: 15

    # OIDC-based Pages deploy (`pages`/`id-token`), same mechanism as
    # release.yml's attest-build-provenance; contents:read only — never
    # touches the release itself. See docs/ci.md#least-privilege-permissions.
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      DB_ID: mister_linux_modernization

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$EVENT_TAG"
          else
            tag="$INPUT_TAG"
          fi
          if [ -z "$tag" ]; then
            echo "::error::could not resolve a release tag (workflow_dispatch requires the 'tag' input)" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Look up release metadata (gh release view)
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          gh release view "$TAG" -R "$REPO" --json isDraft,publishedAt,assets > release.json
          cat release.json

      # Enforced in code, not just implied by which trigger fired —
      # workflow_dispatch could point at a still-draft tag. See
      # docs/ci.md#release-draft-gate.
      - name: Guard against a draft release
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -eu
          is_draft=$(python3 -c "import json; print(json.load(open('release.json'))['isDraft'])")
          if [ "$is_draft" = "True" ]; then
            echo "::error::release $TAG is still a DRAFT -- publish-db.yml must only run against a PUBLISHED release (see this file's header comment on the draft/published coupling with release.yml, P4.4)" >&2
            exit 1
          fi
          echo "Confirmed: $TAG is a published (non-draft) release."

      # Fail loudly on zero or multiple release_*.7z matches, not silently —
      # the ADR 0018 version rule this enforces lives in
      # scripts/resolve-release-asset.sh's header. See docs/ci.md#release-asset-contract.
      - name: Locate the release_*.7z asset
        id: asset
        run: scripts/resolve-release-asset.sh release.json

      # linux.hash/linux.size must come from the ACTUAL uploaded release
      # asset, not a pre-upload copy (this job has none anyway — it runs in
      # a separate workflow invocation from release.yml). See
      # docs/ci.md#asset-hash-from-live-download.
      - name: Download the release_*.7z asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          gh release download "$TAG" -R "$REPO" -p 'release_*.7z' -O release.7z --clobber

      - name: Verify downloaded size against GitHub's reported asset size
        env:
          EXPECTED_SIZE: ${{ steps.asset.outputs.size }}
        run: |
          set -eu
          actual_size=$(stat -c %s release.7z)
          if [ "$actual_size" != "$EXPECTED_SIZE" ]; then
            echo "::error::downloaded release.7z is $actual_size bytes, GitHub reported $EXPECTED_SIZE -- possible truncated/corrupted download" >&2
            exit 1
          fi
          echo "Downloaded release.7z size confirmed: $actual_size bytes."

      # scripts/gen-db-json.py (P4.5) computes linux.hash/linux.size/version
      # and runs its own schema self-check before writing anything. See
      # docs/ci.md#mister-version-coupling.
      - name: Generate db.json
        env:
          ASSET_URL: ${{ steps.asset.outputs.url }}
          ARCHIVE_VERSION: ${{ steps.asset.outputs.archive_version }}
        run: |
          set -eu
          python3 scripts/gen-db-json.py \
            --db-id "$DB_ID" \
            --url "$ASSET_URL" \
            --version "$ARCHIVE_VERSION" \
            --asset-file release.7z \
            --out db.json
          cat db.json

      # Independent 2nd gate on the file about to be uploaded — do not rely
      # solely on gen-db-json.py's own internal check (TASKS.md P4.5
      # mandate). See docs/ci.md#schema-self-check-independent-gate.
      - name: Schema self-check (vendored Downloader DbEntity contract)
        run: |
          set -eu
          python3 -m json.tool db.json > /dev/null
          python3 scripts/check-db-json-schema.py db.json --section "$DB_ID" --require-linux

      - name: Prepare Pages site directory
        run: |
          set -eu
          mkdir -p _site
          cp db.json _site/db.json
          cat > _site/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head><meta charset="utf-8"><title>${{ github.repository }} — db.json</title></head>
          <body>
          <p>This is the Downloader database for <a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a>.</p>
          <p>Add it to your MiSTer as a drop-in database (no edits to your existing
          <code>downloader.ini</code>) — create
          <code>/media/fat/downloader_mister_linux_modernization.ini</code> containing:</p>
          <pre>[${{ env.DB_ID }}]
          db_url = https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/db.json</pre>
          <p>See <code>docs/downloader-contract.md</code> and <code>docs/db-json-versioning.md</code>
          in the repository for the full contract this file is generated against.</p>
          <p>Current published <code>linux</code> entry:</p>
          <pre>$(cat db.json)</pre>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Summary
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          cat <<EOF
          ::notice::Published db.json for release $TAG to $PAGE_URL
          Onboarding line for users (docs/downloader-contract.md §9.5/§11.3):
            db_url = ${PAGE_URL}db.json
          EOF
