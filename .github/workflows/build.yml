################################################################################
#
# build.yml — CI build workflow (TASKS.md P4.1, PLAN.md §9 "Build").
#
# Builds the full MiSTer image (two-stage: initramfs, then the main rootfs +
# kernel + linux.img) exactly the way a developer would locally — by calling
# this repo's own wrapper Makefile targets (`make initramfs`, `make all`) —
# then runs the non-hardware parity suite (scripts/ci-tests.sh, P3.12) and the
# ABI/SONAME checker (P2.2) against the result, and uploads the two shipped
# image artifacts.
#
# WHY CACHING IS THE HEART OF THIS FILE: a cold Buildroot build (fresh
# toolchain, fresh package sources, fresh object files) is 30-60 minutes
# (TASKS.md P4.1). Four independent `actions/cache` entries below exist so a
# warm run only has to recompile what actually changed — see the "Caching"
# section further down for the size/eviction story.
#
# CAVEATS (cannot be resolved from this authoring pass — see the authoring
# agent's final report for the full list):
#   * scripts/check-abi.sh (P2.2) does not exist yet as of this writing (P2.2
#     is still an open task) — the ABI-checker step below runs it only if
#     present, and emits a ::notice:: otherwise. ci-tests.sh's own "ABI /
#     stock-binary smoke" section already covers the same P2.2/P2.8 core
#     assertions as a lightweight interim (see that script's header).
#   * This workflow has never actually been run — a clean-cache AND a
#     warm-cache CI run are both still needed to confirm the "warm run <
#     60 min, target: minutes" budget from TASKS.md's P4.1 "Done when".
#
################################################################################

name: Build

on:
  push:
  pull_request:

# Cancel a superseded run for the same ref (e.g. a new push to an open PR)
# rather than burning CI minutes finishing a build nobody wants anymore.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo and uploads artifacts,
# both covered by the default `contents: read` — no token write scope needed.
permissions:
  contents: read

jobs:
  build:
    name: Build image (two-stage Buildroot)
    runs-on: ubuntu-latest

    # --- NO `container:` -- deliberate, and load-bearing ---------------------
    # We originally ran in a digest-pinned ubuntu:26.04 container (P4.1 asked for
    # a pinned image). It had to go. A standard GitHub-hosted runner has only
    # ~14 GB of free workspace disk, and a full Buildroot build needs far more
    # (output/build alone is ~20 GB): run 29295920820 died 1h37m in with "No
    # space left on device" while compiling host-gcc. The ~30 GB of preinstalled
    # runner software (Android SDK, .NET, Haskell, CodeQL, docker images) is what
    # we must reclaim to fit -- and that software lives on the HOST, which is
    # unreachable from inside a container job. Hence: no container, plus the
    # disk-reclaim step below.
    #
    # Reproducibility is NOT weakened by dropping it. Buildroot bootstraps its
    # OWN host toolchain (host-gcc) from pinned sources and builds every target
    # artifact with that, while BR2_REPRODUCIBLE + SOURCE_DATE_EPOCH pin the
    # rest -- the host distro does not leak into the target output. The pinning
    # that actually matters (Buildroot version+hash, kernel version+hash, every
    # package commit+hash) is in-tree and Renovate-managed.
    #
    # Bonus: on the host we build as the unprivileged `runner` user, which is how
    # Buildroot wants to be built -- so the FORCE_UNSAFE_CONFIGURE root-bypass
    # the container forced on us (run 29291137834) is no longer needed at all.

    # --- No explicit timeout-minutes (deliberate, for now) ------------------
    # The real cold-build duration on GitHub's 2-core runners is unknown, and
    # guessed step/job timeouts were killing legitimately-long cold builds
    # before they could finish OR seed the caches. Left OFF so the first full
    # run reveals the true duration; GitHub's 6-hour job default is the backstop.
    # Set informed per-step/job timeout-minutes here once we have a real
    # cold + warm number.

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      # MUST be first, and is not optional: a full Buildroot build does not fit
      # in a stock runner's free space (run 29295920820: ENOSPC in host-gcc).
      # Reclaim the ~30 GB of preinstalled toolchains we never use. Plain `rm`
      # rather than a third-party action, to avoid another supply-chain
      # dependency. `df` before/after so a future disk regression is visible in
      # the log rather than surfacing as a mysterious compiler error.
      - name: Free disk space on the runner
        run: |
          echo "--- disk before ---"; df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/local/share/boost \
            /usr/local/graalvm || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          sudo apt-get clean || true
          echo "--- disk after ---"; df -h /

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # BUILDROOT_VERSION lives in the Makefile (P4.6 will point Renovate's
      # custom regex manager at that same line), not in this workflow, so it
      # cannot drift out of sync with what `make` actually fetches. Every
      # cache key below keys off this one extracted value.
      - name: Read Buildroot version pin from Makefile
        run: |
          set -eu
          ver=$(sed -n 's/^BUILDROOT_VERSION ?= //p' Makefile | head -1)
          if [ -z "$ver" ]; then
            echo "::error::could not extract BUILDROOT_VERSION from Makefile (format changed?)" >&2
            exit 1
          fi
          echo "BUILDROOT_VERSION=$ver" >> "$GITHUB_ENV"
          echo "Resolved BUILDROOT_VERSION=$ver"

      ##########################################################################
      # Caching -- FOUR entries (TASKS.md P4.1, non-optional). Mind the 10 GB
      # per-repo GitHub Actions cache ceiling: GitHub evicts least-recently-used
      # cache entries automatically once the repo's total crosses it, so these
      # four are sized to comfortably coexist:
      #   1. Buildroot tarball  -- ~20-30 MB, changes only on a BUILDROOT_VERSION
      #      bump (rare). Kept SEPARATE from #2 (below) specifically so a mere
      #      defconfig change (common) can never evict this tiny, cheap entry --
      #      it is redundant with the tarball also living inside #2, on purpose.
      #   2. dl/ (all package source tarballs) -- the biggest of the four,
      #      likely several hundred MB to low GB for this project's full
      #      package set (P2.1). The one most likely to approach the ceiling.
      #   3. output/host (+ build stamps) -- the cross-toolchain; typically
      #      1-3 GB compressed. THE big win: this is what skips rebuilding
      #      gcc/binutils/glibc for the target from scratch.
      #   4. ccache -- capped explicitly (max-size below) so it can never grow
      #      unbounded across many merges.
      # If the four together approach 10 GB in practice: lower ccache's
      # max-size first (cheapest to shrink, least impact on warm-build time),
      # then consider an external mirror for dl/ (e.g. a self-hosted or S3
      # package-source cache) rather than losing the toolchain cache (#3),
      # which is the one most worth keeping.
      ##########################################################################

      # 1. Buildroot release tarball -- key on BUILDROOT_VERSION alone.
      - name: Cache Buildroot release tarball
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dl/buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
          key: buildroot-tarball-${{ env.BUILDROOT_VERSION }}

      # 2. dl/ download cache -- key on BUILDROOT_VERSION + the main
      # defconfig's contents (a package added/removed there needs new source
      # tarballs); restore-keys falls back to just BUILDROOT_VERSION so an
      # imperfect match still hydrates everything that HASN'T changed instead
      # of re-downloading the whole package set. dl/ lives at the repo root
      # (survives `make clean`) -- never move it under output/, which does not.
      - name: Cache Buildroot dl/ download cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: dl/
          key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_de10nano_defconfig') }}
          restore-keys: |
            br-dl-${{ env.BUILDROOT_VERSION }}-

      # 3. Buildroot host toolchain -- output/host (the built cross-toolchain
      # and other host-side tools) plus the per-package build stamps under
      # output/build/host-*/ that tell Buildroot's own incremental make those
      # host packages are already built (without the stamps, restoring
      # output/host alone would not stop Buildroot from trying to rebuild
      # into it). Busts on a defconfig, kernel-config, OR kernel-patch change,
      # since any of those can change what the toolchain/host tools need to
      # produce. NOTE: this covers the MAIN build's toolchain (output/host).
      # The initramfs stage's SEPARATE musl cross-toolchain (output-initramfs/
      # host) is cached separately below (cache 5). It was originally left
      # uncached (P4.1), but a cold build of that toolchain overran the Stage 1
      # step timeout, so it is now cached like the main one.
      - name: Cache Buildroot host toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            output/host
            output/build/host-*
          key: br-host-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_de10nano_defconfig', 'board/mister/de10nano/linux.config', 'board/mister/de10nano/linux-patches/**') }}

      # 5. Initramfs-stage host toolchain -- output-initramfs/host + its host
      # build stamps. `make initramfs` builds its own small musl cross-toolchain;
      # caching it turns a ~10-15 min cold Stage 1 into a couple of minutes warm.
      # Busts only on an initramfs-defconfig change.
      - name: Cache initramfs host toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            output-initramfs/host
            output-initramfs/build/host-*
          key: br-initramfs-host-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_initramfs_defconfig') }}

      # 4. ccache. CCACHE_DIR is exported here (matching the BR2_CCACHE_DIR
      # passed to `make` below) so hendrikmuhs/ccache-action caches the exact
      # directory Buildroot's compiler wrapper actually writes to.
      # BR2_CCACHE_USE_BASEDIR (passed to `make`, not here) rewrites absolute
      # paths in cached objects so this cache is relocatable across runners --
      # without it, a ccache hit here would mostly miss anyway.
      - name: Configure ccache directory
        run: echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"

      - name: Cache ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ccache-${{ env.BUILDROOT_VERSION }}
          # 4G: holds the kernel (~1.1 GB raw .o locally) + the full package set's
          # compiler outputs (zstd-compressed ~2x) with headroom, now that ccache
          # covers BOTH the musl and glibc builds. The cross-toolchains themselves
          # are covered by the separate host-toolchain caches, so ccache need not
          # hold them. Refine once a full green build reports the real .ccache size;
          # trim this first if the four caches approach the 10 GB repo ceiling.
          max-size: 4G
          # The ubuntu:26.04 container starts with an EMPTY apt index. The
          # "Install build dependencies" step below is what runs `apt-get
          # update`, but it runs AFTER this step -- so without this flag the
          # action's own `apt-get install ccache` fails ("Unable to locate
          # package ccache"). Have the action refresh the index itself first.
          update-package-index: true

      # --- Host build dependencies -------------------------------------------
      # ubuntu:26.04 is a minimal base; none of this is preinstalled. List is
      # Buildroot's own documented mandatory set (which, sed, make, binutils,
      # build-essential, diffutils, bash, patch, gzip, bzip2, perl, tar, cpio,
      # unzip, rsync, file, bc, findutils, wget) plus project-specific extras:
      # git (several packages -- xone, munt, midilink, the morrownr Realtek
      # forks -- are fetched via pinned git commits, see package/*/*.mk),
      # bison/flex/gawk (kernel Kbuild's own documented minimum requirements),
      # ca-certificates (without it, curl/wget TLS verification to
      # buildroot.org and every HTTPS package mirror fails outright),
      # python3 (scripts/abi/needed-symbols.py, misc Buildroot infra),
      # libssl-dev/libncurses-dev/pkg-config/texinfo (commonly probed by
      # third-party package configure scripts even when cross-compiling),
      # qemu-user (ci-tests.sh's qemu-arm-based checks), e2fsprogs (dumpe2fs
      # fallback for check-size-budget.sh / check-linux-img.sh if Buildroot's
      # own host/sbin/dumpe2fs is for any reason not where they expect it).
      - name: Install build dependencies
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bash bc bison flex gawk \
            git patch gzip bzip2 xz-utils cpio unzip rsync \
            file wget curl ca-certificates perl \
            python3 python3-dev \
            libssl-dev libncurses-dev pkg-config texinfo \
            qemu-user e2fsprogs
          sudo rm -rf /var/lib/apt/lists/*

      # Fails fast and loud if this container image's `install` is ever not
      # GNU coreutils (see the Makefile's own `hostshim` target/comment) --
      # cheap to check explicitly before spending build time.
      - name: Verify host `install` is GNU coreutils
        run: make hostshim

      ##########################################################################
      # Single-command build. `make all`'s recipe is `all: initramfs ...`, so
      # ONE invocation builds BOTH the static-musl initramfs (stage 1) and the
      # main glibc rootfs + kernel + linux.img (stage 2) -- no need for two
      # explicit steps now that per-step timeouts are gone. BR2_CCACHE passed
      # here propagates through MAKEFLAGS to BOTH sub-builds, so the musl
      # initramfs toolchain gets ccache too: on the 2-core runner a cold cross-
      # toolchain build is ~30 min PER stage, so every cached object matters
      # (measured: run 29291137834 spent ~30 min in stage 1 alone). The one-time
      # host-ccache build cost is captured by the toolchain caches above. musl
      # and glibc objects have distinct ccache keys, so they coexist.
      ##########################################################################
      # Buildroot needs output/.config to exist before `make all`. On a fresh
      # checkout it does NOT (only the tracked defconfig does), and the main
      # build dies immediately with "Please configure Buildroot first" -- run
      # 29293209070 failed exactly there, *after* a 52-minute stage 1. (The
      # initramfs stage doesn't hit this: its Makefile rule generates its own
      # .config from configs/mister_initramfs_defconfig.)
      # Regenerate it from the tracked defconfig on EVERY run: that file is the
      # reproducible source of truth, and doing it unconditionally also stops a
      # stale cached output/.config from silently overriding a defconfig change.
      - name: Configure Buildroot (generate output/.config from the defconfig)
        run: make mister_de10nano_defconfig

      - name: Build image (make all -- initramfs + main rootfs, ccache both)
        run: |
          make all \
            BR2_CCACHE=y \
            BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
            BR2_CCACHE_USE_BASEDIR=y

      # --- SBOM / legal-info generation (P4.2) --------------------------------
      # Generate Software Bill of Materials (SBOM) via Buildroot's legal-info
      # target. Reuses the same cached toolchain from the main build above.
      - name: Generate legal-info (SBOM)
        run: |
          make legal-info \
            BR2_CCACHE=y \
            BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
            BR2_CCACHE_USE_BASEDIR=y

      # --- Non-hardware parity suite (P3.12) ---------------------------------
      # CI_TESTS_SKIP_QEMU_SYSTEM=1: skips scripts/test-initramfs.sh, the one
      # sub-check that boots a QEMU *system* kernel six times and can itself
      # take several minutes (see ci-tests.sh's own header) -- left off here
      # to protect the timeout budget above. Flip to unset/0 to run the full
      # suite (e.g. in a manually-triggered or nightly run) at the cost of
      # several extra minutes.
      - name: Run parity test suite (scripts/ci-tests.sh, P3.12)
        env:
          CI_TESTS_SKIP_QEMU_SYSTEM: "1"
        run: scripts/ci-tests.sh

      # --- ABI / SONAME parity checker (P2.2) --------------------------------
      # scripts/check-abi.sh does not exist yet as of this writing -- P2.2 is
      # still an open TASKS.md item. Run it if/when it lands (no workflow
      # change needed then); until it does, note that ci-tests.sh's own "ABI /
      # stock-binary smoke" section already runs the same two headline P2.2/
      # P2.8 checks (dynamic-link resolution + FPGA-access whitelist) as a
      # documented lightweight interim -- see that script's header comment.
      - name: ABI / SONAME parity checker (P2.2)
        run: |
          if [ -x scripts/check-abi.sh ]; then
            scripts/check-abi.sh output
          else
            echo "::notice title=P2.2 not yet implemented::scripts/check-abi.sh does not exist yet (TASKS.md P2.2 is still open). ci-tests.sh's 'ABI / stock-binary smoke' section already covers the equivalent P2.2/P2.8 core checks as an interim -- see scripts/ci-tests.sh's header comment. This step will pick up scripts/check-abi.sh automatically once P2.2 lands."
          fi

      - name: Report disk & cache usage
        if: always()
        run: |
          echo "--- disk free ---"; df -h .
          echo "--- dl/ ---"; du -sh dl 2>/dev/null || true
          echo "--- output/host ---"; du -sh output/host 2>/dev/null || true
          echo "--- output (total) ---"; du -sh output 2>/dev/null || true
          echo "--- ccache ---"; du -sh "$GITHUB_WORKSPACE/.ccache" 2>/dev/null || true

      # --- Upload build artifacts, on every push -----------------------------
      # (Not on pull_request runs, to avoid doubling artifact storage for
      # every PR revision on top of its eventual push to the target branch --
      # revisit if PR-visible artifacts turn out to be wanted too.)
      - name: Upload build artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mister-images-${{ github.sha }}
          path: |
            output/images/linux.img
            output/images/zImage_dtb
          if-no-files-found: error
          retention-days: 14

      # --- Upload SBOM / legal-info artifact (P4.2) ---------------------------
      # Package Buildroot's legal-info output (SBOM manifest, licenses, sources)
      # into a tarball and upload as a build artifact, on every push (same
      # retention policy as the main image artifacts).
      - name: Package legal-info for upload
        if: github.event_name == 'push'
        run: |
          cd output
          tar -czf legal-info.tar.gz legal-info/
          cd ..
          mv output/legal-info.tar.gz .

      - name: Upload SBOM artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: legal-info-${{ github.sha }}
          path: legal-info.tar.gz
          if-no-files-found: error
          retention-days: 14
