# fork-sync.conf — how far we have reconciled MiSTer-devel/Linux-Kernel_MiSTer.
#
# WHY THIS FILE EXISTS
# --------------------
# This repo is the source of truth for the MiSTer kernel: the patch series in
# board/mister/de10nano/linux-patches/ is what gets built, and scripts/export-kernel-tree.sh
# renders it into the fork's tree format. But the fork is a live repo that other people
# commit to. Anything landing there after our last reconciliation is, by definition,
# something this repo does not have and nobody has decided about.
#
# Left to humans that decision never gets made -- not through neglect, but because there
# is no moment that forces the question. The fork sat on 5.15.1 for 210 stable releases
# for exactly this reason: nothing ever said "these N commits are unaccounted for".
#
# So this file records the last commit on each fork branch whose content has a disposition
# in docs/patch-provenance.md, and scripts/check-fork-sync.sh diffs it against the fork's
# live HEADs. .github/workflows/fork-sync.yml runs that weekly and opens an issue when the
# answer is non-empty. The queue is then a fact rather than a memory.
#
# FORMAT
#   <branch>  <full-40-char-sha>
# Comments and blank lines ignored. Full SHAs only -- an abbreviation that is unambiguous
# today can collide later, and this is compared, not just displayed.
#
# UPDATING
# Move a line ONLY when the commits it skips past have been dispositioned in
# docs/patch-provenance.md -- carried into the series, or recorded as deliberately dropped
# with a reason. Advancing it to silence the issue is the one thing that breaks this: the
# file stops meaning "reconciled" and starts meaning "seen", which is what it exists to
# prevent.
#
# WHY BOTH BRANCHES
#   MiSTer-v5.15 -- the fork's historical line and the baseline the whole reconciliation
#     was performed against (docs/patch-provenance.md's header names f0fb626ac; this is
#     now ahead of that, see below). Still actively committed to.
#   MiSTer-v6.18 -- upstream's own vanilla 6.18.38 base, created 2026-07-16, which our
#     export now replays onto (MiSTer-devel/Linux-Kernel_MiSTer#75). Once that merges,
#     commits landing here are changes made to OUR series by other people, and they have
#     to flow back into linux-patches/ or the next regeneration silently erases them.
#     This is the direction that matters most for keeping this repo the source of truth.

# Reconciled: docs/patch-provenance.md dispositioned every commit up to f0fb626ac.
# Advanced to 794e6f002 on 2026-07-16: the single commit since (794e6f002, "New driver for
# RTL8821CU") is dispositioned -- that chip is covered by mainline rtw88_8821cu
# (CONFIG_RTW88_8821CU=m), which is why BR2_PACKAGE_RTL8821CU_MORROWNR is deliberately off
# in configs/mister_de10nano_defconfig. Nothing to carry.
MiSTer-v5.15  794e6f002d0f655c504733c126a01f8c1f0bc1d4

# Upstream's pristine v6.18.38 base commit, and the parent our export replays onto.
# Nothing of ours or theirs sits on top of it upstream yet.
MiSTer-v6.18  d9ac12a691ead295c8bc6438754767b94c0f26a2
