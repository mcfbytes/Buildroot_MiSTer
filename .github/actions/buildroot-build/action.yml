################################################################################
#
# buildroot-build — the one and only recipe for building this image in CI.
#
# WHY THIS EXISTS: build.yml, release.yml and reproducibility.yml each had their
# own copy-pasted version of the steps below. build.yml then took five failed
# runs to get right (ENOSPC, missing defconfig, root-configure, busted toolchain
# caches) — and NONE of those fixes reached the other two, which would each have
# failed the same way the first time anyone pushed a tag. That is the whole case
# for this file: the recipe is subtle, hard-won, and must exist exactly once.
#
# The caller owns what is genuinely its own (which ref to check out, what to do
# with the images afterwards). Everything from "make the runner able to build"
# through "the variant's images exist in output/images/ (main) or
# output-<name>/images/" is here.
#
# Measured on the first green cold run (29300460591, 4-vCPU ubuntu-latest):
#   * wall time      3h19m47s cold
#   * output/        24 GB   <-- the reason the container had to go
#   * dl/            2.7 GB
#   * ccache         1.1 GB of a 4 GB cap (28%, no evictions)
#   * disk at end    8.4 GB free of 72 GB
#
# ccache IS working; do not go looking for the "missing" cache. Warm run
# 29529993571 reported 34945 hits / 34967 cacheable calls — 99.94%, 22 misses —
# at 0.8 GB of the 4 GB cap. The three sizes you will see are all the same data:
# ~0.8 GB of real payload, 664 MiB as the zstd cache entry (ccache 4.x already
# compresses its objects, so the tarball barely shrinks), and the 1.1 GB above,
# which is `du` rounding ~35k small objects up to 4 KB blocks. The ceiling here
# is the NUMBER of distinct compilations, not the length of the build: ~35k
# objects at ~23 KB each is ~0.8 GB and that is the whole population. Nor is the
# cap the constraint — at 21% it has never evicted.
#
# Warm runs are also SMALLER than cold ones on purpose: cache #3 restores
# output/host WITH its stamps, so host gcc/binutils/glibc never invoke a compiler
# at all and never reach ccache. The two caches are substitutes. A small ccache
# next to a healthy br-host hit is the system working, not a leak.
#
# VARIANTS: the `variant` input selects which build this recipe runs. "main"
# (the default) is the two-stage 6.18 image, byte-identical behavior — and
# byte-identical cache KEY STRINGS — to before the input existed, so existing
# callers (reproducibility.yml passes no inputs) and existing cache entries are
# unaffected. ANY other name is a KERNEL-ONLY variant (ADR 0021 as amended
# 2026-07-18): it must have a fragment at configs/mister_<name>.fragment, and
# everything else — the make targets (`make <name>`, `<name>-legal-info`,
# `<name>-external-deps`), the output dir (output-<name>/), the cache key
# namespaces (br-dl-<name>-*, br-<name>-host-*) — is derived from the name, so
# adding a kernel variant to CI is one fragment + the Makefile targets + a
# workflow matrix entry, with NO change here. A kernel variant builds
# configs/mister_kernel_defconfig + its fragment: zImage_dtb plus a depmod'd
# module tree in output-<name>/, sharing dl/ and ccache with main but its own
# host-toolchain cache (a cross-toolchain bakes its absolute O= path in, so
# output/host and output-<name>/host can never share a cache entry). There is
# no configure step for variants (`make <name>` generates output-<name>/.config
# itself and it is never cached, so it can never be stale), but the initramfs
# stage DOES run: every kernel embeds the stage-1 cpio (external.mk's fixup
# applies to any BR2_LINUX_KERNEL=y build; a zImage without it cannot boot).
#
# What the CALLER does with a variant's outputs — staging the module tree into
# work/extra-modules-overlay/ for the main build, shipping zImage_dtb-<name> —
# is the caller's business (see build.yml/release.yml); this recipe ends at
# "output-<name>/images/zImage_dtb and a depmod'd output-<name>/target exist".
#
################################################################################

name: Build the MiSTer image (Buildroot)
description: >-
  Prepares a GitHub-hosted runner for a Buildroot build (disk reclaim, apt
  deps, five input caches), then builds the requested variant. main: configures
  from the tracked defconfig and runs `make all` — linux.img + zImage_dtb in
  output/images/. Any other name is a kernel-only variant (`make <name>` over
  configs/mister_kernel_defconfig + configs/mister_<name>.fragment) — the
  variant kernel at output-<name>/images/zImage_dtb plus a depmod'd module
  tree in output-<name>/target/.

inputs:
  extra-apt-packages:
    description: >-
      Space-separated apt packages to install on top of the mandatory build set
      (release.yml adds p7zip-full to assemble release_YYYYMMDD.7z).
    required: false
    default: ""
  ccache-max-size:
    description: >-
      Cap for the ccache cache. Default 4G: the real cold build fills 1.1 GB, so
      this has ~4x headroom and has never evicted. Lower this FIRST if the repo's
      caches approach GitHub's 10 GB ceiling — it is the cheapest one to shrink.
    required: false
    default: "4G"
  run-legal-info:
    description: >-
      Also run `make legal-info` (`make <name>-legal-info` for a kernel
      variant) — the SBOM — after the build. "true"/"false".
    required: false
    default: "false"
  variant:
    description: >-
      Which build to run: "main" (default — the two-stage 6.18 image; behavior
      and cache key strings identical to before this input existed) or the
      name of a kernel-only variant whose fragment exists at
      configs/mister_<name>.fragment (e.g. "rt", the PREEMPT_RT / Linux-7.2
      beta, docs/rt-beta-kernel.md). A name with no fragment fails fast in the
      fingerprint step, before any cache or build work.
    required: false
    default: "main"

runs:
  using: composite
  steps:
    # MUST be first, and is not optional. A stock GitHub-hosted runner has ~14 GB
    # free; output/ alone is 24 GB. Run 29295920820 died 1h37m in with ENOSPC in
    # host-gcc. Reclaiming the ~30 GB of preinstalled toolchains we never use is
    # what makes the build fit at all (measured: 16 GB free -> 40 GB free).
    #
    # This is ALSO why no job here may use `container:` — that preinstalled
    # software lives on the HOST, which a container job cannot reach to delete.
    # Plain `rm` rather than a third-party action, to avoid another supply-chain
    # dependency. `df` before/after so a future disk regression shows up in the
    # log instead of as a mysterious compiler error 90 minutes in.
    - name: Free disk space on the runner
      shell: bash
      run: |
        echo "--- disk before ---"; df -h /
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/local/.ghcup \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/share/powershell \
          /usr/local/share/boost \
          /usr/local/graalvm || true
        sudo docker image prune --all --force >/dev/null 2>&1 || true
        sudo apt-get clean || true
        echo "--- disk after ---"; df -h /

    # BUILDROOT_VERSION lives in the Makefile (Renovate watches that same line),
    # not in any workflow, so it cannot drift from what `make` actually fetches.
    #
    # WS_FP fingerprints the workspace PATH. A Buildroot cross-toolchain bakes its
    # prefix/sysroot in as an ABSOLUTE path — it is NOT relocatable (proof:
    # `make sdk` ships a relocate-sdk.sh precisely because of this). Restoring a
    # toolchain built at /__w/... into a build at /home/runner/work/... hands you
    # a subtly broken compiler. Keying the toolchain caches on the path means any
    # future move auto-busts them, instead of relying on a human to remember to
    # bump a hand-maintained `nc1`-style suffix. (ccache does NOT need this — it
    # IS relocatable, via the BR2_CCACHE_USE_BASEDIR passed to `make` below.)
    - name: Resolve Buildroot version + cache fingerprints
      shell: bash
      env:
        VARIANT: ${{ inputs.variant }}
      run: |
        set -eu

        # --- Which variant this run builds (see the header) ---------------------
        # Validated here, before any cache is restored or any build work starts,
        # so a typo'd variant dies in seconds. "main" is the only special case;
        # any other NAME is a kernel-only variant and is accepted iff its
        # fragment exists — that existence check is the entire registry, so a
        # new variant needs no edit here. The character whitelist keeps a
        # hostile/typo'd name from ever reaching a path or cache key.
        # Everything variant-shaped downstream — step-level `if:`s, cache
        # keys/paths, which make targets run — reads the env computed once in
        # this step, for the same compute-once/consume-twice reason as
        # BR_HOST_KEY below.
        case "$VARIANT" in
          main) ;;
          *[!a-z0-9_-]*|'')
            echo "::error::invalid variant name '$VARIANT' -- kernel-variant names must be non-empty [a-z0-9_-]" >&2
            exit 1
            ;;
          *)
            if [ ! -f "configs/mister_${VARIANT}.fragment" ]; then
              echo "::error::unknown variant '$VARIANT' -- .github/actions/buildroot-build accepts 'main' or any kernel variant with a fragment at configs/mister_<name>.fragment (looked for configs/mister_${VARIANT}.fragment)" >&2
              exit 1
            fi
            # Kernel variants build configs/mister_kernel_defconfig, a COPY of
            # the main defconfig's toolchain/kernel stanzas. Assert the copy has
            # not drifted BEFORE any cache work: a drifted toolchain stanza
            # would not just build wrong, it would build wrong under a cache key
            # that then pins the wrong toolchain in.
            scripts/check-kernel-defconfig-sync.sh
            ;;
        esac
        echo "VARIANT=$VARIANT" >> "$GITHUB_ENV"

        ver=$(sed -n 's/^BUILDROOT_VERSION ?= //p' Makefile | head -1)
        if [ -z "$ver" ]; then
          echo "::error::could not extract BUILDROOT_VERSION from Makefile (format changed?)" >&2
          exit 1
        fi
        echo "BUILDROOT_VERSION=$ver" >> "$GITHUB_ENV"

        ws_fp=$(printf '%s' "$GITHUB_WORKSPACE" | sha256sum | cut -c1-8)
        echo "WS_FP=$ws_fp" >> "$GITHUB_ENV"

        # --- Toolchain cache fingerprint: a DENY-list, on purpose ---------------
        #
        # Hashing the WHOLE defconfig would evict the 1-3 GB cross-toolchain on
        # every package add (`BR2_PACKAGE_NANO=y` -> a 3h20m cold rebuild, for a
        # package that cannot touch the compiler). But the obvious fix -- an
        # ALLOW-list of "toolchain-ish" symbols -- is the wrong SHAPE, and the
        # first version of this code proved it: the pattern `^BR2_(...|ARM|CPU|arm)`
        # silently missed `BR2_cortex_a9=y`, which is lowercase and starts with
        # neither. Switching a9 -> a7 keeps every NEON/VFP line identical, so the
        # fingerprint would not have changed, the cortex-a9 toolchain would have
        # been restored WITH ITS STAMPS, and every target binary would have been
        # built with the wrong -mcpu. Silently.
        #
        # So invert it. Hash everything EXCEPT what provably cannot affect the
        # toolchain. The asymmetry is the whole point:
        #   * a wrong DENY-list over-busts  -> a wasted rebuild. Safe.
        #   * a wrong ALLOW-list under-busts -> a stale, WRONG compiler, which
        #     Buildroot does not detect (it wants a `make clean`). Not safe.
        #
        # Excluded, with reasons:
        #   BR2_PACKAGE_*      target packages; cannot change the compiler. And a
        #                      restored output/host that is merely INCOMPLETE is
        #                      self-healing -- a missing host-* package has no
        #                      stamp, so Buildroot simply builds it.
        #   BR2_LINUX_KERNEL_* the kernel we BUILD (incl. the version we bump
        #                      monthly). Distinct from BR2_KERNEL_HEADERS_*, the
        #                      headers glibc is compiled against -- that one is NOT
        #                      excluded and correctly still busts the cache.
        # Strip comments BEFORE filtering. These defconfigs are heavily annotated,
        # with both trailing comments (`BR2_ROOTFS_MERGED_USR=y  # why`) and
        # indented continuation lines -- and most of those annotations hang off the
        # BR2_PACKAGE_ lines we are trying to exclude. Keeping them would mean
        # editing a COMMENT about a WiFi driver evicts the cross-toolchain and
        # costs a 3h20m rebuild. Only `#` that begins a line or follows whitespace
        # is a comment (values like the ext2 MKFS_OPTIONS contain `^` and `,` but
        # never a bare `#`), so this cannot corrupt a symbol's value.
        #
        # WHICH defconfig gets fingerprinted is the variant's: main hashes the
        # image defconfig; a kernel variant hashes the kernel-only base
        # (configs/mister_kernel_defconfig -- whose filtered residue is a
        # NON-empty toolchain stanza, so the sentinel asserts below hold for it
        # too) and then appends its fragment's residue.
        TC_GEN=1
        if [ "$VARIANT" = "main" ]; then
          fp_defconfig=configs/mister_de10nano_defconfig
        else
          fp_defconfig=configs/mister_kernel_defconfig
        fi
        sed -e 's/^[[:space:]]*#.*$//' -e 's/[[:space:]]\+#.*$//' -e 's/[[:space:]]*$//' \
          "$fp_defconfig" \
          | grep -vE '^($|BR2_PACKAGE_|BR2_LINUX_KERNEL)' \
          | sort > .br-toolchain-fingerprint

        # Patches that rewrite the toolchain's OWN sources. patches/linux/ is
        # deliberately not here: it changes on every kernel bump and cannot affect
        # the cross-compiler. (None of these dirs exist today -- this closes the
        # vector before someone opens it.)
        for d in gcc binutils glibc musl uclibc; do
          pd="board/mister/de10nano/patches/$d"
          if [ -d "$pd" ]; then
            find "$pd" -type f -exec sha256sum {} + | sort >> .br-toolchain-fingerprint
          fi
        done
        echo "gen=$TC_GEN" >> .br-toolchain-fingerprint

        # Kernel variants: run the SAME strip/filter over the variant's fragment
        # and append. TODAY this appends nothing for rt — the fragment only
        # carries BR2_LINUX_KERNEL_* lines, all deny-listed above — and that is
        # the deny-list doing its job, not a bug: a kernel-version bump in the
        # fragment cannot evict the variant's cross-toolchain, while any future
        # fragment line that COULD affect it (say a BR2_KERNEL_HEADERS_ change)
        # correctly busts that variant's key and only that key.
        #
        # But "selected zero lines" is grep exit 1, and this step's shell runs
        # with pipefail — supplied by GitHub's own `shell: bash` invocation,
        # `bash --noprofile --norc -eo pipefail {0}` (composite steps included),
        # NOT by the `set -eu` above — so the empty (correct!) result must be
        # tolerated explicitly or the whole variant dies right here.
        # `|| [ $? -eq 1 ]` converts exactly that exit into success while a real
        # grep failure (exit >= 2) still aborts the step. (The defconfig filter
        # above needs no such guard: its residue is asserted NON-empty by the
        # sentinels below, for main and kernel defconfigs alike.)
        if [ "$VARIANT" != "main" ]; then
          sed -e 's/^[[:space:]]*#.*$//' -e 's/[[:space:]]\+#.*$//' -e 's/[[:space:]]*$//' \
            "configs/mister_${VARIANT}.fragment" \
            | { grep -vE '^($|BR2_PACKAGE_|BR2_LINUX_KERNEL)' || [ $? -eq 1 ]; } \
            | sort >> .br-toolchain-fingerprint
        fi

        # Fail loud if the defconfig is ever renamed/reformatted such that this
        # produces an empty or degenerate fingerprint: a frozen cache key is the
        # worst outcome available here (see above). Assert the two lines that no
        # ARM defconfig can lack and that nothing legitimate ever removes.
        for must in '^BR2_arm' '^BR2_cortex'; do
          if ! grep -q "$must" .br-toolchain-fingerprint; then
            echo "::error::toolchain fingerprint is missing '$must' -- the filter in .github/actions/buildroot-build/action.yml has gone stale, so this cache key can no longer detect a toolchain change. Refusing to build rather than risk restoring a wrong compiler." >&2
            exit 1
          fi
        done
        echo "Toolchain fingerprint ($(grep -c . .br-toolchain-fingerprint) lines):"
        cat .br-toolchain-fingerprint

        # The two toolchain cache keys are computed ONCE, here, and consumed by
        # both a restore and a save step further down. They used to be written as
        # inline `hashFiles(...)` expressions, which was fine while one combined
        # `actions/cache` step did both halves — but restore and save are separate
        # steps now (see the comment above the caches), and a key duplicated across
        # two steps is a key that can be edited in one of them. The failure mode is
        # silent: restore looks under one key, save writes another, nothing ever
        # hits again, and the only symptom is a build that is mysteriously always
        # cold. Compute once, reference twice.
        #
        # sha256sum rather than hashFiles() because this is shell, not an
        # expression context. The digest only has to be stable and content-derived,
        # and both halves read the same env var, so the algorithm is irrelevant.
        tc_hash=$(sha256sum .br-toolchain-fingerprint | cut -d' ' -f1)
        ir_hash=$(sha256sum configs/mister_initramfs_defconfig | cut -d' ' -f1)
        echo "BR_INITRAMFS_HOST_KEY=br-initramfs-host-${ws_fp}-${ver}-${ir_hash}" >> "$GITHUB_ENV"

        # Variant-resolved host-toolchain key + paths, and the two make targets
        # that differ per variant. main's key STRING is byte-identical to what
        # this step emitted before the variant input existed, so existing cache
        # entries keep hitting. A kernel variant gets its own name-derived key
        # namespace (br-<name>-host-…) because a Buildroot cross-toolchain bakes
        # its absolute O= prefix in (see WS_FP above): output/host and
        # output-<name>/host are NOT interchangeable and must never share an
        # entry. BR_HOST_PATHS is multiline; actions/cache splits `path:` on
        # newlines AFTER expression expansion, so env indirection here is
        # equivalent to the literal block it replaced.
        if [ "$VARIANT" != "main" ]; then
          echo "BR_HOST_KEY=br-${VARIANT}-host-${ws_fp}-${ver}-${tc_hash}" >> "$GITHUB_ENV"
          {
            echo "BR_HOST_PATHS<<BR_HOST_PATHS_EOF"
            echo "output-${VARIANT}/host"
            echo "output-${VARIANT}/build/host-*"
            echo "BR_HOST_PATHS_EOF"
          } >> "$GITHUB_ENV"
          echo "BR_LEGAL_TARGET=${VARIANT}-legal-info" >> "$GITHUB_ENV"
          echo "BR_EXTDEPS_TARGET=${VARIANT}-external-deps" >> "$GITHUB_ENV"
        else
          echo "BR_HOST_KEY=br-host-${ws_fp}-${ver}-${tc_hash}" >> "$GITHUB_ENV"
          {
            echo "BR_HOST_PATHS<<BR_HOST_PATHS_EOF"
            echo "output/host"
            echo "output/build/host-*"
            echo "BR_HOST_PATHS_EOF"
          } >> "$GITHUB_ENV"
          echo "BR_LEGAL_TARGET=legal-info" >> "$GITHUB_ENV"
          echo "BR_EXTDEPS_TARGET=external-deps" >> "$GITHUB_ENV"
        fi

        echo "Resolved BUILDROOT_VERSION=$ver  workspace-fp=$ws_fp  variant=$VARIANT"

    ############################################################################
    # Five input caches. Mind GitHub's 10 GB per-repo ceiling — it evicts
    # least-recently-used entries once the repo crosses it, so these are sized to
    # coexist. Measured sizes from the first green run are in the header above.
    #
    # THE 10 GB MATH, NOW THAT VARIANTS SHARE IT: main's set is ~7 GB
    # (2.7 GB dl + ~3 GB br-host + br-initramfs-host + ~0.7 GB ccache + the tiny
    # tarball). Each kernel variant adds ~2-3 GB (br-<name>-host — the
    # cross-toolchain dominates it; the kernel-only target is small) plus up to
    # ~3 GB (br-dl-<name> — its content mostly overlaps br-dl, but GitHub cache
    # entries are opaque blobs, so overlap is not deduplicated). That can put
    # the repo over the ceiling, which is survivable by design: eviction is
    # LRU, every cache here is a pure accelerator, and an evicted entry means a
    # cold, self-healing rebuild (see the coupling note below), never a wrong
    # one. If eviction thrash ever hurts, the cheapest levers in order: shrink
    # ccache-max-size, then drop the variant dl SAVE (the restore-keys fallback
    # to the main dl prefix keeps variant builds mostly warm for free).
    ############################################################################

    # WHY THE TWO DOWNLOAD CACHES ARE SPLIT restore/save AND THE TOOLCHAINS ARE NOT
    #
    # `actions/cache` declares `post-if: success()` (read it at the pinned SHA —
    # it is the last line of its action.yml). Its save runs as a POST step, so
    # that condition means: a job that FAILS saves nothing. Not a quirk, the
    # documented design.
    #
    # That policy is right for the toolchains (#3/#4 below) and wrong for the
    # downloads, and the difference is stamps. A half-built output/host saved from
    # a build that died mid-way would come back WITH its per-package stamps, and
    # Buildroot would believe them and build straight into a broken tree. Never
    # save those from a failure.
    #
    # Meanwhile hendrikmuhs/ccache-action declares NO post-if, so it saves on
    # every run including failures. That asymmetry is why run 29529993731 (failed
    # at 46 min) uploaded 696 MB of ccache and saved no dl/ at all — and why this
    # repo kept re-fetching 2.7 GB of sources, including a full ~70s git fetch of
    # glibc from sourceware.org, on every red build. Red builds are the majority
    # here (see `gh run list`), so "save only on green" meant "almost never save".
    #
    # So: restore here, save explicitly at the end under `if: always()`.
    #
    # ---------------------------------------------------------------------------
    # AND THE PART THAT IS NOT OBVIOUS: #2 AND #3 ARE COUPLED. Do not decouple.
    #
    # An earlier version of this comment claimed "dl/ has no such hazard — the
    # worst a partial dl/ can do is miss a file the next run re-downloads." That
    # is FALSE, and it cost run 29534917900 a 46-minute build. Buildroot records
    # "this package's source is downloaded" as a STAMP FILE, not by looking in dl/:
    #
    #     pkg-generic.mk:849   $(2)_TARGET_SOURCE = $$($(2)_DIR)/.stamp_downloaded
    #
    # That stamp lives in output/build/, which cache #3 restores. The bytes live in
    # dl/, which cache #2 restores. Two keys, two lifetimes — so they CAN disagree,
    # and when they do Buildroot believes the stamp. Restore #3 without #2 and
    # every host package is "already downloaded" with nothing on disk to show for
    # it. `make all` does not care (those packages are already built), so the build
    # goes green all the way to the image — and then `make legal-info`, which
    # actually opens the tarballs, dies on the first one:
    #
    #     cp: cannot stat '.../dl/ccache/ccache-4.12.3.tar.xz': No such file
    #
    # Hence the `if:` on #3/#4 below: a toolchain cache may only be restored when
    # dl/ came back too, because its stamps are ASSERTIONS ABOUT dl/'s CONTENTS.
    # A dl/ miss therefore forces a genuinely cold build, which re-downloads
    # everything and leaves both caches consistent. Expensive and self-healing,
    # which beats cheap and silently broken.
    #
    # `make source` does NOT rescue this — it resolves to the same .stamp_downloaded
    # and skips exactly the packages that need fetching. `make -B source` would
    # force the download, but -B re-touches every stamp, and .stamp_extracted
    # depends on .stamp_downloaded (pkg-generic.mk:960), so the next `make all`
    # would re-extract, re-patch, re-configure and rebuild every host package —
    # discarding the very cache we are protecting. There is no cheap validation.
    # ---------------------------------------------------------------------------

    # 1. Buildroot release tarball (~20-30 MB). Kept SEPARATE from dl/ on purpose:
    # it is redundant with the copy inside dl/, but keying it on the version ALONE
    # means a mere defconfig change can never evict this tiny, cheap entry.
    - name: Restore Buildroot release tarball
      id: tarball-cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
        key: buildroot-tarball-${{ env.BUILDROOT_VERSION }}

    # 2. dl/ — every package source tarball (2.7 GB measured). Keyed on the full
    # defconfig (adding a package needs new sources), but restore-keys falls back
    # to the version alone so an imperfect match still hydrates everything that
    # did NOT change instead of re-downloading the whole package set. dl/ lives at
    # the repo root (survives `make clean`) — never move it under output/.
    #
    # Exactly ONE of #2 (main) / #2b (kernel variant) runs per invocation; the
    # skipped step's outputs read as empty strings, which is what the combined
    # `if:`s and the `||` in the save step below rely on.
    - name: Restore Buildroot dl/ download cache
      id: dl-cache
      if: env.VARIANT == 'main'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/
        key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_de10nano_defconfig') }}
        restore-keys: |
          br-dl-${{ env.BUILDROOT_VERSION }}-

    # 2b. A kernel variant's dl/. Its own name-derived KEY, not main's: a
    # variant config needs sources main never fetches (e.g. rt's 7.2-rc3 kernel
    # snapshot), and cache keys are immutable — under a shared key, whichever
    # variant saved first would lock the others' gaps in forever. The key
    # hashes the two inputs that decide what the variant downloads: the shared
    # kernel-only base defconfig and the variant's own fragment.
    # restore-keys falls back through the variant's own prefix to the MAIN dl
    # prefix, so a cold variant run warm-starts from ~everything main already
    # fetched. That fallback is SAFE despite the stamp-coupling hazard
    # documented above: the variant host-toolchain cache's stamps (#3, keyed
    # br-<name>-host) only assert HOST-package tarballs — and the kernel-only
    # config's host set (cross-toolchain, host-kmod, …) is a strict SUBSET of
    # main's, so a fallback-restored main dl satisfies every one of those
    # stamps — while the variant kernel's own .stamp_downloaded lives in
    # output-<name>/build/linux-*, which is never cached, so no stale stamp can
    # vouch for a file only the variant config needs.
    - name: Restore Buildroot dl/ download cache (kernel variant)
      id: dl-cache-variant
      if: env.VARIANT != 'main'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/
        key: br-dl-${{ env.VARIANT }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_kernel_defconfig', format('configs/mister_{0}.fragment', env.VARIANT)) }}
        restore-keys: |
          br-dl-${{ env.VARIANT }}-${{ env.BUILDROOT_VERSION }}-
          br-dl-${{ env.BUILDROOT_VERSION }}-

    # 3. The variant's (glibc) cross-toolchain: <O>/host plus the per-package
    # build stamps under <O>/build/host-*/ that tell Buildroot's incremental make
    # those host packages are already built — without the stamps, restoring
    # <O>/host alone would not stop Buildroot rebuilding straight into it.
    # THE big win: this is what skips rebuilding gcc/binutils/glibc from scratch.
    # Path and key come from the variant-resolved env (main: output/host under
    # br-host-…; a kernel variant: output-<name>/host under br-<name>-host-…) —
    # one step, one namespace per variant, never a shared entry (absolute O=
    # paths are baked in).
    #
    # `if:` — the coupling. cache-matched-key is non-empty for BOTH an exact hit
    # and a restore-keys hit, i.e. "dl/ came back with something". Only one of
    # the two dl restore steps ran (the other's outputs are empty), so the OR
    # reads as "the dl restore for THIS variant matched". Skip the restore when
    # it did not, and this build goes cold and re-downloads. See the block above
    # for why that is the point rather than a regression.
    - name: Restore Buildroot host toolchain
      id: host-cache
      if: steps.dl-cache.outputs.cache-matched-key != '' || steps.dl-cache-variant.outputs.cache-matched-key != ''
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ env.BR_HOST_PATHS }}
        key: ${{ env.BR_HOST_KEY }}

    # 4. The initramfs stage's SEPARATE static-musl cross-toolchain. `make
    # initramfs` builds its own; caching it turns a ~30 min cold stage 1 into a
    # couple of minutes warm. Busts only on an initramfs-defconfig change.
    # EVERY variant restores and saves it: the stage-1 cpio is embedded into
    # every kernel this repo builds (external.mk's fixup applies to any
    # BR2_LINUX_KERNEL=y build), so `make <variant>` depends on `initramfs`
    # exactly as `make all` does — and the cache key is variant-independent
    # (keyed on the initramfs defconfig alone, at the one shared
    # output-initramfs/ path), so a kernel leg that runs first warms it for the
    # main build that follows.
    #
    # Coupled to dl/ for the same reason as #3: this stage shares the one BR2_DL_DIR
    # with every build here, so its stamps make the same claims about the same dl/.
    - name: Restore initramfs host toolchain
      id: initramfs-host-cache
      if: steps.dl-cache.outputs.cache-matched-key != '' || steps.dl-cache-variant.outputs.cache-matched-key != ''
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          output-initramfs/host
          output-initramfs/build/host-*
        key: ${{ env.BR_INITRAMFS_HOST_KEY }}

    # 5. ccache. CCACHE_DIR is exported here to match the BR2_CCACHE_DIR handed to
    # `make` below, so the action caches the exact directory Buildroot's compiler
    # wrapper writes to. Unlike the toolchain caches this one IS relocatable —
    # BR2_CCACHE_USE_BASEDIR rewrites the absolute paths in cached objects — so it
    # is deliberately NOT keyed on WS_FP.
    - name: Configure ccache directory
      shell: bash
      run: echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"

    - name: Cache ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      # This action runs its own apt-get; it used to be covered by a job-level
      # DEBIAN_FRONTEND that the callers no longer carry, so set it here.
      env:
        DEBIAN_FRONTEND: noninteractive
      with:
        # NOT "ccache-<version>": the action prepends its own variant prefix
        # (`keyPrefix = ccacheVariant + "-"`, src/restore.ts), so that spelling
        # produced the stuttering `ccache-ccache-2026.02.3-...` entries visible in
        # `gh cache list`. Passing the bare version yields `ccache-2026.02.3-<ts>`.
        #
        # The trailing timestamp is the action's, and it is LOAD-BEARING — do not
        # reach for `append-timestamp: false` to stop cache entries accumulating.
        # A GitHub cache key is immutable, so the only way to refresh a cache is to
        # write a NEW key; with the timestamp off, the first save would own
        # `ccache-<version>` forever, every later save would be rejected as already
        # existing, and the cache would freeze at its first contents while the hit
        # rate decayed. The timestamped key is a prefix match on restore (hence
        # "Cache hit for restore-key" in the logs), so the newest entry always wins.
        key: ${{ env.BUILDROOT_VERSION }}
        max-size: ${{ inputs.ccache-max-size }}
        # This action `apt-get install`s ccache itself, BEFORE our own apt step
        # below has run `apt-get update` — so have it refresh the index first.
        # (Introduced when we ran in a container with an empty index; kept because
        # a runner's preinstalled index can be stale too, and it is what the first
        # green run actually used.)
        update-package-index: true

    # Buildroot's own documented mandatory set, plus: git (xone, munt, midilink and
    # the morrownr Realtek forks are fetched at pinned git commits — see
    # package/*/*.mk), bison/flex/gawk (kernel Kbuild's documented minimum),
    # ca-certificates (without it every HTTPS package mirror fails TLS outright),
    # python3 (scripts/abi/needed-symbols.py + Buildroot infra), libssl/libncurses/
    # pkg-config/texinfo (probed by third-party configure scripts even when
    # cross-compiling), qemu-user (ci-tests.sh runs target binaries under qemu-arm),
    # e2fsprogs (dumpe2fs fallback for check-linux-img.sh).
    # EXTRA_APT goes through the environment rather than being interpolated
    # straight into the script body: `${{ }}` inside a run: block is textual
    # substitution, which is the classic Actions script-injection footgun. The
    # value is ours today, but the safe form costs nothing.
    - name: Install build dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
        EXTRA_APT: ${{ inputs.extra-apt-packages }}
      run: |
        set -eu
        sudo apt-get update
        # shellcheck disable=SC2086 -- word splitting of EXTRA_APT is intended
        sudo -E apt-get install -y --no-install-recommends \
          build-essential bash bc bison flex gawk \
          git patch gzip bzip2 xz-utils cpio unzip rsync \
          file wget curl ca-certificates perl \
          python3 python3-dev \
          libssl-dev libncurses-dev pkg-config texinfo \
          qemu-user e2fsprogs \
          $EXTRA_APT
        sudo rm -rf /var/lib/apt/lists/*

    # Fails fast and loud if the runner's `install` is ever not GNU coreutils
    # (see the Makefile's `hostshim` target) — cheap to check before spending
    # three hours of build time.
    - name: Verify host `install` is GNU coreutils
      shell: bash
      run: make hostshim

    # Buildroot needs output/.config before `make all`. A fresh checkout has only
    # the tracked defconfig, so the build dies instantly with "Please configure
    # Buildroot first" — run 29293209070 failed exactly there, AFTER a 52-minute
    # stage 1. (The initramfs stage doesn't hit this; its Makefile rule generates
    # its own .config.) Regenerate unconditionally on every run: the defconfig is
    # the reproducible source of truth, and doing it every time also stops a stale
    # cached output/.config from silently overriding a defconfig change.
    #
    # MAIN-ONLY: `make <variant>` generates output-<variant>/.config itself
    # (kernel-only defconfig + merge_config.sh of the variant fragment), and no
    # cache here ever carries a variant .config, so it regenerates fresh every
    # run and the staleness this step exists to prevent cannot occur for a
    # kernel variant.
    - name: Configure Buildroot (generate output/.config from the defconfig)
      if: env.VARIANT == 'main'
      shell: bash
      run: make mister_de10nano_defconfig

    # ONE invocation builds BOTH stages: `make all`'s recipe is `all: initramfs
    # ...`, so this covers the static-musl initramfs and the main glibc rootfs +
    # kernel + linux.img. BR2_CCACHE propagates through MAKEFLAGS to BOTH
    # sub-builds, so the musl toolchain gets ccache too (musl and glibc objects
    # have distinct ccache keys, so they coexist safely in one cache).
    #
    # MISTER_VERSION, if the caller exported it to $GITHUB_ENV (release.yml does,
    # per ADR 0018), is inherited here and baked into /MiSTer.version by
    # post-build.sh. Left unset everywhere else, which keeps ordinary builds
    # reproducible.
    - name: Build image (make all — initramfs + main rootfs, ccache both)
      if: env.VARIANT == 'main'
      shell: bash
      run: |
        make all \
          BR2_CCACHE=y \
          BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
          BR2_CCACHE_USE_BASEDIR=y

    # A kernel variant: `make <name>` — the stage-1 initramfs (a prerequisite of
    # every kernel target; its cpio is embedded into the zImage) followed by the
    # kernel-only Buildroot build into output-<name>/, which ends by staging the
    # variant's depmod'd module tree into work/extra-modules-overlay/ (unused in
    # this job; the CALLER ships the tree via the kernel artifact instead). Same
    # ccache args as main; they propagate through MAKEFLAGS, and all variants
    # share the one ccache (distinct object keys coexist; the action's header
    # explains why the cap is not the constraint). The Makefile's variant target
    # hard-asserts the built kernel's config (e.g. rt's CONFIG_PREEMPT_RT=y), so
    # a fragment regression fails HERE, loudly, not on a device.
    - name: Build kernel variant (make <variant> — kernel-only Buildroot build)
      if: env.VARIANT != 'main'
      shell: bash
      run: |
        make "$VARIANT" \
          BR2_CCACHE=y \
          BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
          BR2_CCACHE_USE_BASEDIR=y

    # BR_LEGAL_TARGET is variant-resolved in the fingerprint step: `legal-info`
    # for main, `<name>-legal-info` for a kernel variant (same recipe, aimed at
    # output-<name>/ — kernel-only, so the bundle is dominated by the kernel
    # source).
    - name: Generate legal-info (SBOM)
      if: inputs.run-legal-info == 'true'
      shell: bash
      run: |
        make "$BR_LEGAL_TARGET" \
          BR2_CCACHE=y \
          BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
          BR2_CCACHE_USE_BASEDIR=y

    ############################################################################
    # Save the download caches — PASS OR FAIL. See the long comment above the
    # restore steps for why these two are saved from a red build and the
    # toolchain caches (#3/#4) are deliberately NOT.
    #
    # Placed after legal-info because `make legal-info` itself fetches the source
    # tarballs of any package it cannot already find in dl/.
    ############################################################################

    # THE TRAP THIS GUARDS: a GitHub cache key is IMMUTABLE — whoever writes it
    # first owns it until the key itself changes. `dl/` is saved under
    # br-dl-<version>-<defconfig-hash>, which only rotates when the defconfig
    # does, i.e. possibly not for weeks. So a build that died in its first
    # minutes, saving a nearly-empty dl/, would not merely be useless: it would
    # LOCK that stub in. Every later run would exact-hit it, restore almost
    # nothing, re-download the rest — and, because an exact hit suppresses the
    # save below, never repair it. Strictly worse than not caching at all.
    #
    # A late failure is the common one here and is exactly what we want to keep:
    # run 29529993731 died at 46 min, after MODPOST, with dl/ fully populated.
    # Buildroot fetches each package's source before building it, so "got deep
    # into the build" implies "downloaded nearly everything".
    #
    # ASK BUILDROOT, DO NOT GUESS. The first cut of this used a 2 GB size floor,
    # and run 29534917900 proved a size floor cannot work: dl/ finished that run at
    # 2.5 GB — comfortably "complete" — while missing the one tarball legal-info
    # needed. A tree can be the right size and still be missing the file that
    # matters, so measure the thing we actually care about.
    #
    # `make external-deps` is the oracle (`<name>-external-deps` for a kernel
    # variant — BR_EXTDEPS_TARGET is variant-resolved in the fingerprint step,
    # so the list is enumerated against the config whose dl/ is about to be
    # saved; like main's oracle it does NOT enumerate the stage-1 initramfs
    # config's downloads, a pre-existing gap main has always had too). It runs
    # with -B (buildroot/Makefile:860), so unlike `make source` it consults no
    # stamps and cannot be fooled by the .stamp_downloaded problem described
    # above; it just prints the basename of every file dl/ is supposed to
    # contain.
    #
    # It MUST be invoked with the same BR2_CCACHE=y as the build. That flag is a
    # command-line override rather than a defconfig symbol, and it pulls host-ccache
    # plus blake3/hiredis/xxhash/zstd into the package graph — five tarballs that a
    # bare `make external-deps` does not list at all. Verified both ways locally:
    # without the flag the list is 158 files and omits ccache-4.12.3.tar.xz (i.e.
    # it would have missed the exact failure this guards); with it, 163 including
    # it. Worth knowing that the br-dl cache KEY hashes only the defconfig and is
    # likewise blind to this — harmless while BR2_CCACHE=y is constant in CI, and a
    # trap the day it is not.
    - name: Verify dl/ is complete before caching it
      id: dl-state
      if: always()
      shell: bash
      run: |
        set -uo pipefail

        # Bare basenames only. The wrapper Makefile echoes its own recipe and a
        # hostshim notice onto stdout (for a kernel variant, also the
        # .config-generation recipe's cd/merge_config.sh lines); every such
        # line contains a '/', '=' or a space. The '^#' exists for one more
        # variant case: if the build died before `make <variant>` generated
        # output-<variant>/.config, the .config rule re-runs HERE and kconfig
        # prints its "configuration written to" trailer — two bare '#' lines
        # that match none of the other patterns. No legitimate basename
        # contains '/', '=' or a space, or starts with '#'.
        if ! make "$BR_EXTDEPS_TARGET" BR2_CCACHE=y \
               BR2_CCACHE_DIR="$GITHUB_WORKSPACE/.ccache" \
               BR2_CCACHE_USE_BASEDIR=y 2>/dev/null \
             | grep -vE '/|=|^\s*$| |^#' | sort -u > /tmp/dl-needed.txt; then
          echo "complete=false" >> "$GITHUB_OUTPUT"
          echo "::notice title=dl/ not cached::Could not enumerate required downloads (make external-deps failed), so dl/ completeness is unknown and it was NOT saved. Erring toward a re-download rather than risk locking an incomplete dl/ into an immutable cache key."
          exit 0
        fi

        find dl -type f -printf '%f\n' 2>/dev/null | sort -u > /tmp/dl-have.txt
        comm -23 /tmp/dl-needed.txt /tmp/dl-have.txt > /tmp/dl-missing.txt || true

        needed=$(wc -l < /tmp/dl-needed.txt)
        missing=$(wc -l < /tmp/dl-missing.txt)
        echo "dl/ requires $needed files; $missing missing; $(du -sh dl 2>/dev/null | cut -f1) on disk"

        if [ "$missing" -eq 0 ]; then
          echo "complete=true" >> "$GITHUB_OUTPUT"
        else
          echo "complete=false" >> "$GITHUB_OUTPUT"
          echo "--- missing ---"; cat /tmp/dl-missing.txt
          echo "::notice title=dl/ not cached::dl/ is missing $missing of $needed required source files, so it was NOT saved -- an incomplete dl/ would lock itself into an immutable cache key that later runs could not repair. Expected when a build fails before everything is fetched. The missing list is in this step's log."
        fi

        # Existence check for the tarball save below, done here in shell rather
        # than as hashFiles() in that step's `if:` — one less expression-context
        # subtlety to be wrong about, and `actions/cache/save` hard-errors on a
        # missing path rather than skipping.
        if [ -f "dl/buildroot-${BUILDROOT_VERSION}.tar.gz" ]; then
          echo "tarball=true" >> "$GITHUB_OUTPUT"
        else
          echo "tarball=false" >> "$GITHUB_OUTPUT"
        fi

    # `cache-hit != 'true'` skips the upload when the primary key was an exact
    # match (nothing to add, and the save would be rejected anyway). A restore-keys
    # match leaves cache-hit false, which is what we want: dl/ was hydrated from an
    # older entry and has since grown, so it is worth re-saving under the new key.
    #
    # Variant plumbing: only ONE of the two dl restore steps ran, and a skipped
    # step's outputs are empty — so both cache-hit conditions collapse to "the
    # restore that ran was not an exact hit", and the `||` in `key:` resolves to
    # the primary key of whichever restore ran. The save therefore lands under
    # the same key namespace it was restored from (br-dl-… or br-dl-<name>-…),
    # which is what keeps a variant's warm-start-from-main fallback from ever
    # WRITING into main's key space.
    - name: Save Buildroot dl/ download cache
      if: always() && steps.dl-cache.outputs.cache-hit != 'true' && steps.dl-cache-variant.outputs.cache-hit != 'true' && steps.dl-state.outputs.complete == 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/
        key: ${{ steps.dl-cache.outputs.cache-primary-key || steps.dl-cache-variant.outputs.cache-primary-key }}

    - name: Save Buildroot release tarball
      if: always() && steps.tarball-cache.outputs.cache-hit != 'true' && steps.dl-state.outputs.tarball == 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
        key: ${{ steps.tarball-cache.outputs.cache-primary-key }}

    ############################################################################
    # Save the toolchain caches — GREEN BUILDS ONLY.
    #
    # These used to be plain `actions/cache`, whose post-step `post-if: success()`
    # gave us the save-on-green behaviour for free. Splitting the restore off (to
    # couple it to dl/) means the save has to be spelled out — and it must keep
    # that success-only semantics, because these carry the per-package stamps and
    # a half-built output/host restored WITH its stamps is a poisoned toolchain.
    #
    # NOTE there is deliberately no `always()` here: an `if:` with no status
    # function has an implicit `success() &&`, so a red build skips these. That is
    # the whole point, and it is the one place in this file where the absence of
    # always() is load-bearing rather than an oversight.
    #
    # `cache-hit != 'true'` covers both "restored and missed" and "restore was
    # SKIPPED because dl/ missed" — the latter leaves the output empty, which is
    # exactly the cold healing run whose freshly-built toolchain we most want to
    # keep. Path and key are the variant-resolved env, same as the restore — the
    # one step serves both key namespaces and can never cross them.
    - name: Save Buildroot host toolchain
      if: steps.host-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ env.BR_HOST_PATHS }}
        key: ${{ env.BR_HOST_KEY }}

    # Every variant, like its restore: `make <variant>` builds the initramfs
    # stage too (its cpio is embedded into every kernel), so output-initramfs/
    # exists on green variant runs as well — and the key is variant-independent,
    # so whichever variant builds it cold saves it for all.
    - name: Save initramfs host toolchain
      if: steps.initramfs-host-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          output-initramfs/host
          output-initramfs/build/host-*
        key: ${{ env.BR_INITRAMFS_HOST_KEY }}

    - name: Report disk & cache usage
      if: always()
      shell: bash
      run: |
        echo "--- disk free ---"; df -h .
        echo "--- dl/ ---"; du -sh dl 2>/dev/null || true
        if [ "${VARIANT:-main}" = "main" ]; then
          echo "--- output/host ---"; du -sh output/host 2>/dev/null || true
          echo "--- output (total) ---"; du -sh output 2>/dev/null || true
        else
          echo "--- output-$VARIANT/host ---"; du -sh "output-$VARIANT/host" 2>/dev/null || true
          echo "--- output-$VARIANT (total) ---"; du -sh "output-$VARIANT" 2>/dev/null || true
        fi
        echo "--- output-initramfs (total) ---"; du -sh output-initramfs 2>/dev/null || true
        echo "--- ccache ---"; du -sh "$GITHUB_WORKSPACE/.ccache" 2>/dev/null || true
