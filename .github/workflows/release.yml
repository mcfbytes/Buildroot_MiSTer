################################################################################
#
# release.yml — tag-triggered release workflow + build provenance (TASKS.md
# P4.4, PLAN.md §9 "Build", docs/downloader-contract.md P0.6).
#
# Builds via the same recipe as build.yml (.github/actions/buildroot-build),
# then assembles a GitHub Release for three downstream consumers: a human
# downloading assets from the Release page, the on-device Downloader_MiSTer
# (which never talks to GitHub Releases directly), and a human opting into
# the PREEMPT_RT beta kernel. See docs/ci.md#release-consumers.
#
# Rebuilds from the tagged commit and re-runs the full non-hardware
# verification suite rather than trusting build.yml's run or artifacts.
# See docs/ci.md#rebuild-not-adopt.
#
# Fetches (never vendors — G6) the stock uboot.img / files/linux/ payload
# from a commit-pinned third-party archive, verified before extraction.
# See docs/ci.md#stock-payload-sourcing, #stock-payload-verification, and
# the open provenance question at #stock-payload-open-decision.
#
# Tag convention (`v*`) is unratified, and the release filename / db.json
# version is deliberately decoupled from the git tag. See
# docs/ci.md#tag-convention and docs/ci.md#mister-version-coupling.
#
################################################################################

name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch builds ONLY the opt-in full sdcard variant (tagged pushes
  # always build the minimal one). MUST be dispatched against a tag ref, not
  # a branch — the publish job is guarded to tag refs regardless, but a
  # branch dispatch still burns a full build for nothing. See
  # docs/ci.md#manual-full-sdcard-dispatch.
  workflow_dispatch:
    inputs:
      build_full_sdcard:
        description: 'Also build + publish sdcard-full.img.xz (bundles _Console cores). Off by default; the minimal sdcard.img.xz is always built.'
        type: boolean
        default: false

# A re-pushed (corrected) tag should supersede an in-flight run for the same
# tag; distinct tags already get distinct concurrency groups via github.ref,
# so this never cancels a run for a DIFFERENT release.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the workflow level; the `publish` job elevates its own
# permissions block (contents: write, id-token: write, attestations: write)
# only for the steps that actually need them (attest + create the release).
permissions:
  contents: read

jobs:
  # ============================================================================
  # kernel-variants — derives the kernel-variant matrix from the filesystem
  # registry; build.yml's `gate` job runs the identical script so the two
  # workflows can't drift onto different matrix literals. Fails loudly on
  # zero variants rather than skipping. See docs/ci.md#variants.
  # ============================================================================
  kernel-variants:
    name: Derive kernel-variant matrix
    runs-on: ubuntu-26.04
    outputs:
      kernel_variants: ${{ steps.variants.outputs.kernel_variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Derive kernel-variant matrix
        id: variants
        run: |
          set -euo pipefail
          json=$(scripts/list-kernel-variants.sh)
          echo "kernel_variants=$json" >> "$GITHUB_OUTPUT"

  # ============================================================================
  # build-kernel — the kernel-variant matrix (ADR 0021 as amended 2026-07-18),
  # run BEFORE `build` because `build` merges each leg's module tree into the
  # one shipped linux.img. Each leg ships the FULL kernel GPL-source bundle,
  # not build.yml's manifest-only SBOM — a release DISTRIBUTES the variant
  # kernel binary, so the source obligation is real. No MISTER_VERSION
  # derivation here: a kernel-only build has no rootfs to bake it into.
  # Adding a variant, and what still needs a hand-edit: docs/ci.md#variants.
  # Matrix design (per-leg artifact contents): docs/ci.md#kernel-variant-matrix.
  # No `container:` — see docs/ci.md#no-container-disk-reclaim.
  # ============================================================================
  build-kernel:
    name: Build kernel (${{ matrix.kernel }})
    needs: kernel-variants
    runs-on: ubuntu-26.04
    strategy:
      matrix:
        kernel: ${{ fromJSON(needs.kernel-variants.outputs.kernel_variants) }}

    # Same estimate as build.yml's build-kernel: cold = cross-toolchain (~1h)
    # + stage-1 initramfs (~30 min) + one kernel build; 240 is ~2x that.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Shared leg recipe — see .github/actions/kernel-leg. full-legal-info
      # ships the full GPL source bundle (docs/ci.md#kernel-variant-matrix);
      # release-context swaps the summary for release-flavoured wording.
      - name: Build kernel leg (${{ matrix.kernel }})
        uses: ./.github/actions/kernel-leg
        with:
          kernel: ${{ matrix.kernel }}
          full-legal-info: "true"
          release-context: "true"

  # ============================================================================
  # build — produces every release asset and the pinned-7za-verified archive.
  # Runs after the kernel matrix so it can merge each leg's module tree into
  # linux.img. No `container:` — see docs/ci.md#no-container-disk-reclaim.
  # ============================================================================
  build:
    name: Build image + assemble release_YYYYMMDD.7z
    needs: build-kernel
    runs-on: ubuntu-26.04

    # Cold build measured at 3h19m (run 29300460591) plus stock-archive fetch,
    # archive assembly, and the sdcard steps' installer build + kernel relink
    # (the relink REUSES output/, no second from-scratch build — do not
    # reintroduce one; an earlier from-scratch design overran the runner's
    # hard 360-min cap and the release never published). See
    # docs/ci.md#sdcard-timing-6h-cap.
    timeout-minutes: 355

    outputs:
      release_date: ${{ steps.mister_version.outputs.release_date }}

    env:
      DEBIAN_FRONTEND: noninteractive

      # --- Pinned stock reference archive --------------------------------
      # The ONLY source in this pipeline for uboot.img and the files/linux/
      # payload we do not vendor (G6). See docs/ci.md#stock-payload-sourcing.
      STOCK_RELEASE_URL: https://raw.githubusercontent.com/MiSTer-devel/SD-Installer-Win64_MiSTer/b8531c7848526d9a8227841923cc4a493cb6e631/release_20250402.7z
      STOCK_RELEASE_MD5: 8dc3acae7d758a80a363fbd7ad31d95d
      STOCK_RELEASE_SHA256: 5d087d9c501b2bc50aaf918146e7bf30e5981c08268d5a0e67a3233a4da642ba
      STOCK_RELEASE_SIZE: "93727644"
      STOCK_UBOOT_SHA256: e2d46cf9fe1ec40ca2c9c7409870249f267e06f70e5736dc6d30b4e21fe62a64
      STOCK_UBOOT_SIZE: "515141"
      STOCK_UPDATEBOOT_SHA256: 6ff2d50a080e26d7173b61c52083e9cc42ca658db0c5031b4da1c45c74a562f2
      STOCK_UPDATEBOOT_SIZE: "407"

      # --- Pinned ARM 7za (dynamically linked, glibc) -----------------------
      # The exact binary the real on-device Downloader fetches; its upstream
      # URL is an intentionally unpinned floating ref (matches what real
      # devices fetch) — the MD5 check below is the actual security control.
      # See docs/ci.md#stock-payload-sourcing.
      STOCK_7ZA_GZ_URL: https://github.com/MiSTer-devel/SD-Installer-Win64_MiSTer/raw/master/7za.gz
      STOCK_7ZA_GZ_MD5: ed1ad5185fbede55cd7fd506b3c6c699
      STOCK_7ZA_GZ_SIZE: "465600"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # MUST run before the build: post-build.sh reads MISTER_VERSION to bake
      # /MiSTer.version into the image (ADR 0018). Derived from the tagged
      # commit's UTC date, not SOURCE_DATE_EPOCH, so distinct tags produce
      # distinct versions. See docs/ci.md#mister-version-coupling.
      - name: Derive release version (YYMMDD) from the tagged commit
        run: |
          set -eu
          v="${MISTER_VERSION:-$(TZ=UTC git show -s --format=%cd --date=format-local:%y%m%d HEAD)}"
          case "$v" in
            [0-9][0-9][0-9][0-9][0-9][0-9]) : ;;
            *) echo "::error::derived MISTER_VERSION '$v' is not 6 digits YYMMDD" >&2; exit 1 ;;
          esac
          echo "MISTER_VERSION=$v" >> "$GITHUB_ENV"
          echo "Release version (YYMMDD) = $v  ->  /MiSTer.version, release_20${v}.7z, db.json"

      # Populates the extra-modules overlay before the build — see
      # .github/actions/merge-kernel-modules for the mechanism. Also feeds
      # dist/'s per-variant zImage_dtb/config/legal-info assets, staged later
      # in this job.
      - name: Download + populate kernel-variant module overlay
        uses: ./.github/actions/merge-kernel-modules
        with:
          phase: download

      # Shared recipe (disk reclaim, caches, apt, defconfig, `make all`).
      # p7zip-full here is a DIFFERENT 7za than the pinned ARM dynamic one
      # fetched below — this one only creates/inspects the archive on the
      # x86_64 runner. See docs/ci.md#stock-payload-verification.
      - name: Build the image
        uses: ./.github/actions/buildroot-build
        with:
          # extra-apt-packages: p7zip-full assembles release_YYYYMMDD.7z; the
          # rest are host-only tools scripts/mk-sdcard.sh needs (genimage,
          # mtools, dosfstools, xz-utils, jq) — none enter the shipped rootfs.
          # See docs/ci.md#release-apt-packages.
          extra-apt-packages: p7zip-full genimage mtools dosfstools xz-utils jq
          run-legal-info: "true"

      # Assert every kernel-variant module tree merged into the image -- see
      # .github/actions/merge-kernel-modules/action.yml for the silent-overlay-
      # miss guard this runs.
      - name: Assert kernel-variant module trees merged
        uses: ./.github/actions/merge-kernel-modules
        with:
          phase: verify

      # Re-runs build.yml's non-hardware parity suite (ci-tests.sh) and ABI/
      # SONAME checker (check-abi.sh) against THIS EXACT rootfs — the tagged
      # commit may not be one build.yml ever validated. See
      # docs/ci.md#rebuild-not-adopt. skip-qemu-system matches build.yml;
      # see .github/actions/verify-image for the full rationale.
      - name: Run parity suite + ABI/SONAME checker
        uses: ./.github/actions/verify-image
        with:
          skip-qemu-system: "true"

      ##########################################################################
      # Assemble dist/. See docs/ci.md#dist-layout for the asset contract.
      ##########################################################################

      - name: Stage dist/ and copy the two image assets
        run: |
          set -eu
          mkdir -p dist
          cp -f output/images/linux.img dist/linux.img
          cp -f output/images/zImage_dtb dist/zImage_dtb

      - name: Copy buildroot.config and linux.config
        run: |
          set -eu
          # nullglob keeps a zero-match glob's count truthful for the guard
          # below (mirrors .github/actions/kernel-leg's staging step). See
          # docs/ci.md#dist-layout.
          shopt -s nullglob
          cp -f output/.config dist/buildroot.config
          trees=(output/build/linux-[0-9]*/)
          if [ "${#trees[@]}" -ne 1 ] || [ ! -d "${trees[0]}" ]; then
            echo "::error::expected exactly one kernel tree at output/build/linux-[0-9]*/ but found ${#trees[@]} -- cannot stage linux.config (zero: the build produced no kernel tree; more than one: a stale sibling from a version bump, e.g. linux-headers-*/linux-firmware-* are excluded by the glob but another linux-<ver>/ would not be)" >&2
            exit 1
          fi
          cp -f "${trees[0]}.config" dist/linux.config

      # MUST exclude host-sources/ from the shipped legal-info bundle: with it
      # the archive measured 2109 MiB, over GitHub's 2 GiB per-asset cap — the
      # first real tag push would have failed at upload. host-sources/ is the
      # build-time toolchain's source, not the shipped bits' GPL obligation.
      # See docs/ci.md#legal-info-2gib-cap.
      - name: Archive legal-info as legal-info.tar.gz
        run: |
          set -eu
          # shellcheck source=scripts/ci-lib.sh
          source scripts/ci-lib.sh
          if [ ! -d output/legal-info ]; then
            echo "::error::output/legal-info does not exist -- did 'make legal-info' run?" >&2
            exit 1
          fi
          ci_lib_package_legal_info output dist/legal-info.tar.gz full

          # GitHub's hard per-asset ceiling is 2 GiB. Fail here, with a clear
          # message, rather than at the upload.
          ci_lib_check_release_asset_size dist/legal-info.tar.gz legal-info.tar.gz \
            ". The package set has outgrown a single source bundle -- split it (e.g. sources/ as its own asset, or publish sources to a separate host and reference them from manifest.csv)."

      # The per-variant release extras, straight from the leg artifacts (the
      # legs already applied the uniqueness guards and the legal-info size
      # guard). Copied by glob so a future matrix entry needs no edit here;
      # each glob must match at least once — zero matches means the download
      # step above silently changed shape, and cp's own failure catches that.
      - name: Stage kernel-variant assets into dist/
        run: |
          set -eu
          cp -f kernel-artifacts/zImage_dtb-* kernel-artifacts/linux-*.config \
                kernel-artifacts/legal-info-*.tar.gz dist/
          ls -la dist/

      ##########################################################################
      # /MiSTer.version -> RELEASE_DATE. LOAD-BEARING: db.json's linux.version
      # must equal, byte-for-byte, this baked value (docs/downloader-contract.md
      # §3/§12) — see docs/ci.md#mister-version-coupling.
      ##########################################################################
      - name: Extract and validate /MiSTer.version from the built image
        id: mister_version
        run: |
          set -eu
          workdir=$(mktemp -d ./mister-version.XXXXXX)
          debugfs -R "rdump /MiSTer.version ${workdir}" output/images/linux.img >/dev/null 2>"${workdir}.debugfs.log" || true
          verfile="${workdir}/MiSTer.version"
          if [ ! -f "$verfile" ]; then
            echo "::error::debugfs could not extract /MiSTer.version from output/images/linux.img" >&2
            sed 's/^/    /' "${workdir}.debugfs.log" >&2 || true
            exit 1
          fi
          n=$(wc -c < "$verfile")
          if [ "$n" -ne 6 ]; then
            echo "::error::/MiSTer.version is ${n} bytes, expected exactly 6 (docs/downloader-contract.md §3/§12)" >&2
            exit 1
          fi
          last_byte_hex=$(tail -c1 "$verfile" | od -An -tx1 | tr -d ' ')
          if [ "$last_byte_hex" = "0a" ]; then
            echo "::error::/MiSTer.version ends in a newline -- this permanently breaks the Downloader's version-equality check (docs/downloader-contract.md §3)" >&2
            exit 1
          fi
          yymmdd=$(cat "$verfile")
          case "$yymmdd" in
            [0-9][0-9][0-9][0-9][0-9][0-9]) : ;;
            *)
              echo "::error::/MiSTer.version content '$yymmdd' is not 6 ASCII digits" >&2
              exit 1
              ;;
          esac
          # Verify the build honored the MISTER_VERSION override (ADR 0018):
          # /MiSTer.version must equal what we asked post-build.sh to bake.
          if [ "$yymmdd" != "${MISTER_VERSION:-}" ]; then
            echo "::error::built /MiSTer.version '$yymmdd' != requested MISTER_VERSION '${MISTER_VERSION:-<unset>}' -- post-build.sh did not honor the override" >&2
            exit 1
          fi
          # Assumption, flagged: century is hardcoded "20" (valid until the
          # year 2100). /MiSTer.version itself only ever carries YYMMDD, same
          # as stock's own convention (e.g. "250402" for release_20250402.7z).
          release_date="20${yymmdd}"
          echo "release_date=${release_date}" >> "$GITHUB_OUTPUT"
          echo "Resolved /MiSTer.version='${yymmdd}' -> RELEASE_DATE=${release_date}"

      ##########################################################################
      # Fetch + verify the pinned stock archive — MUST fully verify (MD5+size,
      # then a separate 7z internal-CRC test) before extracting a byte. These
      # four steps call scripts/verify-stock-payload.sh (runnable standalone);
      # the STOCK_* pins live only in this job's env: block above. See
      # docs/ci.md#stock-payload-verification.
      ##########################################################################
      - name: Fetch pinned stock release archive
        run: scripts/verify-stock-payload.sh fetch-stock stock_release.7z

      - name: Verify stock archive integrity (MD5, SHA-256, size)
        run: scripts/verify-stock-payload.sh verify-stock stock_release.7z

      - name: Extract files/linux/* from the verified stock archive
        run: scripts/verify-stock-payload.sh extract-stock stock_release.7z stock-extract

      - name: Re-verify stock uboot.img and updateboot hashes (defense in depth)
        run: scripts/verify-stock-payload.sh verify-uboot stock-extract

      ##########################################################################
      # Overlay our freshly built linux.img/zImage_dtb onto the verified stock
      # files/linux/ tree — mirrors the real Downloader's own on-device rsync.
      # See docs/ci.md#stock-payload-verification.
      ##########################################################################
      - name: Assemble release tree (files/linux/*)
        run: |
          set -eu
          mkdir -p release-stage
          cp -a stock-extract/files release-stage/files
          cp -f output/images/linux.img release-stage/files/linux/linux.img
          cp -f output/images/zImage_dtb release-stage/files/linux/zImage_dtb
          echo "release-stage/files/linux/ contents:"
          find release-stage/files/linux -maxdepth 1 -printf '%f\n' | sort

      - name: Create release_${RELEASE_DATE}.7z (plain solid LZMA2, no BCJ2)
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: |
          set -eu
          # Plain solid LZMA2, not stock's BCJ2 (a Windows-7-Zip-GUI artifact,
          # irrelevant here) — see docs/ci.md#stock-payload-verification.
          ( cd release-stage && 7z a -mx=9 -m0=lzma2 -ms=on "../dist/release_${RELEASE_DATE}.7z" files/ )
          echo "Created dist/release_${RELEASE_DATE}.7z"

      ##########################################################################
      # Verify with the EXACT pinned ARM 7za the real Downloader uses,
      # under qemu-arm — not a modern host 7z. See
      # docs/ci.md#stock-payload-verification.
      ##########################################################################
      - name: Fetch and verify the pinned ARM 7za
        run: scripts/verify-stock-payload.sh fetch-7za 7za

      # The pinned 7za is dynamically linked (glibc), not static -- qemu-arm
      # needs -L pointed at an ARM sysroot to resolve its loader/shared libs.
      # output/target (this job's own build) already has a matching glibc
      # sysroot, so it's reused here rather than installing armhf multiarch
      # packages on the runner. See docs/ci.md#stock-payload-verification.
      - name: Verify our archive extracts under the pinned ARM 7za (qemu-arm)
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: scripts/verify-stock-payload.sh roundtrip "dist/release_${RELEASE_DATE}.7z" ./7za downloader-extract output/target

      - name: Re-verify uboot.img/updateboot after the ARM-7za round trip
        run: scripts/verify-stock-payload.sh verify-uboot downloader-extract --hash-only

      - name: Verify archive layout matches the assembled contract tree
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: scripts/verify-stock-payload.sh verify-layout "dist/release_${RELEASE_DATE}.7z" release-stage

      # Generated ONCE, covering every asset (main seven + kernel-variant
      # extras) — no publish-side append step anymore. See
      # docs/ci.md#old-two-image-design-retired.
      - name: Generate SHA256SUMS
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: |
          set -eu
          ( cd dist && sha256sum "release_${RELEASE_DATE}.7z" linux.img zImage_dtb buildroot.config linux.config legal-info.tar.gz \
              zImage_dtb-* linux-*.config legal-info-*.tar.gz > SHA256SUMS )
          cat dist/SHA256SUMS

      ##########################################################################
      # sdcard installer image (TASKS.md P5.3, ADR 0017 §4 amended by ADR 0020).
      # Standalone flashable assets — never in release_YYYYMMDD.7z, never
      # referenced by db.json. See docs/ci.md#sdcard-contract.
      ##########################################################################

      # Reuses the stock archive already verified above by seeding
      # fetch-sdcard-payload.sh's own cache (it re-checks size+MD5+SHA-256, so
      # this is a hand-off of verified bytes, not a bypass). Skipped only on
      # an opt-in full-sdcard dispatch, where it would be pure redundancy. See
      # docs/ci.md#sdcard-contract and docs/ci.md#manual-full-sdcard-dispatch.
      - name: Build sdcard.img.xz (minimal installer image)
        if: ${{ !inputs.build_full_sdcard }}
        env:
          STAGE_DIR: ${{ github.workspace }}/output-sdcard-stage
          MISTER_RT_ZIMAGE: ${{ github.workspace }}/kernel-artifacts/zImage_dtb-rt
        run: |
          set -eu
          mkdir -p "$STAGE_DIR/.fetch-cache"
          cp -f stock_release.7z "$STAGE_DIR/.fetch-cache/stock_release.7z"
          scripts/mk-sdcard.sh
          ls -la output/images/sdcard.img output/images/sdcard.img.xz

      # Static, offline contract check (partition table, uboot.img head, FAT32
      # payload inventory vs docs/verification/sdcard-payload.md). STOCK_UBOOT_*
      # come from the job env for the default uboot head compare. Same skip
      # condition as the build step it verifies.
      - name: Verify sdcard.img (scripts/check-sdcard.sh)
        if: ${{ !inputs.build_full_sdcard }}
        run: scripts/check-sdcard.sh output/images/sdcard.img

      # Opt-in only: the full variant bundles _Console cores (much larger, needs
      # the GitHub Contents API). Runs only on a workflow_dispatch with the input
      # set. Reuses the same warm STAGE_DIR (stock archive + installer builds
      # already there), just adds the cores; fetch-sdcard-payload.sh reconciles.
      - name: Build + verify sdcard-full.img.xz (opt-in _Console cores)
        if: ${{ inputs.build_full_sdcard }}
        env:
          STAGE_DIR: ${{ github.workspace }}/output-sdcard-stage
          MISTER_RT_ZIMAGE: ${{ github.workspace }}/kernel-artifacts/zImage_dtb-rt
          SDCARD_CORES: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eu
          mkdir -p "$STAGE_DIR/.fetch-cache"
          cp -f stock_release.7z "$STAGE_DIR/.fetch-cache/stock_release.7z"
          scripts/mk-sdcard.sh
          scripts/check-sdcard.sh output/images/sdcard-full.img
          ls -la output/images/sdcard-full.img output/images/sdcard-full.img.xz

      # Into dist/ so the existing "Upload release asset bundle" step carries them
      # to the publish job. sdcard-full.img.xz is only present when the opt-in
      # step above ran.
      - name: Stage sdcard image(s) into dist/
        run: |
          set -eu
          # Stage whichever variant(s) this run actually built. A tag push builds
          # the minimal image; an opt-in full dispatch (which SKIPS the minimal
          # build above, since the tag already carries it) builds only the full
          # one. The publish job's `gh release upload --clobber` then adds/refreshes
          # exactly what landed in dist/, leaving any already-attached asset intact.
          if [ -f output/images/sdcard.img.xz ]; then
            cp -f output/images/sdcard.img.xz dist/sdcard.img.xz
          fi
          if [ -f output/images/sdcard-full.img.xz ]; then
            cp -f output/images/sdcard-full.img.xz dist/sdcard-full.img.xz
          fi
          ls -la dist/

      # --- Release overview on the run's Summary page ------------------------
      # The tag, the internal version, the archive + image sizes, the full
      # SHA256SUMS, and -- most importantly -- the draft/db.json coupling a
      # human needs to understand before clicking Publish.
      - name: Release overview (job summary)
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          set -u
          # shellcheck source=scripts/ci-lib.sh
          # Explicit fallback if ci-lib.sh is missing, rather than a silent
          # abort. See docs/ci.md#ci-lib-source-fallback.
          source scripts/ci-lib.sh || {
            echo "::warning::scripts/ci-lib.sh not found -- size facts below will read n/a" >&2
            ci_lib_sz() { echo "n/a"; }
          }
          arc="dist/release_${RELEASE_DATE}.7z"
          assets=$(find dist -maxdepth 1 -type f | wc -l)
          {
            echo "## 🚀 Release build summary"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Tag | \`${TAG}\` |"
            echo "| Internal version (\`/MiSTer.version\`) | \`${RELEASE_DATE}\` |"
            echo "| Archive | \`release_${RELEASE_DATE}.7z\` ($(ci_lib_sz "$arc")) |"
            echo "| linux.img | $(ci_lib_sz dist/linux.img) |"
            echo "| zImage_dtb | $(ci_lib_sz dist/zImage_dtb) |"
            echo "| Assets staged | ${assets} |"
            echo ""
            echo "**Verified before packaging:** stock archive MD5/SHA-256/size + 7z CRC · \`uboot.img\`/\`updateboot\` byte-identical to stock (before *and* after the archive round-trip) · our \`.7z\` extracts under the pinned ARM \`7za\` (qemu-arm) · archive member list matches docs/downloader-contract.md · rootfs passes the non-hardware parity suite (\`ci-tests.sh\`) and the ABI/SONAME checker (section above)."
            echo ""
            echo "**Next:** the \`publish\` job attests build provenance and creates a **DRAFT** GitHub Release. A draft is not public and does **not** trigger db.json publication (\`publish-db.yml\` gates on a *published, non-draft* release) until a human clicks **Publish**."
            echo ""
            echo "<details><summary>SHA256SUMS</summary>"
            echo ""
            echo '```'
            cat dist/SHA256SUMS 2>/dev/null || echo "(SHA256SUMS not found)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      # A second, differently-timed disk/cache sample than the build action's
      # own (action.yml, if: always()) — taken AFTER the stock-archive
      # re-fetch, archive assembly, and sdcard builds, which are what's most
      # likely to exhaust the runner's disk. Not a duplicate; do not remove.
      # See docs/ci.md#disk-usage-double-sample.
      - name: Report disk & cache usage
        if: always()
        run: |
          echo "--- disk free ---"; df -h .
          echo "--- dl/ ---"; du -sh dl 2>/dev/null || true
          echo "--- output/host ---"; du -sh output/host 2>/dev/null || true
          echo "--- output (total) ---"; du -sh output 2>/dev/null || true
          echo "--- ccache ---"; du -sh "$GITHUB_WORKSPACE/.ccache" 2>/dev/null || true
          echo "--- dist/ ---"; ls -la dist/ 2>/dev/null || true

      # sha-named, not ref_name: upload-artifact REJECTS '/' in names, and a
      # branch dispatch's ref_name can contain one. See
      # docs/ci.md#artifact-naming-slash-trap.
      - name: Upload release asset bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # ============================================================================
  # publish — attests provenance and creates the GitHub Release. Separate job
  # for the elevated write scopes (contents, id-token, attestations) the build
  # jobs must NOT have. See docs/ci.md#publish-job-scope.
  # ============================================================================
  publish:
    name: Attest provenance + create GitHub Release
    needs: build
    runs-on: ubuntu-26.04

    # Only ever create a Release for a TAG. On a tag push this is always true, so
    # existing behaviour is unchanged; it exists so a workflow_dispatch on a
    # NON-tag ref (used to build the opt-in full sdcard variant) still runs the
    # `build` job's build+verify but does NOT mint a branch-named release here.
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write        # create the Release and upload its assets
      id-token: write         # attest-build-provenance's OIDC token exchange
      attestations: write     # publish the attestation to this repo

    steps:
      # ONE bundle now — build stages everything (main seven, variant extras,
      # sdcard images, SHA256SUMS) — nothing to merge/append here anymore.
      # See docs/ci.md#old-two-image-design-retired.
      - name: Download release asset bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist-${{ github.sha }}
          path: dist

      - name: List downloaded assets
        run: ls -la dist/

      # Re-derives the variant registry from dist/SHA256SUMS (this checkout-
      # less job has no scripts/list-kernel-variants.sh on disk — see
      # docs/ci.md#variants) and asserts BY NAME that all three files exist
      # for EVERY variant. A glob-and-count check could only ever notice the
      # ALL-missing case; this backstops the attestation step below, which
      # cannot police itself either. See docs/ci.md#attest-provenance-scope.
      - name: Verify every kernel variant's assets survived the artifact round trip
        run: |
          set -euo pipefail
          if [ ! -f dist/SHA256SUMS ]; then
            echo "::error::dist/SHA256SUMS is missing -- the build job's 'Generate SHA256SUMS' step should have produced it; refusing to publish a release whose asset manifest did not survive the release-dist-${{ github.sha }} round trip" >&2
            exit 1
          fi
          # `hash  name` (two spaces; a leading '*' if it was ever hashed in
          # binary mode) -- take field 2, keep only the zImage_dtb-<variant>
          # rows, and strip the prefix to leave the variant names.
          mapfile -t variants < <(awk '{ sub(/^\*/, "", $2); print $2 }' dist/SHA256SUMS | sed -n 's/^zImage_dtb-\(.*\)$/\1/p' | sort -u)
          if [ "${#variants[@]}" -eq 0 ]; then
            echo "::error::dist/SHA256SUMS records no zImage_dtb-<variant> entries (expected at least \`rt\`) -- the build-kernel matrix runs on every trigger that reaches this job, so zero variants is a bug, not a valid empty state" >&2
            exit 1
          fi
          echo "kernel variants recorded in SHA256SUMS: ${variants[*]}"
          missing=0
          : > "$RUNNER_TEMP/variant-assets.txt"
          for v in "${variants[@]}"; do
            for f in "dist/zImage_dtb-$v" "dist/linux-$v.config" "dist/legal-info-$v.tar.gz"; do
              if [ ! -f "$f" ]; then
                echo "::error::kernel-variant asset $f is missing from dist/ although SHA256SUMS records variant \`$v\` -- it went missing between the build job staging it and this job downloading release-dist-${{ github.sha }}" >&2
                missing=1
                continue
              fi
              printf '%s\n' "$f" >> "$RUNNER_TEMP/variant-assets.txt"
            done
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::refusing to publish a release missing one or more kernel-variant assets" >&2
            exit 1
          fi
          cat "$RUNNER_TEMP/variant-assets.txt"

      # Attests only the shipped binaries; the zImage_dtb-* glob covers
      # whatever the kernel-variant matrix built. Do NOT rely on this action
      # to catch a missing variant asset itself — the verify step above is
      # what does that. See docs/ci.md#attest-provenance-scope.
      - name: Attest build provenance for the image assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/linux.img
            dist/zImage_dtb
            dist/zImage_dtb-*

      # Created as a DRAFT, deliberately: publish-db.yml only fires on a
      # published (non-draft) release — this is the human-approval gate
      # between "CI built an image" and "every subscribed MiSTer is offered
      # it." See docs/ci.md#release-draft-gate.
      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GH_REPO required: no checkout here, and gh ignores
          # $GITHUB_REPOSITORY — without it every `gh release` call dies at
          # repo-resolution and a green ~9h build silently produces NO
          # release. Inherited from origin/master's publish job; fixed here.
          # See docs/ci.md#gh-repo-bug.
          GH_REPO: ${{ github.repository }}
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          # sdcard*.img.xz — standalone assets, never in the 7z, never in
          # db.json (ADR 0017 §4 / ADR 0020). See docs/ci.md#sdcard-contract.
          assets=(
            dist/"release_${RELEASE_DATE}.7z"
            dist/linux.img
            dist/zImage_dtb
            dist/SHA256SUMS
            dist/buildroot.config
            dist/linux.config
            dist/legal-info.tar.gz
          )
          # Per-variant assets are read back from
          # $RUNNER_TEMP/variant-assets.txt (written by the verify step
          # above), not named or globbed here — a glob-and-count could only
          # ever notice the ALL-missing case. See
          # docs/ci.md#release-assets-array.
          mapfile -t variant_assets < "$RUNNER_TEMP/variant-assets.txt"
          if [ "${#variant_assets[@]}" -eq 0 ]; then
            echo "::error::no kernel-variant assets listed in \$RUNNER_TEMP/variant-assets.txt (expected at least zImage_dtb-rt, linux-rt.config, legal-info-rt.tar.gz) -- the 'Verify every kernel variant's assets survived the artifact round trip' step should have written them and failed the job if it could not; refusing to publish a release missing its kernel-variant assets" >&2
            exit 1
          fi
          assets+=("${variant_assets[@]}")
          [ -f dist/sdcard.img.xz ] && assets+=(dist/sdcard.img.xz)
          [ -f dist/sdcard-full.img.xz ] && assets+=(dist/sdcard-full.img.xz)
          # Added unconditionally (build-kernel always runs, so at least one
          # variant is guaranteed — the verify step above already failed the
          # job otherwise). The release-notes prose below is a hand-edit per
          # variant, same as mk-sdcard.sh's single bonus-kernel slot — see
          # docs/ci.md#variants for the full accounting.
          notes="Automated release build. Internal linux version (baked \`/MiSTer.version\`): ${RELEASE_DATE}. See SHA256SUMS for asset hashes and the attached build-provenance attestation (verify with \`gh attestation verify <asset> --owner ${{ github.repository_owner }}\`). The \`sdcard*.img.xz\` assets are standalone flashable installer images (ADR 0020); they are NOT part of release_${RELEASE_DATE}.7z and are not referenced by db.json.

          **PREEMPT_RT beta (Linux 7.2-rc4):** \`zImage_dtb-rt\` is a separately compiled real-time kernel (docs/rt-beta-kernel.md, ADR 0021 as amended 2026-07-18) — never referenced by db.json, so the Downloader will not offer it. The ONE \`linux.img\` above already contains BOTH kernels' module trees, so no separate rootfs exists and — once the device is running THIS release's \`linux.img\` (a linux.img from before this release carries only 6.18 modules, and the RT kernel would boot with none of its drivers) — no extra flash is needed: opt in by copying \`zImage_dtb-rt\` to \`/media/fat/linux/\` and adding \`bootimage=/linux/zImage_dtb-rt\` to u-boot.txt (remove the line to roll back). \`linux-rt.config\` is its kernel config; \`legal-info-rt.tar.gz\` carries the RT kernel's applied patches + SBOM (license texts and manifest.csv with the pinned upstream source URL+hash) — the complete corresponding source is this repo plus that referenced kernel.org archive (the full-image GPL source is in \`legal-info.tar.gz\`). The sdcard installer image also carries \`zImage_dtb-rt\` on its FAT payload. Status: not yet validated on hardware."
          # Upsert, not create-only: a tagged push already created the draft,
          # so an opt-in full-sdcard dispatch (same tag) must ADD assets
          # rather than fail on already-exists. See
          # docs/ci.md#release-assets-array.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber "${assets[@]}"
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes "$notes" \
              "${assets[@]}"
          fi

      - name: Publish summary (job summary)
        env:
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## 📦 Draft release created"
            echo ""
            echo "Draft GitHub Release **${TAG}** created (internal version \`${RELEASE_DATE}\`); build provenance attested for \`linux.img\`, \`zImage_dtb\` and \`zImage_dtb-rt\`. The three \`*-rt\` assets are the PREEMPT_RT beta kernel (ADR 0021 as amended — its MODULES ride inside the one \`linux.img\`) — separate downloads, never in the 7z, never in db.json."
            echo ""
            echo "> ⚠️ **This is a draft.** It is not public, and db.json is **not** published while it stays a draft."
            echo "> Clicking **Publish release** — whether as a full release *or* a pre-release — fires \`publish-db.yml\`, which regenerates and publishes db.json to opted-in devices. **The pre-release flag does not prevent that** (the guard there checks draft, not pre-release). For a smoke test, leave it a draft and delete it when done."
          } >> "$GITHUB_STEP_SUMMARY"
