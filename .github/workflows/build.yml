################################################################################
#
# build.yml — CI build workflow (TASKS.md P4.1, PLAN.md §9 "Build").
#
# Builds the image via this repo's own `make all`, runs the parity suite +
# ABI/SONAME checker against it, and uploads the images + SBOM. See
# docs/ci.md#pipeline-map.
#
# Kernel variants build first via `build-kernel` (ADR 0021) -- see
# docs/ci.md#kernel-variant-matrix and that job's own comment below.
#
# The build recipe (disk reclaim, caches, apt deps, defconfig, `make all`)
# lives in .github/actions/buildroot-build, SHARED with release.yml and
# reproducibility.yml -- read its header before touching how the build runs.
# Drift here once cost 5 failed runs before the fix reached all three.
# See docs/ci.md#why-shared-recipe.
#
# check-abi.sh (P2.2) runs below; ci-tests.sh separately re-checks the two
# highest-value gates (A-10/A-22) on purpose. See docs/ci.md#abi-checker-overlap.
#
################################################################################

name: Build

# ~3h20m cold; the kernel-variant matrix (ADR 0021) runs serially before
# `build`. Do not demote `build-kernel` to push/dispatch-only with a bare
# `if:` -- 3 other places hard-code "the kernel legs always ran" (`build`'s
# own `if:`, the `status` truth table, and the merge-kernel-modules zero-tars
# guard) and would need updating too. See docs/ci.md#kernel-gate-cascade.
#
# What triggers the pipeline is a budget decision, not a detail.
#
# 1. `push` is scoped to master -- do not widen back to a bare `push:`. It
#    once double-built every PR commit (~6h40m/commit; confirmed from run
#    history, not deduced). See docs/ci.md#push-trigger-scope.
#
# 2. Doc-only skip is decided by the `gate` job below, NOT `paths-ignore:` --
#    that stops the workflow reporting at all and wedges a required "Build"
#    branch-protection check forever. `gate` is a DENYLIST, not an allowlist:
#    an allowlist fails silently (forgotten path -> green, untested image);
#    the denylist only fails toward building. See docs/ci.md#gate-vs-paths-ignore.
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

# Cancel a superseded run for the same ref (e.g. a new push to an open PR)
# rather than burning CI minutes finishing a build nobody wants anymore.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo and uploads artifacts,
# both covered by the default `contents: read` — no token write scope needed.
permissions:
  contents: read

jobs:
  # Costs seconds. Decides whether the 3h20m job below is worth starting.
  #
  # Deliberately plain git rather than a paths-filter action: this repo pins
  # every action by SHA for supply-chain reasons, and a `git diff --name-only`
  # plus a `case` is not worth a new third-party dependency to review forever.
  gate:
    name: Decide whether a build is needed
    runs-on: ubuntu-26.04
    outputs:
      build_needed: ${{ steps.decide.outputs.build_needed }}
      kernel_variants: ${{ steps.variants.outputs.kernel_variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the diff range below reaches back to a base commit
          # that a shallow clone would not have.
          fetch-depth: 0

      # Computed UNCONDITIONALLY, before `decide` below -- `build-kernel`'s
      # matrix needs a well-formed array even on a doc-only run where the job
      # then never executes. Only a genuine repo bug should fail this step.
      # See docs/ci.md#variants.
      - name: Derive kernel-variant matrix
        id: variants
        run: |
          set -euo pipefail
          json=$(scripts/list-kernel-variants.sh)
          echo "kernel_variants=$json" >> "$GITHUB_OUTPUT"

      - name: Decide
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # Denylist: only paths that provably cannot affect a compile are
          # skipped (docs/*, *.md, LICENSE, .editorconfig, .gitignore).
          # Verified once that no .md is read by the build -- re-verify
          # before trusting this list again. See docs/ci.md#gate-denylist.
          is_doc() {
            case "$1" in
              docs/*|*.md|LICENSE|.editorconfig|.gitignore) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Establish a diff range, or give up and build. Every unknown here
          # resolves to "build": a wasted run costs minutes, a wrongly-skipped
          # one ships an untested image.
          if [ "$EVENT" = "pull_request" ] && [ -n "${BASE_SHA:-}" ] \
             && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            range="${BASE_SHA}...HEAD"
          elif [ "$EVENT" = "push" ] && [ -n "${BEFORE:-}" ] \
               && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            range="${BEFORE}..HEAD"
          else
            echo "No usable diff range for event '$EVENT' (new branch, force-push, or missing base) -- building."
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff --name-only "$range" --)
          if [ -z "$files" ]; then
            echo "Empty diff over '$range' -- building rather than guessing why."
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "--- changed files ($range) ---"
          echo "$files"
          echo "---"

          needed=false
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            if ! is_doc "$f"; then
              echo "Build input touched: $f"
              needed=true
              break
            fi
          done <<< "$files"

          if [ "$needed" = "true" ]; then
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Build required."
          else
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Documentation-only change -- skipping the image build."
          fi

  # KERNEL-ONLY leg per variant (ADR 0021); runs before `build`, which
  # consumes its module tree -- a failed leg auto-skips `build` (see
  # `status`). Add a variant = one new configs/mister_<name>.fragment;
  # everything here derives from the name via `gate`. See docs/ci.md#variants.
  build-kernel:
    name: Build kernel (${{ matrix.kernel }})
    needs: gate
    if: needs.gate.outputs.build_needed == 'true'
    runs-on: ubuntu-26.04
    strategy:
      matrix:
        kernel: ${{ fromJSON(needs.gate.outputs.kernel_variants) }}

    # 240 min: an ESTIMATE -- no kernel-only leg has run yet. Re-derive from
    # real runs once they exist. See docs/ci.md#kernel-leg-timeout.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The shared leg recipe (build the variant, job-summary overview, stage
      # + upload the artifact) -- see .github/actions/kernel-leg. Both inputs
      # default to "false": manifest-only SBOM (a CI push distributes
      # nothing) and the CI-flavoured Trigger/Commit/Packages(SBOM) summary.
      - name: Build kernel leg (${{ matrix.kernel }})
        uses: ./.github/actions/kernel-leg
        with:
          kernel: ${{ matrix.kernel }}

  build:
    name: Build image (two-stage Buildroot)
    # needs on the matrix job aggregates ALL its legs; a failed (or cancelled)
    # leg therefore auto-skips this job — `status` below translates that skip
    # into "the kernel leg is the root cause", not a second failure.
    needs: [gate, build-kernel]
    if: needs.gate.outputs.build_needed == 'true'
    runs-on: ubuntu-26.04

    # 300 min = ~1.5x the measured first cold build (run 29300460591,
    # 3h19m47s). Cold is NOT rare: any toolchain-fingerprint change busts
    # that cache. See docs/ci.md#build-timeouts.
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # BEFORE the build (fails in ~1s, not after 300 min). Guards what the
      # build can't: `patch -p1` ignores mail headers, so a malformed
      # `From:` builds green and only breaks `git am` at export time.
      # See docs/ci.md#patch-lint-placement.
      - name: Lint kernel patch headers (git am-ability, both series)
        run: scripts/lint-kernel-patches.sh

      # Kernel-only defconfig is a manually mirrored COPY of the main
      # defconfig's toolchain/kernel stanzas -- this asserts it hasn't
      # drifted (a main-only edit is easy to forget to mirror).
      # See docs/ci.md#kernel-defconfig-lockstep.
      - name: Lint kernel-defconfig lockstep
        run: scripts/check-kernel-defconfig-sync.sh

      # Populates the overlay the build below consumes -- see
      # .github/actions/merge-kernel-modules and docs/ci.md#kernel-module-overlay.
      - name: Download + populate kernel-variant module overlay
        uses: ./.github/actions/merge-kernel-modules
        with:
          phase: download

      # Everything from "prepare the runner" to "linux.img + zImage_dtb exist".
      - name: Build the image
        uses: ./.github/actions/buildroot-build
        with:
          run-legal-info: "true"

      # Fails loudly on a silent overlay miss -- see
      # .github/actions/merge-kernel-modules and docs/ci.md#kernel-module-overlay.
      - name: Assert kernel-variant module trees merged
        uses: ./.github/actions/merge-kernel-modules
        with:
          phase: verify

      # --- Build overview on the run's Summary page (best-effort) ------------
      # See docs/ci.md#build-summary-step.
      - name: Build overview (job summary)
        run: |
          set -u
          # shellcheck source=scripts/ci-lib.sh
          # A missing ci-lib.sh must not blank the size cells below or abort
          # this best-effort step (GitHub's run steps carry an always-on -e)
          # -- fall back explicitly instead. See docs/ci.md#build-summary-step.
          source scripts/ci-lib.sh || {
            echo "::warning::scripts/ci-lib.sh not found -- size facts below will read n/a" >&2
            ci_lib_sz() { echo "n/a"; }
          }
          # ALL module trees in the image, not just the boot kernel's: since the
          # extra-modules overlay this list is the proof the variant trees are
          # really inside linux.img.
          kvers=$(find output/target/usr/lib/modules -mindepth 1 -maxdepth 1 -printf '%f\n' 2>/dev/null | LC_ALL=C sort | paste -sd', ' - || true)
          glibc=$(strings output/target/lib/libc.so.6 2>/dev/null | sed -n 's/.*release version \([0-9][0-9.]*[0-9]\).*/\1/p' | head -1)
          misterver=$(cat output/target/MiSTer.version 2>/dev/null || true)
          img=$(ci_lib_sz output/images/linux.img)
          zimg=$(ci_lib_sz output/images/zImage_dtb)
          pkgs=$( [ -f output/legal-info/manifest.csv ] && echo $(( $(wc -l < output/legal-info/manifest.csv) - 1 )) || echo "n/a" )
          case "${GITHUB_EVENT_NAME:-}" in
            push|workflow_dispatch) art="uploaded (mister-images + SBOM, 14-day retention)";;
            pull_request)           art="skipped (PR validation run -- artifacts upload on push/dispatch)";;
            *)                      art="n/a";;
          esac
          {
            echo "## 🧱 Build image summary"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Trigger | \`${GITHUB_EVENT_NAME:-?}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:12}\` |"
            echo "| Kernel module trees in image | \`${kvers:-n/a}\` |"
            echo "| glibc | \`${glibc:-n/a}\` |"
            echo "| \`/MiSTer.version\` | \`${misterver:-n/a}\` |"
            echo "| linux.img | ${img} |"
            echo "| zImage_dtb | ${zimg} |"
            echo "| Packages (SBOM) | ${pkgs} |"
            echo "| Artifacts | ${art} |"
            echo ""
            echo "Reproducible build (\`BR2_REPRODUCIBLE\`, pinned \`SOURCE_DATE_EPOCH\`). "
            echo "Parity suite (\`ci-tests.sh\`) and the ABI/SONAME section below run against this image."
          } >> "$GITHUB_STEP_SUMMARY"

      # Parity suite (ci-tests.sh) + ABI/SONAME checker (check-abi.sh) against
      # the built image -- see .github/actions/verify-image and
      # docs/ci.md#parity-suite. skip-qemu-system: "true" matches this job's
      # usual CI_TESTS_SKIP_QEMU_SYSTEM=1; pass "false" for the full six-boot
      # QEMU suite.
      - name: Run parity suite + ABI/SONAME checker
        uses: ./.github/actions/verify-image
        with:
          skip-qemu-system: "true"

      # --- Upload build artifacts: on push and manual dispatch ---------------
      # NOT on pull_request (avoids doubling storage per PR revision).
      # dispatch DOES upload -- once forgotten, a manual run finished green
      # but published nothing. See docs/ci.md#artifact-upload-gating.
      - name: Upload build artifacts
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mister-images-${{ github.sha }}
          path: |
            output/images/linux.img
            output/images/zImage_dtb
          if-no-files-found: error
          retention-days: 14

      # --- Upload SBOM / legal-info artifact (P4.2) --------------------------
      # Excludes sources/ + host-sources/ (every package's upstream tarball):
      # with them this artifact hit 2109 MB, 24x the images it accompanies --
      # a CI push distributes nothing, so there's no GPL obligation to carry
      # them here (release.yml ships the full bundle for distribution).
      # See docs/ci.md#legal-info-2gib-cap.
      - name: Package legal-info for upload (SBOM, without the source tarballs)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -eu
          # shellcheck source=scripts/ci-lib.sh
          source scripts/ci-lib.sh
          ci_lib_package_legal_info output legal-info.tar.gz manifest-only
          echo "SBOM artifact: $(du -h legal-info.tar.gz | cut -f1) (source tarballs excluded -- see release.yml for those)"

      - name: Upload SBOM artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: legal-info-${{ github.sha }}
          path: legal-info.tar.gz
          if-no-files-found: error
          retention-days: 14

  # THE JOB TO MARK AS THE REQUIRED STATUS CHECK, not `build` (which skips on
  # doc-only changes -- a skipped check never satisfies branch protection).
  # Always runs (`if: always()`) and turns the upstream results into one
  # honest answer -- this table is the spec the case statements below implement:
  #
  #   job succeeded        -> pass   (it compiled, it worked)
  #   all skipped, no need -> pass   (docs only; nothing to compile -- the point)
  #   job failed           -> FAIL   (do not let a skipped-vs-failed confusion
  #                                   turn a broken build into a green check)
  #   job cancelled        -> FAIL   (a superseded run is not evidence)
  #   build skipped because
  #   build-kernel failed  -> FAIL, but NAMED as the needs-cascade: the kernel
  #                           leg is the root cause, build's "skipped" is not a
  #                           second, separate workflow bug
  #   gate itself sick     -> FAIL   (if we cannot tell whether a build was
  #                                   needed, we have not established one wasn't)
  #
  # See docs/ci.md#status-job-rationale (ADR 0021 gating rationale, and why
  # needs.<job>.result is used instead of success()/failure()).
  status:
    name: Build status
    needs: [gate, build-kernel, build]
    if: always()
    runs-on: ubuntu-26.04
    steps:
      - name: Report
        env:
          GATE_RESULT: ${{ needs.gate.result }}
          KERNEL_RESULT: ${{ needs.build-kernel.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          BUILD_NEEDED: ${{ needs.gate.outputs.build_needed }}
        run: |
          set -euo pipefail
          echo "gate=$GATE_RESULT build-kernel=$KERNEL_RESULT build=$BUILD_RESULT build_needed=$BUILD_NEEDED"

          if [ "$GATE_RESULT" != "success" ]; then
            echo "::error::The gate job did not succeed ($GATE_RESULT), so whether a build was needed is unknown. Failing rather than assuming it wasn't."
            exit 1
          fi

          rc=0
          case "$KERNEL_RESULT" in
            success)
              echo "build-kernel: every kernel leg built and uploaded its module tree."
              ;;
            skipped)
              if [ "$BUILD_NEEDED" = "true" ]; then
                echo "::error::The gate asked for a build and build-kernel was skipped anyway. That is a workflow bug, not a docs change."
                rc=1
              else
                echo "build-kernel: documentation-only change, no build needed."
              fi
              ;;
            *)
              echo "::error::build-kernel $KERNEL_RESULT. (Expect build to show as skipped below -- that is this failure cascading through needs, not a second bug.)"
              rc=1
              ;;
          esac

          case "$BUILD_RESULT" in
            success)
              echo "build: built and checked."
              ;;
            skipped)
              if [ "$BUILD_NEEDED" != "true" ]; then
                echo "build: documentation-only change, no build needed."
              elif [ "$KERNEL_RESULT" != "success" ]; then
                echo "build: skipped because build-kernel did not succeed -- the needs-cascade, already failed above."
              else
                echo "::error::The gate asked for a build and build was skipped anyway. That is a workflow bug, not a docs change."
                rc=1
              fi
              ;;
            *)
              echo "::error::build $BUILD_RESULT."
              rc=1
              ;;
          esac
          exit "$rc"
