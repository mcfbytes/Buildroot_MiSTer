# genimage config for the shipped, dd/Etcher-writable SD-card installer image
# (`sdcard.img` / `sdcard-full.img`; TASKS.md P5.3, PLAN §8, ADR 0017, ADR 0020).
#
# Modeled on work/buildroot/board/terasic/de10nano_cyclone5/genimage.cfg (same
# board family, same hdimage/0xA2-SPL shape), but the partition COUNT, ORDER and
# CONTENTS differ from that reference on purpose — see below. Do not "fix" this
# to look more like the terasic template; the order here is load-bearing.
#
# ---------------------------------------------------------------------------
# Why this partition order (data = p1, uboot = p2) and not the other way round
# ---------------------------------------------------------------------------
# This is the one fact in this file that can brick a board if gotten backwards,
# so it is over-cited rather than under-cited:
#
# * docs/boot-chain.md §2.1: the Cyclone V BootROM finds U-Boot's SPL by
#   scanning the MBR's (up to 4) partition-table ENTRIES **in table order**
#   for the first one with sys_ind == 0xA2 — it does not care which entry
#   *slot* that is (1..4), only that it exists and is found before any other
#   0xA2 entry. So the 0xA2 partition is free to be entry 2.
#
# * docs/boot-chain.md §3.1 (entries 16-17) and §4: the STOCK `uboot.img` we
#   ship byte-identical (ADR 0017 §... / this file does not build U-Boot) has
#   a *compiled-in* environment with `mmc_boot=1`, `mmcroot=/dev/mmcblk0p1`,
#   and `load mmc 0:$mmc_boot $loadaddr $bootimage`. `mmc 0:1` in U-Boot's MMC
#   block-device code addresses partition-table ENTRY 1 literally (array
#   index 0), independent of that entry's on-disk byte offset. We do not
#   patch this env (no u-boot.txt override for mmcroot ships by default), so
#   the FAT32 data partition MUST be table entry 1 — i.e. `/dev/mmcblk0p1` —
#   or U-Boot loads `/linux/zImage_dtb` from the wrong (0xA2) partition and
#   the board does not boot.
#
# * docs/boot-chain.md §5: `updateboot`'s "new layout" branch
#   (`dd ... of=/dev/mmcblk0p2`) confirms this is also the layout of every
#   real, currently-shipping MiSTer card: p1 = data, p2 = 0xA2 boot.
#
# * board/mister/de10nano/installer-overlay/init (the sibling first-boot
#   installer this image boots into) hard-asserts the same contract at
#   runtime: `P1="$(partdev "$DISK" 1)"` / `P2="$(partdev "$DISK" 2)"`, then
#   `[ "$DATA_PART" = "$P1" ] || rescue "..."`. Both the small image built by
#   *this* genimage config and the full-size exFAT card the installer
#   produces on reformat must reproduce p1=data/p2=uboot, or that assertion
#   trips (by design — a wrong layout is a rescue-shell banner, not a brick).
#
# genimage assigns MBR partition-table entry numbers strictly in the order
# `partition` sections are declared in this file (verified against genimage's
# image-hd.c: it walks the partition list once, writing each into the next
# mbr.part_entry[i] slot; on-disk placement, controlled separately by each
# partition's default "place after the previous partition" behaviour, is NOT
# consulted for entry numbering). So: declare `data` first -> p1; `uboot`
# second -> p2. This also happens to lay them out in that same physical
# order on the card (data first, uboot's 4 MiB tail last), which matches how
# the installer's own sfdisk step (RESERVED_SECTORS=8192 = 4 MiB "reserved
# tail") repartitions the final full-size exFAT card.
#
# The MBR "bootable"/active flag is irrelevant to the Cyclone V BootROM
# (docs/boot-chain.md §2.1 — it keys strictly on the partition TYPE byte,
# 0xA2, not the active flag), so it is not set on either partition here.
#
# ---------------------------------------------------------------------------
# Inputs this file expects to find in genimage's --inputpath at build time
# (produced by scripts/mk-sdcard.sh; the two names below are the exact
# contract between mk-sdcard.sh and this file -- keep them in sync):
#
#   uboot.img            The stock U-Boot blob, byte-identical, hash-pinned
#                         (STOCK_UBOOT_SHA256, see .github/workflows/release.yml
#                         and scripts/fetch-sdcard-payload.sh). Written RAW to
#                         the start of the 0xA2 partition per boot-chain §2.
#                         NOTE: this is a second, separate copy of the same
#                         blob from the one mk-sdcard.sh also stages inside
#                         the vfat payload at mister-payload/linux/uboot.img
#                         (the installer dd's THAT copy onto the *new* p2 it
#                         creates on reformat -- this genimage-level copy only
#                         ever boots the *pristine, shipped* card once).
#
#   sdcard-payload.vfat  A prebuilt FAT32 filesystem image (mkfs.vfat + mcopy
#                         -s of the staging tree; genimage's own vfat-from-
#                         directory image type is not used here -- avoids its
#                         directory-layout limitations per PLAN §8). Its root
#                         must contain:
#                           /linux/zImage_dtb   the INSTALLER kernel+initramfs
#                                               (U-Boot's compiled-in
#                                               bootfile=/linux/zImage_dtb)
#                           /mister-payload/... everything the installer
#                                               copies onto the reformatted,
#                                               full-size exFAT card (see
#                                               docs/verification/sdcard-payload.md)
#                         genimage takes this partition's size directly from
#                         the file's own size (no `size =` below), so
#                         mk-sdcard.sh controls the FAT32 partition size by
#                         choosing how large it makes this file.
#
# Typical invocation (mk-sdcard.sh):
#   genimage --rootpath "$ROOTPATH" --tmppath "$GENIMAGE_TMP" \
#            --inputpath "$INPUTS_DIR" --outputpath "$OUT_DIR" \
#            --config board/mister/de10nano/genimage-sdcard.cfg
# producing $OUT_DIR/sdcard.img, which mk-sdcard.sh then xz's to
# output/images/sdcard.img.xz (or sdcard-full.img.xz under SDCARD_CORES=1).

image sdcard.img {
	hdimage {
	}

	# Partition 1 / /dev/mmcblk0p1 -- MUST be entry 1 (see header). Holds the
	# installer kernel + the full mister-payload tree that the installer
	# copies onto the reformatted exFAT card.
	partition data {
		partition-type = 0xc
		image = "sdcard-payload.vfat"
	}

	# Partition 2 / /dev/mmcblk0p2 -- MUST be entry 2 (see header). Raw SPL +
	# U-Boot proper (boot-chain §2), read by BootROM/SPL directly from this
	# partition's start; no filesystem inside it.
	#
	# size = 4M (8192 sectors) mirrors the RESERVED_SECTORS constant the
	# installer's own sfdisk step uses for the equivalent tail partition on
	# the reformatted card (installer-overlay/init); uboot.img itself is
	# ~503 KiB, so this pads it out with the same headroom on both the
	# shipped image and the post-install card rather than a tight ">= 1 MiB"
	# fit that the two would disagree on.
	partition uboot {
		partition-type = 0xa2
		image = "uboot.img"
		size = 4M
	}
}
