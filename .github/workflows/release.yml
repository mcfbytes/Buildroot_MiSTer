################################################################################
#
# release.yml — tag-triggered release workflow + build provenance (TASKS.md
# P4.4, PLAN.md §9 "Build", docs/downloader-contract.md P0.6).
#
# Builds the image using the SAME recipe as build.yml (P4.1) — literally the
# same code: .github/actions/buildroot-build — then assembles a GitHub Release
# whose assets are consumable by three completely different downstream actors:
#
#   1. A HUMAN downloading `linux.img` / `zImage_dtb` / configs / SBOM
#      directly from the Release page.
#   2. The on-device `Downloader_MiSTer` (`LinuxUpdater`), which NEVER talks
#      to GitHub Releases directly — it fetches whatever URL a db.json's
#      `linux.url` field names (P4.5, a separate task) and feeds it straight
#      to a PINNED, OLD, STATIC ARM `7za` binary it already has on the SD
#      card. That binary only ever sees `release_YYYYMMDD.7z`. Every
#      assertion in this file about extraction/layout exists to protect
#      actor #2, because nothing else in the pipeline will catch a mistake
#      there — see docs/downloader-contract.md §4-§8, §12.
#   3. A HUMAN opting into the PREEMPT_RT / Linux-7.2 beta (ADR 0021 as
#      amended 2026-07-18, docs/rt-beta-kernel.md): `zImage_dtb-rt`,
#      `linux-rt.config`, `legal-info-rt.tar.gz`, built KERNEL-ONLY by the
#      `build-kernel` matrix job from the same tagged commit. The RT kernel's
#      MODULES ride inside the ordinary `linux.img` (the `build` job merges
#      every kernel leg's depmod'd tree via work/extra-modules-overlay), so
#      opting in is copying one file + one u-boot.txt line — no separate RT
#      rootfs exists anymore. The kernel file itself is deliberately NOT
#      inside release_YYYYMMDD.7z and NEVER referenced by db.json — pushing
#      an RT KERNEL at every subscribed device stays an OPEN human decision
#      in ADR 0021 (the amendment notes the modules-in-image half actually
#      STRENGTHENS the eventual case).
#
# WHY THIS REBUILDS INSTEAD OF DEPENDING ON build.yml'S RUN: a release must be
# built from the tagged commit by a job whose provenance we attest, not adopted
# from some earlier run's artifacts. But the BUILD ITSELF is no longer duplicated
# — it was, and that was a latent bug: the five fixes build.yml needed to go
# green (no container, disk reclaim, defconfig step, non-root, workspace-keyed
# toolchain caches) never reached this file, so the first real tag push would
# have failed here. The recipe now lives once, in
# .github/actions/buildroot-build; read its header before touching the build.
#
# SAME REASONING, APPLIED TO VERIFICATION: because we rebuild rather than adopt,
# we also RE-VERIFY rather than trust. This workflow runs the full non-hardware
# suite build.yml runs -- scripts/ci-tests.sh (P3.12) then scripts/check-abi.sh
# (P2.2) -- against its own fresh build of the tagged commit, before packaging.
# Running only one of that pair would be an incoherent middle: the "the commit
# already passed build.yml on master" argument for skipping either applies
# equally to both, and a v* tag can point at a commit master never saw.
#
# THE ONE THING THIS FILE CANNOT DO ITSELF: vendor the stock `uboot.img` /
# `files/linux/` auxiliary payload (updateboot, config templates,
# u-boot.txt_example, MidiLink.INI, ppp_options, the samba/user-startup/
# wpa_supplicant templates, gamecontrollerdb/, mt32-rom-data/, soundfonts/).
# G6 forbids committing binaries to git, and several of those files ARE
# binary (uboot.img; arguably the ROM/soundfont payloads). So this workflow
# FETCHES them, at release time, from the exact same commit-pinned stock
# archive `docs/reference-materials.md` / `docs/downloader-contract.md`
# already verified byte-for-byte in this repo:
#
#   https://raw.githubusercontent.com/MiSTer-devel/SD-Installer-Win64_MiSTer/
#     b8531c7848526d9a8227841923cc4a493cb6e631/release_20250402.7z
#   MD5 8dc3acae7d758a80a363fbd7ad31d95d, SHA-256
#   5d087d9c501b2bc50aaf918146e7bf30e5981c08268d5a0e67a3233a4da642ba,
#   93,727,644 bytes — all three checked below BEFORE anything is extracted
#   from it. Individual `uboot.img`/`updateboot` hashes are re-checked too
#   (docs/downloader-contract.md §8, §12.1) as belt-and-suspenders.
#
# TODO(open decision, flagged per task brief — see the authoring agent's
# final report for the full writeup): this is a real, working, hash-pinned
# source for the stock payload, not a fabrication — but it is still a
# dependency on a THIRD-PARTY repo's git blob outside this project's control,
# and `mt32-rom-data/`/`soundfonts/` carry content this project did not
# author. Both are pre-existing facts of every MiSTer distribution (this
# workflow does not introduce them), but a human should sanity-check this
# sourcing choice before the first real tag push, not just this comment.
#
# TAG CONVENTION: no tag convention exists anywhere in this repo as of this
# writing (`git tag -l` is empty; TASKS.md never specifies one). This file
# picks `v*` (e.g. `v1.0.0`, `v2026.07.13-1`) purely because the task brief
# suggested it as a default — it is NOT derived from any existing project
# decision and should be revisited/ratified by a human. Separately, and
# DELIBERATELY DECOUPLED from the git tag: the internal `release_YYYYMMDD.7z`
# filename and the db.json `linux.version` (P4.5) are driven by
# `/MiSTer.version`, which `board/mister/de10nano/post-build.sh` bakes into the
# image from the `MISTER_VERSION` this workflow derives from the TAGGED COMMIT's
# date (ADR 0018). It deliberately does NOT come from SOURCE_DATE_EPOCH: that is
# pinned to a constant for reproducibility, so every release would have claimed
# the same version and the Downloader — which compares db.json's `version` to
# the on-device `/MiSTer.version` — would have re-flashed on every single run.
#
################################################################################

name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual runs exist ONLY to build the opt-in "full" sdcard variant (bundles
  # _Console cores) — the default tagged build already produces the minimal
  # sdcard.img.xz. Dispatch this AGAINST A TAG (the GitHub UI's "Use workflow
  # from" ref picker accepts tags) so github.ref_name is the release tag and the
  # publish job attaches the assets to that tag's draft release. A dispatch on a
  # branch still builds + verifies the images in `build`, but the publish job is
  # guarded to tag refs (see its `if:`), so it never mints a branch-named release.
  workflow_dispatch:
    inputs:
      build_full_sdcard:
        description: 'Also build + publish sdcard-full.img.xz (bundles _Console cores). Off by default; the minimal sdcard.img.xz is always built.'
        type: boolean
        default: false

# A re-pushed (corrected) tag should supersede an in-flight run for the same
# tag; distinct tags already get distinct concurrency groups via github.ref,
# so this never cancels a run for a DIFFERENT release.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege at the workflow level; the `publish` job elevates its own
# permissions block (contents: write, id-token: write, attestations: write)
# only for the steps that actually need them (attest + create the release).
permissions:
  contents: read

jobs:
  # ============================================================================
  # build-kernel — the kernel-variant matrix (ADR 0021 as amended 2026-07-18),
  # KERNEL-ONLY Buildroot builds run BEFORE `build` because `build` merges the
  # legs' module trees into the one shipped linux.img. Each leg hands `build`
  # an artifact carrying: zImage_dtb-<name>, linux-<name>.config, the depmod'd
  # modules tar + its kver, and legal-info-<name>.tar.gz — the FULL kernel
  # GPL-source bundle (unlike build.yml's manifest-only SBOM transport): a
  # release DISTRIBUTES the variant kernel binary, so its accompanying source
  # obligation is real, and kernel-only it is small (~250-300 MB).
  #
  # No MISTER_VERSION derivation here: nothing in a kernel-only build bakes it
  # (there is no rootfs to write /MiSTer.version into) — the duplicate step the
  # old two-image design carried is gone, not forgotten.
  #
  # Adding a variant = one matrix entry (plus its fragment + Makefile targets).
  # NO `container:` — see .github/actions/buildroot-build (same as build).
  # ============================================================================
  build-kernel:
    name: Build kernel (${{ matrix.kernel }})
    runs-on: ubuntu-26.04
    strategy:
      matrix:
        kernel: [rt]

    # Same honestly-unmeasured estimate as build.yml's build-kernel: cold =
    # cross-toolchain (~1h) + stage-1 initramfs (~30 min) + one kernel build;
    # 240 is ~2x that. Re-derive from real runs once they exist.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build the kernel variant
        uses: ./.github/actions/buildroot-build
        with:
          variant: ${{ matrix.kernel }}
          run-legal-info: "true"

      # Best-effort overview, mirroring build.yml's kernel leg: every fact
      # guarded, a missing one never fails the build. Uniqueness-guarded
      # linux-[0-9]* glob for the same reasons documented there.
      - name: Kernel build overview (job summary)
        env:
          KERNEL: ${{ matrix.kernel }}
          TAG: ${{ github.ref_name }}
        run: |
          set -u
          kver=$(basename "$(ls -d "output-$KERNEL"/target/usr/lib/modules/*/ 2>/dev/null | head -1)" 2>/dev/null || true)
          rt="n/a"
          trees=(output-"$KERNEL"/build/linux-[0-9]*/)
          if [ "${#trees[@]}" -eq 1 ] && [ -d "${trees[0]}" ]; then
            kcfg="${trees[0]}.config"
            if [ -f "$kcfg" ]; then
              grep -qx 'CONFIG_PREEMPT_RT=y' "$kcfg" && rt="✅ CONFIG_PREEMPT_RT=y" || rt="❌ NOT SET"
            fi
          elif [ "${#trees[@]}" -gt 1 ]; then
            rt="n/a (${#trees[@]} kernel trees -- ambiguous)"
          fi
          sz() { [ -f "$1" ] && numfmt --to=iec-i --suffix=B "$(stat -c %s "$1")" || echo "n/a"; }
          {
            echo "## ⏱️ Kernel variant release build (${KERNEL})"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Tag | \`${TAG}\` |"
            echo "| Kernel | \`${kver:-n/a}\` |"
            echo "| PREEMPT_RT | ${rt} |"
            echo "| zImage_dtb (ships as \`zImage_dtb-${KERNEL}\`) | $(sz "output-$KERNEL/images/zImage_dtb") |"
            echo ""
            echo "Kernel-only build; its module tree merges into the shipped linux.img in \`build\`,"
            echo "and \`zImage_dtb-${KERNEL}\` / \`linux-${KERNEL}.config\` / \`legal-info-${KERNEL}.tar.gz\`"
            echo "become release assets."
          } >> "$GITHUB_STEP_SUMMARY"

      # Same uniqueness-guarded staging as build.yml's leg (see the comments
      # there), plus the FULL legal-info bundle with the same 2 GiB per-asset
      # guard the main legal-info step documents.
      - name: Stage the kernel artifact (zImage_dtb, config, modules, legal-info)
        env:
          KERNEL: ${{ matrix.kernel }}
        run: |
          set -euo pipefail
          # nullglob so a zero-match glob yields an EMPTY array, keeping the
          # counts in the guard errors truthful — see build.yml's staging step.
          shopt -s nullglob
          mkdir -p kernel-artifact
          cp "output-$KERNEL/images/zImage_dtb" "kernel-artifact/zImage_dtb-$KERNEL"

          trees=(output-"$KERNEL"/build/linux-[0-9]*/)
          if [ "${#trees[@]}" -ne 1 ] || [ ! -d "${trees[0]}" ]; then
            echo "::error::expected exactly one kernel tree at output-$KERNEL/build/linux-[0-9]*/ but found ${#trees[@]} -- cannot stage linux-$KERNEL.config (zero: the build produced no kernel tree; more than one: a stale sibling from a version bump)" >&2
            exit 1
          fi
          cp "${trees[0]}.config" "kernel-artifact/linux-$KERNEL.config"

          mods=(output-"$KERNEL"/target/usr/lib/modules/*/)
          if [ "${#mods[@]}" -ne 1 ] || [ ! -d "${mods[0]}" ]; then
            echo "::error::expected exactly one module tree under output-$KERNEL/target/usr/lib/modules/ but found ${#mods[@]} -- cannot stage the modules tar (zero: depmod/target-finalize never ran; more than one: a stale sibling from a version bump)" >&2
            exit 1
          fi
          kver=$(basename "${mods[0]}")
          printf '%s\n' "$kver" > "kernel-artifact/kver-$KERNEL.txt"
          tar -czf "kernel-artifact/modules-$KERNEL.tar.gz" -C "output-$KERNEL/target" usr/lib/modules

          if [ ! -d "output-$KERNEL/legal-info" ]; then
            echo "::error::output-$KERNEL/legal-info does not exist -- did 'make $KERNEL-legal-info' run?" >&2
            exit 1
          fi
          tar czf "kernel-artifact/legal-info-$KERNEL.tar.gz" \
            --exclude='legal-info/host-sources' \
            -C "output-$KERNEL" legal-info
          limit=$((2 * 1024 * 1024 * 1024))
          size=$(stat -c %s "kernel-artifact/legal-info-$KERNEL.tar.gz")
          echo "legal-info-$KERNEL.tar.gz: $size bytes ($((size / 1024 / 1024)) MiB)"
          if [ "$size" -ge "$limit" ]; then
            echo "::error::legal-info-$KERNEL.tar.gz is $((size / 1024 / 1024)) MiB, at or over GitHub's 2 GiB per-release-asset limit -- split the source bundle (see the main legal-info step's guard for options)." >&2
            exit 1
          fi
          ls -la kernel-artifact/

      # Named by sha, not ref_name, same as build.yml's kernel artifact: this is
      # same-run transport, and upload-artifact REJECTS '/' in artifact names —
      # every branch here is slash-named (feat/…, feature/…), so a ref_name-keyed
      # name would kill a branch dispatch right here, AFTER the multi-hour kernel
      # build, and auto-skip `build` with it. Applies to every artifact this run
      # both writes and reads (see the two other sha-named uploads below); tags
      # (v*) never contain '/', so tag pushes never cared.
      - name: Upload kernel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kernel-${{ matrix.kernel }}-${{ github.sha }}
          path: kernel-artifact/
          if-no-files-found: error
          retention-days: 14

  # ============================================================================
  # build — produces every release asset and the pinned-7za-verified archive,
  # then hands a single artifact bundle to `publish`. Runs AFTER the kernel
  # matrix (needs) so it can merge every leg's module tree into linux.img and
  # stage the leg assets into dist/.
  #
  # NO `container:` — see .github/actions/buildroot-build. A container job cannot
  # reclaim the host's ~30 GB of preinstalled software, and without that reclaim
  # a Buildroot build does not fit on a hosted runner at all (output/ is 24 GB).
  # ============================================================================
  build:
    name: Build image + assemble release_YYYYMMDD.7z
    needs: build-kernel
    runs-on: ubuntu-26.04

    # The measured cold main build is 3h19m (~199 min; run 29300460591), plus
    # fetching+verifying the ~90 MB stock archive, assembling the 7z, the pinned-ARM-
    # 7za round trip, and hashing everything. The sdcard steps below add mk-sdcard.sh
    # step 1 (the installer initramfs — a small static-musl Buildroot build with its
    # own toolchain, ~1 h) and step 2 (the kernel relink). CRUCIALLY, step 2 does NOT
    # do a second from-scratch Buildroot build: it REUSES the completed main build in
    # output/ and only re-links the kernel with the installer initramfs (~15 min each
    # way, snapshotting+restoring output/ so the shipped kernel is untouched — see
    # scripts/mk-sdcard.sh's build_installer_kernel). That reuse is deliberate and is
    # what keeps the whole job around ~5 h, comfortably inside GitHub-hosted runners'
    # HARD ~6 h (360 min) wall-clock cap. An EARLIER design ran a fresh full Buildroot
    # build (internal glibc toolchain + rootfs, ~3 h) per sdcard step in a new O=; two
    # of those stacked on the main build overran the 360-min cap and the release never
    # published — do not reintroduce a from-scratch O= here without moving the sdcard
    # assembly to its own job/workflow.
    timeout-minutes: 355

    outputs:
      release_date: ${{ steps.mister_version.outputs.release_date }}

    env:
      DEBIAN_FRONTEND: noninteractive

      # --- Pinned stock reference archive --------------------------------
      # docs/reference-materials.md §1, docs/downloader-contract.md §2/§8,
      # docs/verification/stock-release-20250402.md. This is the ONLY
      # source, anywhere in this pipeline, for uboot.img and the
      # files/linux/ auxiliary payload we do not (and per G6 must not)
      # vendor in git.
      STOCK_RELEASE_URL: https://raw.githubusercontent.com/MiSTer-devel/SD-Installer-Win64_MiSTer/b8531c7848526d9a8227841923cc4a493cb6e631/release_20250402.7z
      STOCK_RELEASE_MD5: 8dc3acae7d758a80a363fbd7ad31d95d
      STOCK_RELEASE_SHA256: 5d087d9c501b2bc50aaf918146e7bf30e5981c08268d5a0e67a3233a4da642ba
      STOCK_RELEASE_SIZE: "93727644"
      STOCK_UBOOT_SHA256: e2d46cf9fe1ec40ca2c9c7409870249f267e06f70e5736dc6d30b4e21fe62a64
      STOCK_UBOOT_SIZE: "515141"
      STOCK_UPDATEBOOT_SHA256: 6ff2d50a080e26d7173b61c52083e9cc42ca658db0c5031b4da1c45c74a562f2
      STOCK_UPDATEBOOT_SIZE: "407"

      # --- Pinned ARM static 7za --------------------------------------------
      # The EXACT binary the real on-device Downloader fetches once and
      # reuses forever (docs/downloader-contract.md §4). Its own upstream
      # URL is a floating branch ref (`raw/master/7za.gz`), not a commit pin
      # — that is a pre-existing fact of the Downloader's own source
      # (constants.py), not something this workflow can fix without
      # deviating from what real devices actually fetch. The MD5 check
      # below is the actual security control: any substituted content fails
      # the build loudly instead of silently.
      STOCK_7ZA_GZ_URL: https://github.com/MiSTer-devel/SD-Installer-Win64_MiSTer/raw/master/7za.gz
      STOCK_7ZA_GZ_MD5: ed1ad5185fbede55cd7fd506b3c6c699
      STOCK_7ZA_GZ_SIZE: "465600"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Must run BEFORE the build: post-build.sh reads MISTER_VERSION to bake
      # /MiSTer.version into the image (ADR 0018). Derive a 6-digit YYMMDD from
      # the TAGGED COMMIT's UTC date -- fixed per commit, so re-running a tag
      # reproduces the same version rather than silently minting a new one.
      # $GITHUB_ENV so every later step (including the build action) inherits it.
      # This is the ONLY job that derives it: the kernel legs bake nothing (no
      # rootfs), so there is no second copy to keep in lockstep anymore.
      - name: Derive release version (YYMMDD) from the tagged commit
        run: |
          set -eu
          v="${MISTER_VERSION:-$(TZ=UTC git show -s --format=%cd --date=format-local:%y%m%d HEAD)}"
          case "$v" in
            [0-9][0-9][0-9][0-9][0-9][0-9]) : ;;
            *) echo "::error::derived MISTER_VERSION '$v' is not 6 digits YYMMDD" >&2; exit 1 ;;
          esac
          echo "MISTER_VERSION=$v" >> "$GITHUB_ENV"
          echo "Release version (YYMMDD) = $v  ->  /MiSTer.version, release_20${v}.7z, db.json"

      # The kernel legs' artifacts: module trees for the overlay (next step),
      # kernel/config/legal-info files staged into dist/ further down.
      - name: Download kernel-variant artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: kernel-*-${{ github.sha }}
          path: kernel-artifacts
          merge-multiple: true

      # Same mechanism, same comments as build.yml's step of the same name: the
      # main defconfig's BR2_ROOTFS_OVERLAY folds this directory into the one
      # shipped linux.img at target-finalize.
      - name: Populate the extra-modules overlay from the kernel legs
        run: |
          set -euo pipefail
          mkdir -p work/extra-modules-overlay
          shopt -s nullglob
          tars=(kernel-artifacts/modules-*.tar.gz)
          if [ "${#tars[@]}" -eq 0 ]; then
            echo "::error::no modules-*.tar.gz found under kernel-artifacts/ -- the build-kernel legs uploaded nothing this job can merge" >&2
            exit 1
          fi
          for t in "${tars[@]}"; do
            echo "unpacking ${t##*/} into work/extra-modules-overlay/"
            tar -xzf "$t" -C work/extra-modules-overlay
          done
          echo "--- overlay module trees ---"
          find work/extra-modules-overlay/usr/lib/modules -mindepth 1 -maxdepth 1 -type d | sort

      # The shared recipe (disk reclaim, caches, apt, defconfig, `make all`).
      # p7zip-full is this job's own addition -- needed to CREATE
      # release_YYYYMMDD.7z. On Ubuntu 24.04+ it is a transitional package pulling
      # in `7zip`, which still ships /usr/bin/7z and /usr/bin/7za. NOTE this is a
      # DIFFERENT 7za than the pinned ARM static one fetched below: this one only
      # creates/inspects the archive on the x86_64 runner, while the pinned ARM
      # binary is what actually proves on-device compatibility.
      - name: Build the image
        uses: ./.github/actions/buildroot-build
        with:
          # p7zip-full assembles release_YYYYMMDD.7z (as before). The rest are the
          # build-HOST tools scripts/mk-sdcard.sh needs to assemble sdcard.img.xz:
          # genimage (the hdimage), mtools + dosfstools (build/populate the FAT32
          # payload partition), xz-utils (compress the image), and jq (parse the
          # _Console cores listing for the opt-in full variant). None of these
          # enter the shipped rootfs — they live on PATH only (PLAN §"Host
          # tooling"). xz-utils is already in the build action's mandatory set;
          # it is named here for intent and is a harmless duplicate.
          extra-apt-packages: p7zip-full genimage mtools dosfstools xz-utils jq
          run-legal-info: "true"

      # Same silent-overlay-miss guard as build.yml: a variant kernel shipped
      # without its modules in linux.img must fail HERE, not on a device.
      - name: Assert every kernel-variant module tree merged into the image
        run: |
          set -euo pipefail
          rc=0
          for f in kernel-artifacts/kver-*.txt; do
            kver=$(tr -d '[:space:]' < "$f")
            if [ -d "output/target/usr/lib/modules/$kver" ]; then
              echo "merged: $kver (${f##*/})"
            else
              echo "::error::kernel-variant module tree '$kver' (${f##*/}) is MISSING from output/target/usr/lib/modules/ -- the extra-modules overlay did not reach target-finalize" >&2
              rc=1
            fi
          done
          exit "$rc"

      # Non-hardware parity suite against the EXACT rootfs about to be shipped
      # (P3.12) -- the SAME bar build.yml applies to every master push, re-run
      # here because a v* tag may point at a commit build.yml never validated
      # identically (see this file's header on why the build is redone, not
      # adopted). ci-tests.sh + check-abi.sh are a pair in build.yml; running
      # one but not the other on the shipped image would be an incoherent middle.
      # CI_TESTS_SKIP_QEMU_SYSTEM=1 matches build.yml: the slow six-boot
      # qemu-*system* test is skipped; qemu-user (installed by the build action)
      # drives the rest. Cheap, and only ever runs on a tag push.
      - name: Run parity test suite (scripts/ci-tests.sh, P3.12)
        env:
          CI_TESTS_SKIP_QEMU_SYSTEM: "1"
        run: scripts/ci-tests.sh

      # Worth having precisely when the step above FAILED -- if: always() so a
      # failed release build still surfaces the machine-readable failure digest
      # (mirrors build.yml). ~2 KB; negligible.
      - name: Upload parity-suite results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # sha-named (matches build.yml): ref_name can carry '/' on a branch
          # dispatch, which upload-artifact rejects — see the kernel artifact's
          # naming comment in build-kernel.
          name: ci-tests-results-${{ github.sha }}
          path: output/ci-tests-results.txt
          if-no-files-found: warn
          retention-days: 14

      # Assert the ABI/SONAME contract on the EXACT rootfs about to be shipped
      # (docs/abi-contract.md §13.1, P2.2) -- a missing SONAME or a dropped glibc
      # compat stub blocks the release here, before anything is packaged. Also
      # writes the "ABI / SONAME parity" section onto the run's Summary page.
      # The stock-binary gates (A-10/A-22) SKIP in this clean checkout (work/ is
      # gitignored); the static ABI/loader checks run against output/target.
      - name: ABI / SONAME parity checker (P2.2)
        run: scripts/check-abi.sh output

      ##########################################################################
      # Assemble the flat `dist/` directory. The SEVEN main filenames staged
      # first are EXACTLY the seven release assets TASKS.md P4.4 names — the
      # Downloader-contract set, untouched. On top of them dist/ carries, per
      # kernel variant, three -<name>-suffixed extras taken from the leg
      # artifacts (zImage_dtb-<name>, linux-<name>.config,
      # legal-info-<name>.tar.gz — ADR 0021 as amended; for today's matrix
      # that is the three -rt files), plus the separately-contracted sdcard
      # images below. Everything from here on writes into dist/ or reads from
      # it; `publish` uploads it verbatim.
      ##########################################################################

      - name: Stage dist/ and copy the two image assets
        run: |
          set -eu
          mkdir -p dist
          cp -f output/images/linux.img dist/linux.img
          cp -f output/images/zImage_dtb dist/zImage_dtb

      - name: Copy buildroot.config and linux.config
        run: |
          set -eu
          cp -f output/.config dist/buildroot.config
          kernel_cfg_dir=$(ls -d output/build/linux-*/ 2>/dev/null | head -1)
          if [ -z "$kernel_cfg_dir" ]; then
            echo "::error::could not locate output/build/linux-*/ for linux.config" >&2
            exit 1
          fi
          cp -f "${kernel_cfg_dir}.config" dist/linux.config

      # A RELEASE distributes the image, so this one DOES carry the GPL
      # "accompanying source": legal-info/sources/ holds the upstream tarball of
      # every package we ship, alongside manifest.csv (package, version, license,
      # upstream URL) and the license texts.
      #
      # host-sources/ is excluded, deliberately. That is the source for the
      # BUILD-TIME toolchain (host-gcc, host-binutils, host-glibc, ...) -- none of
      # which is distributed in linux.img or zImage_dtb. The GPL obligation
      # attaches to the binaries we convey, not to the compiler that produced them
      # (which is itself freely available upstream, pinned by version+hash in
      # host-manifest.csv, which we DO ship). Buildroot emits host-sources/ for
      # completeness, not because distribution requires it.
      #
      # This is not merely a size optimisation, though it is that too: with
      # host-sources/ included the archive was 2109 MiB, and GitHub rejects any
      # single release asset over 2 GiB -- so the first real tag push would have
      # failed right here, at the upload. The guard below makes that failure mode
      # loud and early instead of a mysterious 500 from the API.
      - name: Archive legal-info as legal-info.tar.gz
        run: |
          set -eu
          if [ ! -d output/legal-info ]; then
            echo "::error::output/legal-info does not exist -- did 'make legal-info' run?" >&2
            exit 1
          fi
          tar czf dist/legal-info.tar.gz --exclude='legal-info/host-sources' -C output legal-info

          # GitHub's hard per-asset ceiling is 2 GiB. Fail here, with a clear
          # message, rather than at the upload.
          limit=$((2 * 1024 * 1024 * 1024))
          size=$(stat -c %s dist/legal-info.tar.gz)
          echo "legal-info.tar.gz: $size bytes ($((size / 1024 / 1024)) MiB)"
          if [ "$size" -ge "$limit" ]; then
            echo "::error::legal-info.tar.gz is $((size / 1024 / 1024)) MiB, at or over GitHub's 2 GiB per-release-asset limit. The package set has outgrown a single source bundle -- split it (e.g. sources/ as its own asset, or publish sources to a separate host and reference them from manifest.csv)." >&2
            exit 1
          fi

      # The per-variant release extras, straight from the leg artifacts (the
      # legs already applied the uniqueness guards and the legal-info size
      # guard). Copied by glob so a future matrix entry needs no edit here;
      # each glob must match at least once — zero matches means the download
      # step above silently changed shape, and cp's own failure catches that.
      - name: Stage kernel-variant assets into dist/
        run: |
          set -eu
          cp -f kernel-artifacts/zImage_dtb-* kernel-artifacts/linux-*.config \
                kernel-artifacts/legal-info-*.tar.gz dist/
          ls -la dist/

      ##########################################################################
      # /MiSTer.version -> RELEASE_DATE. LOAD-BEARING, read the comment.
      #
      # docs/downloader-contract.md §3/§12 requires the db.json `linux.version`
      # field's last 6 characters to equal, byte-for-byte, the /MiSTer.version
      # baked into linux.img. This job does not publish db.json (P4.5's job),
      # but it DOES name this release's archive `release_YYYYMMDD.7z`, and
      # that filename has always (see docs/verification/stock-release-*.md)
      # matched the version the archive carries. Per ADR 0018 that version is now
      # SET from the tagged commit (the "Derive release version" step above
      # exported MISTER_VERSION, and post-build.sh baked it into /MiSTer.version),
      # NOT derived from the constant SOURCE_DATE_EPOCH date. So this step now
      # VERIFIES the built image carries exactly the version we requested -- a
      # real image/tooling-mismatch guard -- and republishes it as RELEASE_DATE
      # for the archive name / SHA256SUMS / db.json, which must all agree.
      #
      # This RESOLVES the old constant-version hazard: distinct tags -> distinct
      # commit dates -> distinct /MiSTer.version + release_YYYYMMDD.7z + db.json
      # version, so the Downloader offers the update and then sees the box as up
      # to date. (Two tags on the SAME commit still map to one YYMMDD -- same
      # granularity as stock; fine unless back-to-back same-day releases are
      # ever needed.)
      ##########################################################################
      - name: Extract and validate /MiSTer.version from the built image
        id: mister_version
        run: |
          set -eu
          workdir=$(mktemp -d ./mister-version.XXXXXX)
          debugfs -R "rdump /MiSTer.version ${workdir}" output/images/linux.img >/dev/null 2>"${workdir}.debugfs.log" || true
          verfile="${workdir}/MiSTer.version"
          if [ ! -f "$verfile" ]; then
            echo "::error::debugfs could not extract /MiSTer.version from output/images/linux.img" >&2
            sed 's/^/    /' "${workdir}.debugfs.log" >&2 || true
            exit 1
          fi
          n=$(wc -c < "$verfile")
          if [ "$n" -ne 6 ]; then
            echo "::error::/MiSTer.version is ${n} bytes, expected exactly 6 (docs/downloader-contract.md §3/§12)" >&2
            exit 1
          fi
          last_byte_hex=$(tail -c1 "$verfile" | od -An -tx1 | tr -d ' ')
          if [ "$last_byte_hex" = "0a" ]; then
            echo "::error::/MiSTer.version ends in a newline -- this permanently breaks the Downloader's version-equality check (docs/downloader-contract.md §3)" >&2
            exit 1
          fi
          yymmdd=$(cat "$verfile")
          case "$yymmdd" in
            [0-9][0-9][0-9][0-9][0-9][0-9]) : ;;
            *)
              echo "::error::/MiSTer.version content '$yymmdd' is not 6 ASCII digits" >&2
              exit 1
              ;;
          esac
          # Verify the build honored the MISTER_VERSION override (ADR 0018):
          # /MiSTer.version must equal what we asked post-build.sh to bake.
          if [ "$yymmdd" != "${MISTER_VERSION:-}" ]; then
            echo "::error::built /MiSTer.version '$yymmdd' != requested MISTER_VERSION '${MISTER_VERSION:-<unset>}' -- post-build.sh did not honor the override" >&2
            exit 1
          fi
          # Assumption, flagged: century is hardcoded "20" (valid until the
          # year 2100). /MiSTer.version itself only ever carries YYMMDD, same
          # as stock's own convention (e.g. "250402" for release_20250402.7z).
          release_date="20${yymmdd}"
          echo "release_date=${release_date}" >> "$GITHUB_OUTPUT"
          echo "Resolved /MiSTer.version='${yymmdd}' -> RELEASE_DATE=${release_date}"

      ##########################################################################
      # Fetch + whole-archive-verify the pinned stock release archive. This
      # MUST pass before a single byte is extracted from it (docs/downloader-
      # contract.md §2's own ordering: MD5+size check, then a SEPARATE 7z
      # internal-CRC test, mirrored here for the same reason the real
      # Downloader does both).
      ##########################################################################
      - name: Fetch pinned stock release archive
        run: |
          set -eu
          curl -fL --retry 3 -o stock_release.7z "$STOCK_RELEASE_URL"

      - name: Verify stock archive integrity (MD5, SHA-256, size)
        run: |
          set -eu
          actual_size=$(stat -c %s stock_release.7z)
          if [ "$actual_size" != "$STOCK_RELEASE_SIZE" ]; then
            echo "::error::stock_release.7z size ${actual_size} != expected ${STOCK_RELEASE_SIZE}" >&2
            exit 1
          fi
          actual_md5=$(md5sum stock_release.7z | cut -d' ' -f1)
          if [ "$actual_md5" != "$STOCK_RELEASE_MD5" ]; then
            echo "::error::stock_release.7z MD5 ${actual_md5} != expected ${STOCK_RELEASE_MD5}" >&2
            exit 1
          fi
          actual_sha256=$(sha256sum stock_release.7z | cut -d' ' -f1)
          if [ "$actual_sha256" != "$STOCK_RELEASE_SHA256" ]; then
            echo "::error::stock_release.7z SHA-256 ${actual_sha256} != expected ${STOCK_RELEASE_SHA256}" >&2
            exit 1
          fi
          # Second, independent check: 7z's own internal CRCs, same as the
          # real Downloader's `7za t` step (docs/downloader-contract.md §5).
          7z t stock_release.7z >stock-7z-test.log 2>&1 || {
            echo "::error::7z t stock_release.7z failed (corrupt archive despite matching hash)" >&2
            cat stock-7z-test.log >&2
            exit 1
          }
          echo "Stock archive verified: size/MD5/SHA-256/internal-CRC all match."

      - name: Extract files/linux/* from the verified stock archive
        run: |
          set -eu
          mkdir -p stock-extract
          # Exactly the pattern+destination the real Downloader uses
          # (docs/downloader-contract.md §5) -- only files/linux/* exists
          # afterwards; the Windows-installer-only members (files/MiSTer,
          # files/menu.rbf, files/MiSTer_example.ini, files/Scripts/,
          # the .exe) are never extracted and never shipped by us: they
          # come from separate MiSTer-devel projects, not from this
          # Buildroot tree, and the Downloader never reads them either.
          7z x -y stock_release.7z "files/linux/*" -o"stock-extract"

      - name: Re-verify stock uboot.img and updateboot hashes (defense in depth)
        run: |
          set -eu
          uboot="stock-extract/files/linux/uboot.img"
          updateboot="stock-extract/files/linux/updateboot"
          for f in "$uboot" "$updateboot"; do
            [ -f "$f" ] || { echo "::error::missing $f after extraction" >&2; exit 1; }
          done
          u_size=$(stat -c %s "$uboot"); u_sha=$(sha256sum "$uboot" | cut -d' ' -f1)
          b_size=$(stat -c %s "$updateboot"); b_sha=$(sha256sum "$updateboot" | cut -d' ' -f1)
          [ "$u_size" = "$STOCK_UBOOT_SIZE" ] || { echo "::error::uboot.img size $u_size != $STOCK_UBOOT_SIZE" >&2; exit 1; }
          [ "$u_sha" = "$STOCK_UBOOT_SHA256" ] || { echo "::error::uboot.img sha256 $u_sha != $STOCK_UBOOT_SHA256 -- NOT byte-identical to stock, release-blocking (docs/downloader-contract.md §8/§12)" >&2; exit 1; }
          [ "$b_size" = "$STOCK_UPDATEBOOT_SIZE" ] || { echo "::error::updateboot size $b_size != $STOCK_UPDATEBOOT_SIZE" >&2; exit 1; }
          [ "$b_sha" = "$STOCK_UPDATEBOOT_SHA256" ] || { echo "::error::updateboot sha256 $b_sha != $STOCK_UPDATEBOOT_SHA256" >&2; exit 1; }
          echo "uboot.img and updateboot confirmed byte-identical to stock."

      ##########################################################################
      # Assemble our release tree: the ENTIRE verified stock files/linux/
      # payload, with linux.img/zImage_dtb overwritten by our own freshly
      # built ones -- the same overlay semantics the real Downloader's own
      # `rsync` performs on-device (docs/downloader-contract.md §7 step 4.2),
      # done here instead so the archive we SHIP already reflects the
      # post-update result.
      ##########################################################################
      - name: Assemble release tree (files/linux/*)
        run: |
          set -eu
          mkdir -p release-stage
          cp -a stock-extract/files release-stage/files
          cp -f output/images/linux.img release-stage/files/linux/linux.img
          cp -f output/images/zImage_dtb release-stage/files/linux/zImage_dtb
          echo "release-stage/files/linux/ contents:"
          find release-stage/files/linux -maxdepth 1 -printf '%f\n' | sort

      - name: Create release_${RELEASE_DATE}.7z (plain solid LZMA2, no BCJ2)
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: |
          set -eu
          # docs/downloader-contract.md §4's explicit recommendation: don't
          # reproduce stock's BCJ2 filter (an artifact of the Windows 7-Zip
          # GUI auto-detecting x86 executables in ITS archive, irrelevant to
          # ours) -- plain solid LZMA2 is well within what the pinned ARM
          # 7za understands, and is what gets verified below.
          ( cd release-stage && 7z a -mx=9 -m0=lzma2 -ms=on "../dist/release_${RELEASE_DATE}.7z" files/ )
          echo "Created dist/release_${RELEASE_DATE}.7z"

      ##########################################################################
      # Verify OUR archive with the EXACT pinned ARM static 7za the real
      # Downloader uses -- not a modern host 7z (docs/downloader-contract.md
      # §4's explicit "testing anything less specific doesn't prove the
      # constraint"). Runs under qemu-arm since it's a static ARM binary.
      ##########################################################################
      - name: Fetch and verify the pinned ARM 7za
        run: |
          set -eu
          curl -fL --retry 3 -o 7za.gz "$STOCK_7ZA_GZ_URL"
          actual_size=$(stat -c %s 7za.gz)
          [ "$actual_size" = "$STOCK_7ZA_GZ_SIZE" ] || { echo "::error::7za.gz size $actual_size != $STOCK_7ZA_GZ_SIZE" >&2; exit 1; }
          actual_md5=$(md5sum 7za.gz | cut -d' ' -f1)
          [ "$actual_md5" = "$STOCK_7ZA_GZ_MD5" ] || { echo "::error::7za.gz MD5 $actual_md5 != $STOCK_7ZA_GZ_MD5" >&2; exit 1; }
          gunzip -k 7za.gz
          chmod +x 7za
          echo "Pinned ARM 7za fetched and verified."

      - name: Verify our archive extracts under the pinned ARM 7za (qemu-arm)
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: |
          set -eu
          archive="dist/release_${RELEASE_DATE}.7z"
          # 1. Integrity test -- exactly the Downloader's first 7za invocation.
          qemu-arm ./7za t "$archive"
          # 2. Extraction -- exactly the Downloader's second invocation
          #    (docs/downloader-contract.md §5): files/linux/* only, into a
          #    fresh directory.
          mkdir -p downloader-extract
          qemu-arm ./7za x -y "$archive" "files/linux/*" -o"downloader-extract"
          echo "Pinned ARM 7za: both 't' and 'x -y ... files/linux/*' succeeded."

      - name: Re-verify uboot.img/updateboot after the ARM-7za round trip
        run: |
          set -eu
          uboot="downloader-extract/files/linux/uboot.img"
          updateboot="downloader-extract/files/linux/updateboot"
          u_sha=$(sha256sum "$uboot" | cut -d' ' -f1)
          b_sha=$(sha256sum "$updateboot" | cut -d' ' -f1)
          [ "$u_sha" = "$STOCK_UBOOT_SHA256" ] || { echo "::error::post-roundtrip uboot.img sha256 mismatch: $u_sha" >&2; exit 1; }
          [ "$b_sha" = "$STOCK_UPDATEBOOT_SHA256" ] || { echo "::error::post-roundtrip updateboot sha256 mismatch: $b_sha" >&2; exit 1; }
          echo "uboot.img/updateboot survive our archive's create+pinned-7za-extract round trip unchanged."

      - name: Verify archive layout matches the assembled contract tree
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: |
          set -eu
          archive="dist/release_${RELEASE_DATE}.7z"
          expected=$(cd release-stage && find files -type f -o -type d | sort)
          # `7z l -slt` prints a "Path = " line for the ARCHIVE ITSELF in its
          # header block, before a "----------" separator and the per-member
          # list -- skip everything up to and including that separator, or
          # the archive's own filename corrupts this comparison as a phantom
          # extra member.
          actual=$(7z l -slt "$archive" | awk '/^----------$/{f=1; next} f' | sed -n 's/^Path = //p' | sort)
          if [ "$expected" != "$actual" ]; then
            echo "::error::archive member list does not match the assembled release tree" >&2
            echo "--- expected (from release-stage/) ---" >&2
            echo "$expected" >&2
            echo "--- actual (from the .7z) ---" >&2
            echo "$actual" >&2
            exit 1
          fi
          # Explicit, human-readable cross-check against the documented
          # canonical set (docs/reference-materials.md §2,
          # docs/verification/stock-release-20250402.md) -- catches a
          # silently-empty stock archive passing the (vacuous) diff above.
          for must in files/linux/linux.img files/linux/zImage_dtb \
                      files/linux/uboot.img files/linux/updateboot \
                      files/linux/MidiLink.INI files/linux/ppp_options \
                      files/linux/u-boot.txt_example files/linux/_samba.sh \
                      files/linux/_user-startup.sh files/linux/_wpa_supplicant.conf; do
            echo "$actual" | grep -qx "$must" || { echo "::error::archive is missing required member: $must" >&2; exit 1; }
          done
          echo "Archive layout matches docs/downloader-contract.md / docs/reference-materials.md."

      # Generated ONCE, here, covering the main seven's hashables AND the
      # kernel-variant extras — every asset lives in this job's dist/ now, so
      # there is no publish-side append step (the old two-image design needed
      # one because the RT bundle first met the main bundle in publish).
      # The variant files are globbed for the same future-matrix reason as the
      # staging step above.
      - name: Generate SHA256SUMS
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
        run: |
          set -eu
          ( cd dist && sha256sum "release_${RELEASE_DATE}.7z" linux.img zImage_dtb buildroot.config linux.config legal-info.tar.gz \
              zImage_dtb-* linux-*.config legal-info-*.tar.gz > SHA256SUMS )
          cat dist/SHA256SUMS

      ##########################################################################
      # sdcard installer image (TASKS.md P5.3, ADR 0017 §4 amended by ADR 0020).
      #
      # SEPARATE, standalone flashable assets — deliberately NOT inside
      # release_YYYYMMDD.7z and NEVER referenced by db.json. They therefore do
      # not touch the SHA256SUMS list above (the Downloader-contract seven plus
      # the kernel-variant extras) nor the pinned-ARM-7za path; the steps here
      # run AFTER all of that so the already-fetched+verified stock_release.7z
      # can be reused instead of re-downloading ~90 MB. scripts/mk-sdcard.sh
      # does its own installer initramfs build + kernel relink off the
      # completed `make all`, and ships the RT kernel from the leg artifact
      # (MISTER_RT_ZIMAGE below) on the card's FAT payload.
      ##########################################################################

      # Reuse the stock archive verified above by seeding
      # fetch-sdcard-payload.sh's own cache with it: that script re-checks
      # size+MD5+SHA-256 before trusting the cache, so this is a hand-off of
      # already-verified bytes, not a bypass. The job-level STOCK_* env is
      # inherited by both mk-sdcard.sh and fetch-sdcard-payload.sh, keeping the
      # pins in lockstep with the block this workflow already verifies.
      # Skipped ONLY on an opt-in full-sdcard dispatch: that run targets an
      # already-released tag whose minimal sdcard.img.xz is already attached, so
      # rebuilding it here is pure redundancy — and each mk-sdcard.sh run does a
      # ~30 min kernel relink, so a needless second one risks the job's ~6 h cap.
      # On a tag push (no inputs) and on a dispatch with the input off, `!inputs.
      # build_full_sdcard` is true, so the minimal image builds as normal.
      # MISTER_RT_ZIMAGE: mk-sdcard.sh ships the RT kernel on the card's FAT
      # payload as zImage_dtb-rt (one flashable card, both kernels); in this
      # job the RT kernel is the leg artifact, not a local output-rt/ build.
      - name: Build sdcard.img.xz (minimal installer image)
        if: ${{ !inputs.build_full_sdcard }}
        env:
          STAGE_DIR: ${{ github.workspace }}/output-sdcard-stage
          MISTER_RT_ZIMAGE: ${{ github.workspace }}/kernel-artifacts/zImage_dtb-rt
        run: |
          set -eu
          mkdir -p "$STAGE_DIR/.fetch-cache"
          cp -f stock_release.7z "$STAGE_DIR/.fetch-cache/stock_release.7z"
          scripts/mk-sdcard.sh
          ls -la output/images/sdcard.img output/images/sdcard.img.xz

      # Static, offline contract check (partition table, uboot.img head, FAT32
      # payload inventory vs docs/verification/sdcard-payload.md). STOCK_UBOOT_*
      # come from the job env for the default uboot head compare. Same skip
      # condition as the build step it verifies.
      - name: Verify sdcard.img (scripts/check-sdcard.sh)
        if: ${{ !inputs.build_full_sdcard }}
        run: scripts/check-sdcard.sh output/images/sdcard.img

      # Opt-in only: the full variant bundles _Console cores (much larger, needs
      # the GitHub Contents API). Runs only on a workflow_dispatch with the input
      # set. Reuses the same warm STAGE_DIR (stock archive + installer builds
      # already there), just adds the cores; fetch-sdcard-payload.sh reconciles.
      - name: Build + verify sdcard-full.img.xz (opt-in _Console cores)
        if: ${{ inputs.build_full_sdcard }}
        env:
          STAGE_DIR: ${{ github.workspace }}/output-sdcard-stage
          MISTER_RT_ZIMAGE: ${{ github.workspace }}/kernel-artifacts/zImage_dtb-rt
          SDCARD_CORES: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eu
          mkdir -p "$STAGE_DIR/.fetch-cache"
          cp -f stock_release.7z "$STAGE_DIR/.fetch-cache/stock_release.7z"
          scripts/mk-sdcard.sh
          scripts/check-sdcard.sh output/images/sdcard-full.img
          ls -la output/images/sdcard-full.img output/images/sdcard-full.img.xz

      # Into dist/ so the existing "Upload release asset bundle" step carries them
      # to the publish job. sdcard-full.img.xz is only present when the opt-in
      # step above ran.
      - name: Stage sdcard image(s) into dist/
        run: |
          set -eu
          # Stage whichever variant(s) this run actually built. A tag push builds
          # the minimal image; an opt-in full dispatch (which SKIPS the minimal
          # build above, since the tag already carries it) builds only the full
          # one. The publish job's `gh release upload --clobber` then adds/refreshes
          # exactly what landed in dist/, leaving any already-attached asset intact.
          if [ -f output/images/sdcard.img.xz ]; then
            cp -f output/images/sdcard.img.xz dist/sdcard.img.xz
          fi
          if [ -f output/images/sdcard-full.img.xz ]; then
            cp -f output/images/sdcard-full.img.xz dist/sdcard-full.img.xz
          fi
          ls -la dist/

      # --- Release overview on the run's Summary page ------------------------
      # The tag, the internal version, the archive + image sizes, the full
      # SHA256SUMS, and -- most importantly -- the draft/db.json coupling a
      # human needs to understand before clicking Publish.
      - name: Release overview (job summary)
        env:
          RELEASE_DATE: ${{ steps.mister_version.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          set -u
          sz() { [ -f "$1" ] && numfmt --to=iec-i --suffix=B "$(stat -c %s "$1")" || echo "n/a"; }
          arc="dist/release_${RELEASE_DATE}.7z"
          assets=$(find dist -maxdepth 1 -type f | wc -l)
          {
            echo "## 🚀 Release build summary"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Tag | \`${TAG}\` |"
            echo "| Internal version (\`/MiSTer.version\`) | \`${RELEASE_DATE}\` |"
            echo "| Archive | \`release_${RELEASE_DATE}.7z\` ($(sz "$arc")) |"
            echo "| linux.img | $(sz dist/linux.img) |"
            echo "| zImage_dtb | $(sz dist/zImage_dtb) |"
            echo "| Assets staged | ${assets} |"
            echo ""
            echo "**Verified before packaging:** stock archive MD5/SHA-256/size + 7z CRC · \`uboot.img\`/\`updateboot\` byte-identical to stock (before *and* after the archive round-trip) · our \`.7z\` extracts under the pinned ARM \`7za\` (qemu-arm) · archive member list matches docs/downloader-contract.md · rootfs passes the non-hardware parity suite (\`ci-tests.sh\`) and the ABI/SONAME checker (section above)."
            echo ""
            echo "**Next:** the \`publish\` job attests build provenance and creates a **DRAFT** GitHub Release. A draft is not public and does **not** trigger db.json publication (\`publish-db.yml\` gates on a *published, non-draft* release) until a human clicks **Publish**."
            echo ""
            echo "<details><summary>SHA256SUMS</summary>"
            echo ""
            echo '```'
            cat dist/SHA256SUMS 2>/dev/null || echo "(SHA256SUMS not found)"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report disk & cache usage
        if: always()
        run: |
          echo "--- disk free ---"; df -h .
          echo "--- dl/ ---"; du -sh dl 2>/dev/null || true
          echo "--- output/host ---"; du -sh output/host 2>/dev/null || true
          echo "--- output (total) ---"; du -sh output 2>/dev/null || true
          echo "--- ccache ---"; du -sh "$GITHUB_WORKSPACE/.ccache" 2>/dev/null || true
          echo "--- dist/ ---"; ls -la dist/ 2>/dev/null || true

      # sha-named, not ref_name: `publish` (same run, same sha) is the only
      # consumer, and ref_name can carry '/' on a branch dispatch, which
      # upload-artifact rejects — see the kernel artifact's naming comment.
      - name: Upload release asset bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # ============================================================================
  # publish — attests provenance for the shipped image/kernel binaries and
  # creates the GitHub Release. A separate job on purpose: it needs write
  # scopes (contents, id-token, attestations) that the build jobs must NOT
  # have, and it needs none of their disk reclaim or apt setup — `gh` and
  # actions/attest-build-provenance's OIDC/Sigstore flow just work on a bare
  # GitHub-hosted Ubuntu runner. `needs: build` covers the kernel matrix
  # transitively (build itself needs build-kernel).
  # ============================================================================
  publish:
    name: Attest provenance + create GitHub Release
    needs: build
    runs-on: ubuntu-26.04

    # Only ever create a Release for a TAG. On a tag push this is always true, so
    # existing behaviour is unchanged; it exists so a workflow_dispatch on a
    # NON-tag ref (used to build the opt-in full sdcard variant) still runs the
    # `build` job's build+verify but does NOT mint a branch-named release here.
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write        # create the Release and upload its assets
      id-token: write         # attest-build-provenance's OIDC token exchange
      attestations: write     # publish the attestation to this repo

    steps:
      # ONE bundle: `build` stages everything — the main seven, the kernel-
      # variant extras, the sdcard image(s), and the complete SHA256SUMS — so
      # there is nothing to merge or append here anymore (the old two-image
      # design downloaded a second RT bundle and appended its hashes at this
      # point; one image-building job means one bundle and one hash list).
      - name: Download release asset bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist-${{ github.sha }}
          path: dist

      - name: List downloaded assets
        run: ls -la dist/

      # Attests ONLY the shipped image/kernel binaries -- per TASKS.md P4.4's
      # scope extended by ADR 0021 -- not the whole dist/ directory
      # (SHA256SUMS/legal-info*/the .config files are build metadata, not the
      # shipped bits). zImage_dtb-rt is a kernel binary a human boots; the one
      # linux.img now carries every variant's modules, so attesting it covers
      # the RT modules too.
      - name: Attest build provenance for the image assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/linux.img
            dist/zImage_dtb
            dist/zImage_dtb-rt

      # Created as a DRAFT, deliberately: this project's stated posture
      # elsewhere (TASKS.md P4.6, "Automerge stays OFF -- a human reviews
      # green PRs") is that automation proposes and a human approves before
      # anything user-facing goes live. A draft here also means P4.5's
      # `publish-db.yml` (triggered "on release", i.e. the `released`
      # webhook event, which a draft does not fire) cannot regenerate/publish
      # db.json until a human clicks "Publish release" -- a deliberate gate
      # between "CI built and verified an image" and "every subscribed
      # MiSTer in the field is offered this update". Flagged as a decision a
      # human should confirm, not silently assumed correct forever.
      - name: Create draft GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # gh resolves the target repo from a git remote or $GH_REPO ONLY — it
          # does NOT consult $GITHUB_REPOSITORY. This publish job deliberately has
          # no actions/checkout (nothing here needs the source tree), so the CWD
          # ($GITHUB_WORKSPACE) is an empty non-git dir. Without GH_REPO every
          # `gh release view/create/upload` below dies at repo resolution with
          # "failed to run git: fatal: not a git repository" BEFORE it reaches the
          # API: the upsert `if gh release view` then swallows that as a false
          # condition (set -e is inert inside `if`) and misroutes into the else
          # branch, whose `gh release create` fails identically and aborts the
          # step under set -eu — a green ~9h build produces NO release. GH_REPO
          # hands gh the base repo directly, no checkout needed. NOTE: this
          # checkout-less shape is inherited byte-for-byte from origin/master's
          # publish job (the bug pre-dates this rework); fixed here rather than
          # carried forward.
          GH_REPO: ${{ github.repository }}
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          # The sdcard installer images are SEPARATE, standalone flashable assets
          # — NEVER inside release_YYYYMMDD.7z and NEVER referenced by db.json
          # (ADR 0017 §4 / ADR 0020). sdcard.img.xz is always built; the full
          # variant only when the opt-in dispatch input was set. Attach whichever
          # the build job actually staged into dist/.
          #
          # The three RT assets (ADR 0021 as amended) are listed
          # UNconditionally, unlike the sdcard pair: the build-kernel matrix
          # runs on every trigger that reaches this job, so a missing RT file
          # is a bug that must fail this upload loudly, not be papered over by
          # an existence check.
          assets=(
            dist/"release_${RELEASE_DATE}.7z"
            dist/linux.img
            dist/zImage_dtb
            dist/SHA256SUMS
            dist/buildroot.config
            dist/linux.config
            dist/legal-info.tar.gz
            dist/zImage_dtb-rt
            dist/linux-rt.config
            dist/legal-info-rt.tar.gz
          )
          [ -f dist/sdcard.img.xz ] && assets+=(dist/sdcard.img.xz)
          [ -f dist/sdcard-full.img.xz ] && assets+=(dist/sdcard-full.img.xz)
          notes="Automated release build. Internal linux version (baked \`/MiSTer.version\`): ${RELEASE_DATE}. See SHA256SUMS for asset hashes and the attached build-provenance attestation (verify with \`gh attestation verify <asset> --owner ${{ github.repository_owner }}\`). The \`sdcard*.img.xz\` assets are standalone flashable installer images (ADR 0020); they are NOT part of release_${RELEASE_DATE}.7z and are not referenced by db.json.

          **PREEMPT_RT beta (Linux 7.2-rc3):** \`zImage_dtb-rt\` is a separately compiled real-time kernel (docs/rt-beta-kernel.md, ADR 0021 as amended 2026-07-18) — never referenced by db.json, so the Downloader will not offer it. The ONE \`linux.img\` above already contains BOTH kernels' module trees, so no separate rootfs exists and — once the device is running THIS release's \`linux.img\` (a linux.img from before this release carries only 6.18 modules, and the RT kernel would boot with none of its drivers) — no extra flash is needed: opt in by copying \`zImage_dtb-rt\` to \`/media/fat/linux/\` and adding \`bootimage=/linux/zImage_dtb-rt\` to u-boot.txt (remove the line to roll back). \`linux-rt.config\` is its kernel config; \`legal-info-rt.tar.gz\` its GPL source bundle. The sdcard installer image also carries \`zImage_dtb-rt\` on its FAT payload. Status: not yet validated on hardware."
          # Upsert, not create-only: a tagged push already created this draft, so
          # the opt-in full-sdcard dispatch (which runs AGAINST that existing tag)
          # must ADD sdcard-full.img.xz to the draft rather than fail with an
          # already-exists error. This also lets a re-pushed/corrected tag
          # re-attach assets once the first run has finished. `gh release create`
          # only ever creates; `gh release upload --clobber` refreshes in place.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber "${assets[@]}"
          else
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes "$notes" \
              "${assets[@]}"
          fi

      - name: Publish summary (job summary)
        env:
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          {
            echo "## 📦 Draft release created"
            echo ""
            echo "Draft GitHub Release **${TAG}** created (internal version \`${RELEASE_DATE}\`); build provenance attested for \`linux.img\`, \`zImage_dtb\` and \`zImage_dtb-rt\`. The three \`*-rt\` assets are the PREEMPT_RT beta kernel (ADR 0021 as amended — its MODULES ride inside the one \`linux.img\`) — separate downloads, never in the 7z, never in db.json."
            echo ""
            echo "> ⚠️ **This is a draft.** It is not public, and db.json is **not** published while it stays a draft."
            echo "> Clicking **Publish release** — whether as a full release *or* a pre-release — fires \`publish-db.yml\`, which regenerates and publishes db.json to opted-in devices. **The pre-release flag does not prevent that** (the guard there checks draft, not pre-release). For a smoke test, leave it a draft and delete it when done."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Follow-up checklist (cannot be verified by this authoring pass)
        env:
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
          TAG: ${{ github.ref_name }}
        run: |
          cat <<EOF
          ::notice::This workflow has never been run end-to-end. Before trusting it:
            1. gh release view "$TAG" --json isDraft,assets -- confirm the expected assets are
               ALL present (an enumerated list, not a count -- the old "all 7" predated the
               sdcard and RT assets): release_${RELEASE_DATE}.7z, linux.img, zImage_dtb,
               SHA256SUMS, buildroot.config, linux.config, legal-info.tar.gz, zImage_dtb-rt,
               linux-rt.config, legal-info-rt.tar.gz, sdcard.img.xz (and sdcard-full.img.xz
               only after an opt-in full dispatch).
            2. gh attestation verify dist/linux.img --owner ${{ github.repository_owner }} (and
               zImage_dtb, zImage_dtb-rt).
            3. Byte-compare the draft release's release_${RELEASE_DATE}.7z member list against
               docs/downloader-contract.md / docs/reference-materials.md by hand once, independent
               of this workflow's own self-check above.
            4. Confirm the shipped uboot.img sha256 in SHA256SUMS still reads
               e2d46cf9fe1ec40ca2c9c7409870249f267e06f70e5736dc6d30b4e21fe62a64.
            5. Delete the test tag/release afterward (git tag -d / git push --delete, gh release delete)
               so it doesn't linger as a confusing real-looking draft.
          EOF
