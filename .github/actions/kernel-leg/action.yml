################################################################################
#
# kernel-leg — one kernel-variant matrix leg's body: build the variant, render
# its job-summary overview, stage its artifact (zImage_dtb + .config + depmod'd
# modules + legal-info), and upload it for `build` to merge downstream.
#
# WHY THIS EXISTS: build.yml and release.yml each carried their own copy of
# this leg (measured 85 vs 91 code lines with comments stripped, 72 identical)
# for the same build-kernel matrix job, ADR 0021 as amended 2026-07-18. Kept
# here once so a fix to one no longer has to be remembered for the other —
# same reasoning as .github/actions/buildroot-build and
# .github/actions/merge-kernel-modules.
#
# The two REAL differences are inputs, not copies:
#   full-legal-info — build.yml's leg ships a manifest-only SBOM (a CI push
#                     distributes nothing, so the GPL source tarballs stay
#                     out); release.yml's ships the FULL legal-info bundle,
#                     guarded for existence and GitHub's 2 GiB
#                     per-release-asset cap, because a release DOES
#                     distribute the variant kernel binary and the source
#                     obligation is real. "true"/"false", default "false".
#   release-context — which facts the job-summary table/footer leads with:
#                     build.yml wants Trigger/Commit/Packages(SBOM) (a CI run
#                     has no tag); release.yml wants Tag instead, plus a
#                     footer naming the release assets this leg contributes.
#                     Deliberately a SEPARATE input from full-legal-info, even
#                     though today's two callers set them identically — one
#                     is about a real distribution/GPL obligation, the other
#                     is about what a human wants to see on the Summary tab,
#                     and nothing says a future caller could not want one
#                     without the other. "true"/"false", default "false".
#
# What stays at the CALLER (composite actions cannot set these, and needs/if
# are per-job wiring, not part of the leg's body): runs-on, timeout-minutes,
# strategy.matrix, needs, if. The caller also owns its own Checkout step --
# `uses: ./.github/actions/kernel-leg` only resolves once the repo running it
# is already checked out. And matrix.kernel itself: composite-action steps
# cannot read the caller's `matrix` context, so it comes in via the `kernel`
# input instead.
#
################################################################################

name: Build one kernel-variant matrix leg
description: >-
  Builds a kernel-only Buildroot variant (via buildroot-build), renders its
  job-summary overview, stages its artifact (zImage_dtb, .config, depmod'd
  modules, legal-info), and uploads kernel-<kernel>-<github.sha> for the
  `build` job to merge downstream.

inputs:
  kernel:
    description: >-
      The kernel variant name (the matrix.kernel value from the calling job,
      e.g. "rt") -- composite-action steps cannot read the caller's `matrix`
      context directly, so the caller must pass it through.
    required: true
  full-legal-info:
    description: >-
      "true" ships the FULL legal-info bundle (GPL sources included,
      existence- and 2 GiB-per-asset-guarded) -- for release.yml, which
      distributes the variant kernel binary. "false" (default) ships a
      manifest-only SBOM (legal-info/sources and legal-info/host-sources
      excluded) -- for build.yml, whose CI push distributes nothing.
    required: false
    default: "false"
  release-context:
    description: >-
      "true" leads the job-summary table with Tag (and a release-assets
      footer) -- for release.yml. "false" (default) leads with Trigger/Commit
      and adds a Packages (SBOM) row (and a u-boot-selection footer) -- for
      build.yml's CI-only summary.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    # FIRST, before the multi-hour build below -- same fail-fast principle
    # build.yml documents for its own serial gate ("runs in about a second...
    # failing fast instead of after a possible 300-minute build"), and the
    # same shape .github/actions/merge-kernel-modules ("Reject unknown
    # phase") and .github/actions/verify-image ("Validate skip-qemu-system")
    # already use as their step 0. Both of these inputs are STRING booleans
    # (composite actions have no boolean type -- a caller's `true` arrives as
    # the string "true"), so a caller typing "yes"/"True"/a trailing space is
    # a real, easy mistake; catching it after a 240-minute kernel build --
    # which also auto-skips `build` behind it -- would burn the whole leg's
    # runner time for a typo. The per-step `case` blocks further down are
    # kept as cheap belt-and-braces so each step still refuses to act on a
    # value it did not validate itself.
    - name: Validate inputs
      shell: bash
      env:
        FULL_LEGAL_INFO: ${{ inputs.full-legal-info }}
        RELEASE_CONTEXT: ${{ inputs.release-context }}
      run: |
        set -euo pipefail
        case "$FULL_LEGAL_INFO" in
          true|false) ;;
          *)
            echo "::error::full-legal-info must be exactly \"true\" or \"false\", got \"$FULL_LEGAL_INFO\"" >&2
            exit 1
            ;;
        esac
        case "$RELEASE_CONTEXT" in
          true|false) ;;
          *)
            echo "::error::release-context must be exactly \"true\" or \"false\", got \"$RELEASE_CONTEXT\"" >&2
            exit 1
            ;;
        esac

    # No patch-header lint here: build.yml's `build` job lints the one shared
    # patches dir (linux-patches-beta/ is symlinks + a series into it) --
    # release.yml does not lint patch headers at all.
    - name: Build the kernel variant
      uses: ./.github/actions/buildroot-build
      with:
        variant: ${{ inputs.kernel }}
        run-legal-info: "true"

    # Mirrors the calling job's own overview step further down in the same
    # run (build.yml's `build` job has "Build overview (job summary)";
    # release.yml's `build` job has "Release overview (job summary)"):
    # best-effort, every fact guarded, a missing one never fails the build.
    # The PREEMPT_RT-style config assert is already hard-enforced by
    # the Makefile's variant target (the build would have failed); the grep
    # here only SURFACES it on the Summary tab. The kernel-tree glob is
    # `linux-[0-9]*` AND uniqueness-guarded, same as the Makefile's assert:
    # linux-firmware-*/linux-headers-* siblings must not match, and with two
    # trees present naming either would be a guess.
    #
    # release-context picks which facts lead the table (Trigger/Commit vs
    # Tag) and which footer follows -- see the header above for why that is
    # its own input, separate from full-legal-info.
    - name: Kernel build overview (job summary)
      shell: bash
      env:
        KERNEL: ${{ inputs.kernel }}
        RELEASE_CONTEXT: ${{ inputs.release-context }}
      run: |
        set -u
        case "$RELEASE_CONTEXT" in
          true|false) ;;
          *)
            echo "::error::release-context must be exactly \"true\" or \"false\", got \"$RELEASE_CONTEXT\"" >&2
            exit 1
            ;;
        esac
        # Uniqueness-guarded glob array, NOT `ls -d ... | head -1`: parsing
        # ls is SC2012, and `head -1` would silently render the WRONG
        # kernel's version on the Summary tab with a stale sibling tree
        # present from a version bump -- the same failure mode the kernel-tree
        # glob just below and the staging step further down already guard
        # against, so this uses their shape too. Best-effort like every other
        # fact in this step: anything other than exactly one match leaves
        # kver empty and the table renders `n/a` rather than failing the leg.
        kver=""
        modtrees=(output-"$KERNEL"/target/usr/lib/modules/*/)
        if [ "${#modtrees[@]}" -eq 1 ] && [ -d "${modtrees[0]}" ]; then
          kver=$(basename "${modtrees[0]}")
        fi
        rt="n/a"
        trees=(output-"$KERNEL"/build/linux-[0-9]*/)
        if [ "${#trees[@]}" -eq 1 ] && [ -d "${trees[0]}" ]; then
          kcfg="${trees[0]}.config"
          if [ -f "$kcfg" ]; then
            grep -qx 'CONFIG_PREEMPT_RT=y' "$kcfg" && rt="✅ CONFIG_PREEMPT_RT=y" || rt="❌ NOT SET"
          fi
        elif [ "${#trees[@]}" -gt 1 ]; then
          rt="n/a (${#trees[@]} kernel trees -- ambiguous)"
        fi
        sz() { [ -f "$1" ] && numfmt --to=iec-i --suffix=B "$(stat -c %s "$1")" || echo "n/a"; }
        zimg=$(sz "output-$KERNEL/images/zImage_dtb")

        if [ "$RELEASE_CONTEXT" = "true" ]; then
          # Tag, not Trigger/Commit: a release build only ever runs from a v*
          # tag push, so the tag IS the identifying fact. GITHUB_REF_NAME is
          # the runner's own default env var (equivalent to github.ref_name),
          # available here exactly as it is in any other step.
          {
            echo "## ⏱️ Kernel variant release build (${KERNEL})"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Tag | \`${GITHUB_REF_NAME}\` |"
            echo "| Kernel | \`${kver:-n/a}\` |"
            echo "| PREEMPT_RT | ${rt} |"
            echo "| zImage_dtb (ships as \`zImage_dtb-${KERNEL}\`) | ${zimg} |"
            echo ""
            echo "Kernel-only build; its module tree merges into the shipped linux.img in \`build\`,"
            echo "and \`zImage_dtb-${KERNEL}\` / \`linux-${KERNEL}.config\` / \`legal-info-${KERNEL}.tar.gz\`"
            echo "become release assets."
          } >> "$GITHUB_STEP_SUMMARY"
        else
          pkgs=$( [ -f "output-$KERNEL/legal-info/manifest.csv" ] && echo $(( $(wc -l < "output-$KERNEL/legal-info/manifest.csv") - 1 )) || echo "n/a" )
          {
            echo "## ⏱️ Kernel variant build summary (${KERNEL})"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Trigger | \`${GITHUB_EVENT_NAME:-?}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:12}\` |"
            echo "| Kernel | \`${kver:-n/a}\` |"
            echo "| PREEMPT_RT | ${rt} |"
            echo "| zImage_dtb (ships as \`zImage_dtb-${KERNEL}\`) | ${zimg} |"
            echo "| Packages (SBOM) | ${pkgs} |"
            echo ""
            echo "Kernel-only build; its module tree merges into the ONE shipped linux.img in the"
            echo "\`build\` job. Selected on-device via \`bootimage=/linux/zImage_dtb-${KERNEL}\` in u-boot.txt."
          } >> "$GITHUB_STEP_SUMMARY"
        fi

    # The kernel leg's artifact is INTER-JOB TRANSPORT, not a deliverable: the
    # `build` job downstream needs the module tree (and the merge assert needs
    # the kver), so — unlike the main job's push/dispatch-gated uploads — this
    # uploads on ALL events, PRs included. build.yml's leg: ~15 MB (modules tar
    # + kernel + config + manifest-only SBOM), negligible next to the image
    # artifacts. release.yml's leg ships the FULL GPL source bundle instead of
    # the manifest-only SBOM, so it runs ~250-300 MB instead -- still
    # negligible next to the image artifacts.
    #
    # Both globs are uniqueness-guarded (the Copilot review's point): with a
    # stale sibling tree present, `head -1` would silently stage the WRONG
    # kernel's .config or module tree under the right name.
    - name: Stage the kernel artifact (zImage_dtb, config, modules, legal-info)
      shell: bash
      env:
        KERNEL: ${{ inputs.kernel }}
        FULL_LEGAL_INFO: ${{ inputs.full-legal-info }}
      run: |
        set -euo pipefail
        case "$FULL_LEGAL_INFO" in
          true|false) ;;
          *)
            echo "::error::full-legal-info must be exactly \"true\" or \"false\", got \"$FULL_LEGAL_INFO\"" >&2
            exit 1
            ;;
        esac
        # nullglob, or a zero-match glob leaves the LITERAL pattern in the
        # array and the guards below would report "found 1" for an empty
        # build — the count in the error must be truthful. (Same shopt the
        # Populate step in `build` uses; the [ ! -d ] halves still catch the
        # now-empty arrays, and || short-circuits before ${trees[0]} could
        # trip set -u.)
        shopt -s nullglob
        mkdir -p kernel-artifact
        cp "output-$KERNEL/images/zImage_dtb" "kernel-artifact/zImage_dtb-$KERNEL"

        # UNIFIED wording (build.yml's and release.yml's copies of this guard
        # had already drifted -- build.yml's named the Makefile assert,
        # release.yml's did not. Keeping the more informative one now that
        # there is only one copy to read.)
        trees=(output-"$KERNEL"/build/linux-[0-9]*/)
        if [ "${#trees[@]}" -ne 1 ] || [ ! -d "${trees[0]}" ]; then
          echo "::error::expected exactly one kernel tree at output-$KERNEL/build/linux-[0-9]*/ but found ${#trees[@]} -- cannot stage linux-$KERNEL.config (zero: the build produced no kernel tree; more than one: a stale sibling from a version bump -- the Makefile's own assert should have caught either)" >&2
          exit 1
        fi
        cp "${trees[0]}.config" "kernel-artifact/linux-$KERNEL.config"

        mods=(output-"$KERNEL"/target/usr/lib/modules/*/)
        if [ "${#mods[@]}" -ne 1 ] || [ ! -d "${mods[0]}" ]; then
          echo "::error::expected exactly one module tree under output-$KERNEL/target/usr/lib/modules/ but found ${#mods[@]} -- cannot stage the modules tar (zero: depmod/target-finalize never ran; more than one: a stale sibling from a version bump)" >&2
          exit 1
        fi
        kver=$(basename "${mods[0]}")
        printf '%s\n' "$kver" > "kernel-artifact/kver-$KERNEL.txt"

        # Depmod'd by target-finalize (the whole point of the kernel config's
        # BR2_TARGET_ROOTFS_TAR); tar'd from target/ so the paths inside are
        # exactly what work/extra-modules-overlay/ needs.
        tar -czf "kernel-artifact/modules-$KERNEL.tar.gz" -C "output-$KERNEL/target" usr/lib/modules

        if [ "$FULL_LEGAL_INFO" = "true" ]; then
          # release.yml: the FULL kernel GPL-source bundle, guarded for
          # existence (buildroot-build's run-legal-info input above should
          # already have produced it, but assert rather than assume) and
          # GitHub's 2 GiB per-release-asset cap -- same guard the main
          # legal-info step documents.
          if [ ! -d "output-$KERNEL/legal-info" ]; then
            echo "::error::output-$KERNEL/legal-info does not exist -- did 'make $KERNEL-legal-info' run?" >&2
            exit 1
          fi
          tar -czf "kernel-artifact/legal-info-$KERNEL.tar.gz" \
            --exclude='legal-info/host-sources' \
            -C "output-$KERNEL" legal-info
          limit=$((2 * 1024 * 1024 * 1024))
          size=$(stat -c %s "kernel-artifact/legal-info-$KERNEL.tar.gz")
          echo "legal-info-$KERNEL.tar.gz: $size bytes ($((size / 1024 / 1024)) MiB)"
          if [ "$size" -ge "$limit" ]; then
            echo "::error::legal-info-$KERNEL.tar.gz is $((size / 1024 / 1024)) MiB, at or over GitHub's 2 GiB per-release-asset limit -- split the source bundle (see the main legal-info step's guard for options)." >&2
            exit 1
          fi
        else
          # build.yml: manifest-only SBOM, same exclusions and reasoning as
          # the main job's SBOM artifact -- a CI push distributes nothing, so
          # the GPL source tarballs stay out (release.yml ships the full
          # kernel-source bundle above instead).
          tar -czf "kernel-artifact/legal-info-$KERNEL.tar.gz" \
            --exclude='legal-info/sources' \
            --exclude='legal-info/host-sources' \
            -C "output-$KERNEL" legal-info
        fi

        ls -la kernel-artifact/

    # Named by sha, not ref_name: this is same-run transport, and
    # upload-artifact REJECTS '/' in artifact names -- every branch here is
    # slash-named (feat/…, feature/…), so a ref_name-keyed name would kill a
    # branch dispatch right here, AFTER the multi-hour kernel build, and
    # auto-skip `build` with it. Tags (v*) never contain '/', so tag pushes
    # (release.yml) never cared either way -- sha-naming is used uniformly so
    # the one mechanism covers both callers. Applies to every artifact a run
    # both writes and reads, not just this one -- e.g. build.yml's
    # mister-images-<sha> and legal-info-<sha>, or release.yml's
    # release-dist-<sha> and (via .github/actions/verify-image)
    # ci-tests-results-<sha>.
    - name: Upload kernel artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: kernel-${{ inputs.kernel }}-${{ github.sha }}
        path: kernel-artifact/
        if-no-files-found: error
        retention-days: 14
