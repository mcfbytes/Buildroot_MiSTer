################################################################################
#
# reproducibility.yml — double-build reproducibility CI (TASKS.md P4.3, A9).
# Proves two independent builds of the same commit are byte-identical; P2.5
# only proved local idempotency over one already-built output/ tree, not this.
# See docs/ci.md#reproducibility-workflow.
#
# TRAP: the caches below are INPUTS only (Buildroot tarball, dl/, host
# toolchain, ccache) — output/target and output/images must NEVER be cached
# here, or the comparison would compare a cache against itself and pass even
# when the build is not actually reproducible. See docs/ci.md#input-vs-output-caches.
#
# Only per-leg SHA256SUMS are uploaded, not the images themselves — doubling
# storage/transfer for no benefit when build.yml already ships the bytes. On a
# mismatch, re-run locally with this file's build steps and bisect.
# See docs/ci.md#no-image-upload.
#
# Build recipe: .github/actions/buildroot-build, shared with build.yml and
# release.yml — a near-verbatim copy here used to silently rot out of sync.
# See docs/ci.md#why-shared-recipe.
#
################################################################################

name: Reproducibility

on:
  # MANUAL-ONLY (workflow_dispatch) — do NOT wire to push/pull_request: this is
  # a double build (2x cost) whose input caches are only warm after build.yml
  # has run. Dispatch once caches are warm:
  #   gh workflow run reproducibility.yml --ref <branch>
  # See docs/ci.md#manual-trigger-only.
  workflow_dispatch:

# Cancel a superseded run for the same ref, same as build.yml — a double
# build is twice the cost of a single one, so this matters even more here.
concurrency:
  group: reproducibility-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: read the repo, upload/download this workflow's own
# artifacts — both covered by the default contents: read (artifact up/download
# does not need an elevated token scope; it's scoped to the run itself).
permissions:
  contents: read

jobs:
  # ==========================================================================
  # build — the 2-leg matrix. Each leg is a complete, independent two-stage
  # Buildroot build from a fresh checkout, ending in a small hash-manifest
  # artifact instead of the images themselves (see file header).
  # ==========================================================================
  build:
    name: Build image (leg ${{ matrix.build-id }})
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        build-id: [a, b]

    # NO `container:` — same reason as build.yml/release.yml: disk reclaim needs
    # host access a container job doesn't have. Does not weaken the comparison —
    # the environment is held constant across both legs either way.
    # See docs/ci.md#no-container-disk-reclaim.

    # 300 min, matching build.yml — same measured 3h19m cold build (run
    # 29300460591). The two legs run in parallel, so this is per-leg, not summed.
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Shared build recipe (docs/ci.md#why-shared-recipe); the caches it
      # restores are inputs only (docs/ci.md#input-vs-output-caches).
      #
      # TRAP: leave MISTER_VERSION UNSET here (ADR 0018) — setting it would make
      # the two legs disagree the moment they straddle midnight UTC.
      # See docs/ci.md#repro-mister-version-unset.
      - name: Build the image
        uses: ./.github/actions/buildroot-build

      # --- The whole point of this job: hash the two shipped images ---------
      # TRAP: hash from INSIDE output/images/, not `sha256sum output/images/...`
      # — bare filenames make the compare step correct by construction, not by
      # coincidence of matching runner paths. See docs/ci.md#hash-bare-filenames.
      - name: Compute image hashes
        run: |
          set -eu
          cd output/images
          sha256sum linux.img zImage_dtb | tee "$GITHUB_WORKSPACE/SHA256SUMS-${{ matrix.build-id }}"

      - name: Upload hash manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repro-hashes-${{ matrix.build-id }}
          path: SHA256SUMS-${{ matrix.build-id }}
          if-no-files-found: error
          retention-days: 14

  # ==========================================================================
  # compare — downloads both legs' hash manifests and diffs them. This job
  # needs no container, no Buildroot, no caches: it exists purely to fail
  # loudly (with both hashes printed) on any mismatch, and to print the
  # single agreed hash on success.
  # ==========================================================================
  compare:
    name: Compare double-build hashes
    needs: build
    runs-on: ubuntu-26.04

    steps:
      - name: Download leg A hashes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repro-hashes-a
          path: hashes-a

      - name: Download leg B hashes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repro-hashes-b
          path: hashes-b

      - name: Diff the two builds' image hashes
        run: |
          set -eu
          a="hashes-a/SHA256SUMS-a"
          b="hashes-b/SHA256SUMS-b"

          echo "--- leg a (${a}) ---"
          cat "$a"
          echo "--- leg b (${b}) ---"
          cat "$b"

          # Compare hash+filename pairs only (ignore the a/b manifest
          # filenames themselves, which legitimately differ).
          norm_a=$(awk '{print $1, $2}' "$a" | sort)
          norm_b=$(awk '{print $1, $2}' "$b" | sort)

          if [ "$norm_a" = "$norm_b" ]; then
            echo ""
            echo "==> REPRODUCIBLE: both builds of ${{ github.sha }} produced identical images:"
            echo "$norm_a"
            exit 0
          fi

          echo "" >&2
          echo "::error::Reproducibility FAILURE — the two independent builds of ${{ github.sha }} produced DIFFERENT images (A9 violated)." >&2
          echo "" >&2
          echo "leg a:" >&2
          echo "$norm_a" >&2
          echo "leg b:" >&2
          echo "$norm_b" >&2
          echo "" >&2
          echo "See docs/reproducibility.md for what BR2_REPRODUCIBLE / P2.5 already" >&2
          echo "pin, and start bisecting from whichever of linux.img / zImage_dtb" >&2
          echo "actually differs above." >&2
          exit 1
