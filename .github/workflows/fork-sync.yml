################################################################################
#
# fork-sync.yml — weekly backport queue for MiSTer-devel/Linux-Kernel_MiSTer.
#
# This repo is the source of truth for the MiSTer kernel, but the fork is a live repo
# other people commit to. Anything landing there after our last reconciliation is
# something we do not have and nobody has decided about. Nothing else forces that
# question -- and the question does not get asked on its own: the fork sat on 5.15.1
# through 210 stable releases partly because no moment ever said "these N commits are
# unaccounted for".
#
# So: scripts/check-fork-sync.sh diffs docs/kernel-recon/fork-sync.conf (the last
# RECONCILED commit per fork branch) against the fork's live HEADs, and this opens an
# issue listing whatever has landed since. The queue becomes a fact rather than a memory.
#
# The direction that matters most is MiSTer-v6.18: once #75 merges upstream, commits
# landing there are changes made to OUR series by other people, and they must flow back
# into one of the two patch directories or the next `make export` silently erases them:
# board/mister/de10nano/linux-patches/ if our image wants the change too, or
# board/mister/de10nano/linux-patches-upstream/ if the exported tree needs it and our
# image deliberately does not (see that directory's README). That is the failure this
# file exists to prevent.
#
# COST: two compare API calls and no clone -- seconds, weekly. It deliberately does NOT
# check out the kernel (~300MB) or build anything; "what is new upstream" does not need
# either. This is why it can be a schedule rather than something manual: it is far below
# the noise floor of the build workflow. (Contrast build.yml, whose cold path is ~3h.)
#
# ONE ISSUE, UPDATED -- not one per run. A weekly job that opens a fresh issue is a job
# people mute, and a muted queue is the same as no queue. It finds its own open issue by
# label, edits it in place, and closes it when the queue empties.
#
################################################################################

name: Fork sync queue

on:
  schedule:
    # Mondays 06:00 UTC. Weekly is matched to how fast the fork actually moves (11
    # commits across 2026 so far) -- daily would just re-post the same list six more
    # times before anyone acts on it.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Only the issue write. No checkout of anything but this repo, no packages, no build.
permissions:
  contents: read
  issues: write

concurrency:
  group: fork-sync
  cancel-in-progress: false

jobs:
  check:
    name: Check fork for unreconciled commits
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Exit 1 from the script means "commits need triage", which is a normal state and
      # must not fail the job -- a red X every week trains people to ignore it. Exit 2 is
      # a real error and MUST fail. The report is the product; the exit code only routes it.
      #
      # Run ONCE, with --markdown, and use that output for both the log and the issue
      # body. An earlier cut called the script twice -- plain for the log, --markdown for
      # the body with `|| true` to swallow the expected exit 1 -- which was wrong twice
      # over: `|| true` also swallows exit 2, so a broken run could file an issue with an
      # empty body and still go green; and two invocations are two sets of API calls that
      # can disagree if one hits a transient failure.
      - name: Diff fork HEADs against the reconciled sync points
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          rc=0
          scripts/check-fork-sync.sh --markdown > body.md 2> err.txt || rc=$?

          case "$rc" in
            0) echo "drift=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "drift=true"  >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error title=fork-sync check failed::scripts/check-fork-sync.sh exited $rc"
              cat err.txt >&2
              exit "$rc"
              ;;
          esac

          # A body we would post must not be empty -- that is the failure mode the single
          # invocation is meant to close, so assert it rather than assume it.
          if [ ! -s body.md ]; then
            echo "::error title=fork-sync produced an empty report::exit was $rc but body.md is empty"
            exit 2
          fi

          cat body.md

      - name: Open or update the backport-queue issue
        env:
          GH_TOKEN: ${{ github.token }}
          DRIFT: ${{ steps.check.outputs.drift }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TITLE="Backport queue: unreconciled commits in Linux-Kernel_MiSTer"
          LABEL="fork-sync"

          # Label may not exist yet on a fresh repo; create it once, idempotently.
          gh label create "$LABEL" --repo "$REPO" --color 0E8A16 \
            --description "Upstream fork commits awaiting a disposition" 2>/dev/null || true

          # --limit 1: only the first match is used, and the default page of 30 is API
          # work we never look at.
          existing="$(gh issue list --repo "$REPO" --label "$LABEL" --state open \
            --limit 1 --json number --jq '.[0].number // empty')"

          if [ "$DRIFT" = "true" ]; then
            {
              cat body.md
              printf '\n---\n<sub>Generated by `.github/workflows/fork-sync.yml` — '
              printf 'edited in place each run, so this is always the current queue. '
              printf 'Closes itself when everything has a disposition.</sub>\n'
            } > issue.md

            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$REPO" --body-file issue.md
              echo "::notice title=Backport queue updated::Issue #$existing refreshed."
            else
              # `gh issue create` has no --json/--jq; it prints the issue URL. Take the
              # number off the end rather than retrying the command -- a `||` fallback
              # around a create is how you end up filing two issues.
              url="$(gh issue create --repo "$REPO" --title "$TITLE" --label "$LABEL" \
                --body-file issue.md)"
              echo "::notice title=Backport queue opened::Issue ${url##*/} lists commits needing triage."
            fi
          elif [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$REPO" \
              --comment "Everything on the watched fork branches now has a disposition in \`docs/patch-provenance.md\`, and \`docs/kernel-recon/fork-sync.conf\` has been advanced past it. Reopening automatically if the fork moves again."
            echo "::notice title=Backport queue empty::Closed issue #$existing."
          else
            echo "::notice title=Backport queue empty::Fork fully reconciled; nothing to do."
          fi
