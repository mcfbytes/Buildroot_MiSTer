################################################################################
#
# renovate-validate.yml — fail loudly on an invalid renovate.json.
#
# WHY THIS EXISTS: an invalid Renovate config does NOT produce an error anywhere
# you would see it. Renovate simply **skips the repository**. There is no failed
# check, no PR comment, no email — the only symptom is that dependency PRs
# quietly stop appearing, which is precisely the kind of failure nobody notices
# for months. Given that this repo hand-pins a kernel, Buildroot, nine
# out-of-tree driver commits and a pile of firmware, "Renovate silently stopped
# telling us about security updates" is a genuinely bad outcome.
#
# So: run Renovate's own official validator, in CI, on every change to the config.
# Cheap (a Node install and a few seconds) and scoped by `paths:` so it never
# fires on the 3-hour image build's pushes.
#
# Run the same check locally before pushing:
#   npx --package renovate -- renovate-config-validator renovate.json
#
################################################################################

name: Validate renovate.json

on:
  push:
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate-validate.yml'
  pull_request:
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate-validate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: renovate-config-validator
    runs-on: ubuntu-26.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      # `--strict` makes warnings (e.g. a deprecated or unknown option that
      # Renovate would otherwise tolerate and ignore) fail the run too. We want
      # to hear about a manager that has quietly stopped doing anything, not just
      # about outright-malformed JSON.
      - name: Validate renovate.json
        run: npx --yes --package renovate -- renovate-config-validator --strict renovate.json

      # The validator above checks SHAPE ONLY. It cannot tell you whether a
      # manager actually matches a file or whether a datasource returns anything
      # — and on 2026-07-18 we found it had been passing clean for four days
      # while ALL 18 custom managers extracted zero dependencies
      # (managerFilePatterns are globs unless slash-delimited) and the kernel
      # datasource returned `no-result` (JSONata collapsed its single-element
      # result to a bare object). The symptom was exactly what this workflow was
      # built to prevent: dependency PRs quietly not appearing.
      #
      # So actually RUN an extraction. `--platform=local` works against the
      # checkout with no repo credentials; the token is only needed so datasource
      # lookups run for real, which is what surfaces `no-result`.
      - name: Smoke-test extraction (custom managers must match real files)
        env:
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # NB: the full debug log runs to several GB — filter the stream, never
          # spool it to disk, or this step fills the runner.
          LOG_LEVEL=debug npx --yes --package renovate@latest -- \
            renovate --platform=local --dry-run=full 2>&1 \
            | grep -E '"regex": \{"fileCount"|"message": "Failed to look up' \
            > renovate-run.log || true

          expected=$(python3 -c 'import json;print(len(json.load(open("renovate.json"))["customManagers"]))')
          actual=$(grep -oE '"regex": \{"fileCount": [0-9]+' renovate-run.log \
            | grep -oE '[0-9]+$' | head -1 || true)
          actual=${actual:-0}

          echo "customManagers declared: $expected | regex files matched: $actual"
          if [ "$actual" -lt "$expected" ]; then
            echo "::error::Renovate's regex manager matched $actual file(s) but $expected custom managers are declared."
            echo "::error::At least one custom manager matches nothing. Check managerFilePatterns — entries are GLOBS unless slash-delimited (/^path$/)."
            exit 1
          fi

          # A datasource that returns nothing is invisible in the extraction stats.
          if grep -q '"message": "Failed to look up' renovate-run.log; then
            echo "::error::A datasource lookup failed (no-result). Offending entries:"
            grep -o '"message": "Failed to look up[^"]*"' renovate-run.log | sort -u
            exit 1
          fi

          echo "OK: $actual files matched, all datasource lookups resolved."
