################################################################################
#
# buildroot-build — the one and only recipe for building this image in CI.
#
# WHY THIS EXISTS: build.yml, release.yml and reproducibility.yml each had their
# own copy-pasted version of the steps below. build.yml then took five failed
# runs to get right (ENOSPC, missing defconfig, root-configure, busted toolchain
# caches) — and NONE of those fixes reached the other two, which would each have
# failed the same way the first time anyone pushed a tag. That is the whole case
# for this file: the recipe is subtle, hard-won, and must exist exactly once.
#
# The caller owns what is genuinely its own (which ref to check out, what to do
# with the images afterwards). Everything from "make the runner able to build"
# through "the images exist in output/images/" is here.
#
# Measured on the first green cold run (29300460591, 4-vCPU ubuntu-latest):
#   * wall time      3h19m47s cold
#   * output/        24 GB   <-- the reason the container had to go
#   * dl/            2.7 GB
#   * ccache         1.1 GB of a 4 GB cap (28%, no evictions)
#   * disk at end    8.4 GB free of 72 GB
#
################################################################################

name: Build the MiSTer image (Buildroot)
description: >-
  Prepares a GitHub-hosted runner for a full Buildroot build (disk reclaim, apt
  deps, five input caches), configures Buildroot from the tracked defconfig, and
  runs `make all` — leaving linux.img + zImage_dtb in output/images/.

inputs:
  extra-apt-packages:
    description: >-
      Space-separated apt packages to install on top of the mandatory build set
      (release.yml adds p7zip-full to assemble release_YYYYMMDD.7z).
    required: false
    default: ""
  ccache-max-size:
    description: >-
      Cap for the ccache cache. Default 4G: the real cold build fills 1.1 GB, so
      this has ~4x headroom and has never evicted. Lower this FIRST if the repo's
      caches approach GitHub's 10 GB ceiling — it is the cheapest one to shrink.
    required: false
    default: "4G"
  run-legal-info:
    description: 'Also run `make legal-info` (the SBOM) after the build. "true"/"false".'
    required: false
    default: "false"

runs:
  using: composite
  steps:
    # MUST be first, and is not optional. A stock GitHub-hosted runner has ~14 GB
    # free; output/ alone is 24 GB. Run 29295920820 died 1h37m in with ENOSPC in
    # host-gcc. Reclaiming the ~30 GB of preinstalled toolchains we never use is
    # what makes the build fit at all (measured: 16 GB free -> 40 GB free).
    #
    # This is ALSO why no job here may use `container:` — that preinstalled
    # software lives on the HOST, which a container job cannot reach to delete.
    # Plain `rm` rather than a third-party action, to avoid another supply-chain
    # dependency. `df` before/after so a future disk regression shows up in the
    # log instead of as a mysterious compiler error 90 minutes in.
    - name: Free disk space on the runner
      shell: bash
      run: |
        echo "--- disk before ---"; df -h /
        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /usr/local/.ghcup \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/share/powershell \
          /usr/local/share/boost \
          /usr/local/graalvm || true
        sudo docker image prune --all --force >/dev/null 2>&1 || true
        sudo apt-get clean || true
        echo "--- disk after ---"; df -h /

    # BUILDROOT_VERSION lives in the Makefile (Renovate watches that same line),
    # not in any workflow, so it cannot drift from what `make` actually fetches.
    #
    # WS_FP fingerprints the workspace PATH. A Buildroot cross-toolchain bakes its
    # prefix/sysroot in as an ABSOLUTE path — it is NOT relocatable (proof:
    # `make sdk` ships a relocate-sdk.sh precisely because of this). Restoring a
    # toolchain built at /__w/... into a build at /home/runner/work/... hands you
    # a subtly broken compiler. Keying the toolchain caches on the path means any
    # future move auto-busts them, instead of relying on a human to remember to
    # bump a hand-maintained `nc1`-style suffix. (ccache does NOT need this — it
    # IS relocatable, via the BR2_CCACHE_USE_BASEDIR passed to `make` below.)
    - name: Resolve Buildroot version + cache fingerprints
      shell: bash
      run: |
        set -eu
        ver=$(sed -n 's/^BUILDROOT_VERSION ?= //p' Makefile | head -1)
        if [ -z "$ver" ]; then
          echo "::error::could not extract BUILDROOT_VERSION from Makefile (format changed?)" >&2
          exit 1
        fi
        echo "BUILDROOT_VERSION=$ver" >> "$GITHUB_ENV"

        ws_fp=$(printf '%s' "$GITHUB_WORKSPACE" | sha256sum | cut -c1-8)
        echo "WS_FP=$ws_fp" >> "$GITHUB_ENV"

        # --- Toolchain cache fingerprint: a DENY-list, on purpose ---------------
        #
        # Hashing the WHOLE defconfig would evict the 1-3 GB cross-toolchain on
        # every package add (`BR2_PACKAGE_NANO=y` -> a 3h20m cold rebuild, for a
        # package that cannot touch the compiler). But the obvious fix -- an
        # ALLOW-list of "toolchain-ish" symbols -- is the wrong SHAPE, and the
        # first version of this code proved it: the pattern `^BR2_(...|ARM|CPU|arm)`
        # silently missed `BR2_cortex_a9=y`, which is lowercase and starts with
        # neither. Switching a9 -> a7 keeps every NEON/VFP line identical, so the
        # fingerprint would not have changed, the cortex-a9 toolchain would have
        # been restored WITH ITS STAMPS, and every target binary would have been
        # built with the wrong -mcpu. Silently.
        #
        # So invert it. Hash everything EXCEPT what provably cannot affect the
        # toolchain. The asymmetry is the whole point:
        #   * a wrong DENY-list over-busts  -> a wasted rebuild. Safe.
        #   * a wrong ALLOW-list under-busts -> a stale, WRONG compiler, which
        #     Buildroot does not detect (it wants a `make clean`). Not safe.
        #
        # Excluded, with reasons:
        #   BR2_PACKAGE_*      target packages; cannot change the compiler. And a
        #                      restored output/host that is merely INCOMPLETE is
        #                      self-healing -- a missing host-* package has no
        #                      stamp, so Buildroot simply builds it.
        #   BR2_LINUX_KERNEL_* the kernel we BUILD (incl. the version we bump
        #                      monthly). Distinct from BR2_KERNEL_HEADERS_*, the
        #                      headers glibc is compiled against -- that one is NOT
        #                      excluded and correctly still busts the cache.
        # Strip comments BEFORE filtering. This defconfig is heavily annotated, with
        # both trailing comments (`BR2_ROOTFS_MERGED_USR=y  # why`) and indented
        # continuation lines -- and most of those annotations hang off the
        # BR2_PACKAGE_ lines we are trying to exclude. Keeping them would mean
        # editing a COMMENT about a WiFi driver evicts the cross-toolchain and
        # costs a 3h20m rebuild. Only `#` that begins a line or follows whitespace
        # is a comment (values like the ext2 MKFS_OPTIONS contain `^` and `,` but
        # never a bare `#`), so this cannot corrupt a symbol's value.
        TC_GEN=1
        sed -e 's/^[[:space:]]*#.*$//' -e 's/[[:space:]]\+#.*$//' -e 's/[[:space:]]*$//' \
          configs/mister_de10nano_defconfig \
          | grep -vE '^($|BR2_PACKAGE_|BR2_LINUX_KERNEL)' \
          | sort > .br-toolchain-fingerprint

        # Patches that rewrite the toolchain's OWN sources. patches/linux/ is
        # deliberately not here: it changes on every kernel bump and cannot affect
        # the cross-compiler. (None of these dirs exist today -- this closes the
        # vector before someone opens it.)
        for d in gcc binutils glibc musl uclibc; do
          pd="board/mister/de10nano/patches/$d"
          if [ -d "$pd" ]; then
            find "$pd" -type f -exec sha256sum {} + | sort >> .br-toolchain-fingerprint
          fi
        done
        echo "gen=$TC_GEN" >> .br-toolchain-fingerprint

        # Fail loud if the defconfig is ever renamed/reformatted such that this
        # produces an empty or degenerate fingerprint: a frozen cache key is the
        # worst outcome available here (see above). Assert the two lines that no
        # ARM defconfig can lack and that nothing legitimate ever removes.
        for must in '^BR2_arm' '^BR2_cortex'; do
          if ! grep -q "$must" .br-toolchain-fingerprint; then
            echo "::error::toolchain fingerprint is missing '$must' -- the filter in .github/actions/buildroot-build/action.yml has gone stale, so this cache key can no longer detect a toolchain change. Refusing to build rather than risk restoring a wrong compiler." >&2
            exit 1
          fi
        done
        echo "Toolchain fingerprint ($(grep -c . .br-toolchain-fingerprint) lines):"
        cat .br-toolchain-fingerprint

        echo "Resolved BUILDROOT_VERSION=$ver  workspace-fp=$ws_fp"

    ############################################################################
    # Five input caches. Mind GitHub's 10 GB per-repo ceiling — it evicts
    # least-recently-used entries once the repo crosses it, so these are sized to
    # coexist. Measured sizes from the first green run are in the header above.
    ############################################################################

    # 1. Buildroot release tarball (~20-30 MB). Kept SEPARATE from dl/ on purpose:
    # it is redundant with the copy inside dl/, but keying it on the version ALONE
    # means a mere defconfig change can never evict this tiny, cheap entry.
    - name: Cache Buildroot release tarball
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/buildroot-${{ env.BUILDROOT_VERSION }}.tar.gz
        key: buildroot-tarball-${{ env.BUILDROOT_VERSION }}

    # 2. dl/ — every package source tarball (2.7 GB measured). Keyed on the full
    # defconfig (adding a package needs new sources), but restore-keys falls back
    # to the version alone so an imperfect match still hydrates everything that
    # did NOT change instead of re-downloading the whole package set. dl/ lives at
    # the repo root (survives `make clean`) — never move it under output/.
    - name: Cache Buildroot dl/ download cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: dl/
        key: br-dl-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_de10nano_defconfig') }}
        restore-keys: |
          br-dl-${{ env.BUILDROOT_VERSION }}-

    # 3. The main (glibc) cross-toolchain: output/host plus the per-package build
    # stamps under output/build/host-*/ that tell Buildroot's incremental make
    # those host packages are already built — without the stamps, restoring
    # output/host alone would not stop Buildroot rebuilding straight into it.
    # THE big win: this is what skips rebuilding gcc/binutils/glibc from scratch.
    - name: Cache Buildroot host toolchain
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          output/host
          output/build/host-*
        key: br-host-${{ env.WS_FP }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('.br-toolchain-fingerprint') }}

    # 4. The initramfs stage's SEPARATE static-musl cross-toolchain. `make
    # initramfs` builds its own; caching it turns a ~30 min cold stage 1 into a
    # couple of minutes warm. Busts only on an initramfs-defconfig change.
    - name: Cache initramfs host toolchain
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: |
          output-initramfs/host
          output-initramfs/build/host-*
        key: br-initramfs-host-${{ env.WS_FP }}-${{ env.BUILDROOT_VERSION }}-${{ hashFiles('configs/mister_initramfs_defconfig') }}

    # 5. ccache. CCACHE_DIR is exported here to match the BR2_CCACHE_DIR handed to
    # `make` below, so the action caches the exact directory Buildroot's compiler
    # wrapper writes to. Unlike the toolchain caches this one IS relocatable —
    # BR2_CCACHE_USE_BASEDIR rewrites the absolute paths in cached objects — so it
    # is deliberately NOT keyed on WS_FP.
    - name: Configure ccache directory
      shell: bash
      run: echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache" >> "$GITHUB_ENV"

    - name: Cache ccache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      # This action runs its own apt-get; it used to be covered by a job-level
      # DEBIAN_FRONTEND that the callers no longer carry, so set it here.
      env:
        DEBIAN_FRONTEND: noninteractive
      with:
        key: ccache-${{ env.BUILDROOT_VERSION }}
        max-size: ${{ inputs.ccache-max-size }}
        # This action `apt-get install`s ccache itself, BEFORE our own apt step
        # below has run `apt-get update` — so have it refresh the index first.
        # (Introduced when we ran in a container with an empty index; kept because
        # a runner's preinstalled index can be stale too, and it is what the first
        # green run actually used.)
        update-package-index: true

    # Buildroot's own documented mandatory set, plus: git (xone, munt, midilink and
    # the morrownr Realtek forks are fetched at pinned git commits — see
    # package/*/*.mk), bison/flex/gawk (kernel Kbuild's documented minimum),
    # ca-certificates (without it every HTTPS package mirror fails TLS outright),
    # python3 (scripts/abi/needed-symbols.py + Buildroot infra), libssl/libncurses/
    # pkg-config/texinfo (probed by third-party configure scripts even when
    # cross-compiling), qemu-user (ci-tests.sh runs target binaries under qemu-arm),
    # e2fsprogs (dumpe2fs fallback for check-linux-img.sh).
    # EXTRA_APT goes through the environment rather than being interpolated
    # straight into the script body: `${{ }}` inside a run: block is textual
    # substitution, which is the classic Actions script-injection footgun. The
    # value is ours today, but the safe form costs nothing.
    - name: Install build dependencies
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
        EXTRA_APT: ${{ inputs.extra-apt-packages }}
      run: |
        set -eu
        sudo apt-get update
        # shellcheck disable=SC2086 -- word splitting of EXTRA_APT is intended
        sudo -E apt-get install -y --no-install-recommends \
          build-essential bash bc bison flex gawk \
          git patch gzip bzip2 xz-utils cpio unzip rsync \
          file wget curl ca-certificates perl \
          python3 python3-dev \
          libssl-dev libncurses-dev pkg-config texinfo \
          qemu-user e2fsprogs \
          $EXTRA_APT
        sudo rm -rf /var/lib/apt/lists/*

    # Fails fast and loud if the runner's `install` is ever not GNU coreutils
    # (see the Makefile's `hostshim` target) — cheap to check before spending
    # three hours of build time.
    - name: Verify host `install` is GNU coreutils
      shell: bash
      run: make hostshim

    # Buildroot needs output/.config before `make all`. A fresh checkout has only
    # the tracked defconfig, so the build dies instantly with "Please configure
    # Buildroot first" — run 29293209070 failed exactly there, AFTER a 52-minute
    # stage 1. (The initramfs stage doesn't hit this; its Makefile rule generates
    # its own .config.) Regenerate unconditionally on every run: the defconfig is
    # the reproducible source of truth, and doing it every time also stops a stale
    # cached output/.config from silently overriding a defconfig change.
    - name: Configure Buildroot (generate output/.config from the defconfig)
      shell: bash
      run: make mister_de10nano_defconfig

    # ONE invocation builds BOTH stages: `make all`'s recipe is `all: initramfs
    # ...`, so this covers the static-musl initramfs and the main glibc rootfs +
    # kernel + linux.img. BR2_CCACHE propagates through MAKEFLAGS to BOTH
    # sub-builds, so the musl toolchain gets ccache too (musl and glibc objects
    # have distinct ccache keys, so they coexist safely in one cache).
    #
    # MISTER_VERSION, if the caller exported it to $GITHUB_ENV (release.yml does,
    # per ADR 0018), is inherited here and baked into /MiSTer.version by
    # post-build.sh. Left unset everywhere else, which keeps ordinary builds
    # reproducible.
    - name: Build image (make all — initramfs + main rootfs, ccache both)
      shell: bash
      run: |
        make all \
          BR2_CCACHE=y \
          BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
          BR2_CCACHE_USE_BASEDIR=y

    - name: Generate legal-info (SBOM)
      if: inputs.run-legal-info == 'true'
      shell: bash
      run: |
        make legal-info \
          BR2_CCACHE=y \
          BR2_CCACHE_DIR=$GITHUB_WORKSPACE/.ccache \
          BR2_CCACHE_USE_BASEDIR=y

    - name: Report disk & cache usage
      if: always()
      shell: bash
      run: |
        echo "--- disk free ---"; df -h .
        echo "--- dl/ ---"; du -sh dl 2>/dev/null || true
        echo "--- output/host ---"; du -sh output/host 2>/dev/null || true
        echo "--- output (total) ---"; du -sh output 2>/dev/null || true
        echo "--- ccache ---"; du -sh "$GITHUB_WORKSPACE/.ccache" 2>/dev/null || true
