################################################################################
#
# renovate-hash-sync.yml -- refresh companion tarball/kernel hashes on a
# Renovate PR (TASKS.md P4.6).
#
# Renovate can bump a version/commit pin but cannot recompute a tarball's
# sha256 itself. Every pin this repo tracks has a companion `.hash` file that
# must move in lockstep or Buildroot's own hash check fails the build CLOSED
# (safe, but red and useless without a human redoing the hash by hand). See
# docs/ci.md#renovate-hash-sync-overview.
#
# Four cases: (1) the 12 github-sourced package pins, (2) the kernel tarball
# hash, (3) the bespoke lzma-sdk release-asset hash, (4) the sdcard payload
# single-file pins. Why a locally-computed sha256sum is a legitimate source
# for each of these (not a shortcut): docs/ci.md#renovate-hash-sync-safety-model.
#
# NEVER automated: BUILDROOT_SHA256 (signed-manifest-only trust), the RT
# beta's TOFU-pinned `-rc` kernel hash, cabextract/linux-firmware-extra/
# xow-firmware. See docs/ci.md#renovate-hash-sync-not-automated.
#
# TRIGGER: automatically, only for same-repo Renovate PRs touching a file this
# workflow knows how to fix; idempotent (recomputes every run, commits only on
# a real diff). Manually via workflow_dispatch -- the only way to re-drive
# this workflow after a bug in it is fixed. See
# docs/ci.md#renovate-hash-sync-overview and
# docs/ci.md#renovate-hash-sync-dispatch-trap (run 29669946883).
#
# STATUS: only the kernel step is proven against a real PR (#41). A green run
# elsewhere can mean "silently skipped", not "verified correct" (bug #42). See
# docs/ci.md#renovate-hash-sync-verification-status.
#
# Every step below records a per-pin outcome and the job fails if one is
# "failed" or if the whole run did nothing -- see
# docs/ci.md#renovate-hash-sync-outcomes-gate.
#
# NOTE: scripts/hash-sync-{kernel,github-packages,lzma-sdk,sdcard-payload}.sh
# + scripts/lib/hash-sync-common.sh are the four cases below -- each step
# just invokes its script (see the second checkout, below, for where the
# scripts come from). Fix bugs IN THE SCRIPTS; this file only wires them up
# and owns the per-pin outcome ledger / push-gate / job-summary steps that
# read what the scripts emit. Each script's own header still carries the
# case-specific rationale (the `|| true` traps, the major-series-scoped
# linux.hash match, etc.) -- read it before touching that case's logic.
#
################################################################################

name: Renovate hash sync

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "configs/mister_de10nano_defconfig"
      # mister_kernel_defconfig copies this stanza's kernel version (one Renovate
      # PR bumps both); mister_rt.fragment is deliberately absent -- its hash
      # can't auto-refresh. See docs/ci.md#renovate-hash-sync-not-automated.
      - "configs/mister_kernel_defconfig"
      - "package/rtl8812au/rtl8812au.mk"
      - "package/rtl8814au-morrownr/rtl8814au-morrownr.mk"
      - "package/rtl8821au-morrownr/rtl8821au-morrownr.mk"
      - "package/rtl8821cu-morrownr/rtl8821cu-morrownr.mk"
      - "package/rtl8188fu/rtl8188fu.mk"
      - "package/rtl8188eu-aircrack-ng/rtl8188eu-aircrack-ng.mk"
      - "package/rtl88x2bu/rtl88x2bu.mk"
      - "package/xone/xone.mk"
      - "package/midilink/midilink.mk"
      - "package/munt/munt.mk"
      - "package/bcm20702-firmware/bcm20702-firmware.mk"
      - "package/libchdr/libchdr.mk"
      - "package/lzma-sdk/lzma-sdk.mk"
      - "scripts/fetch-sdcard-payload.sh"

  # Manual escape hatch -- nothing else can re-drive this workflow after a fix
  # lands (run 29669946883). `branch` is the branch to FIX, NOT the ref you're
  # dispatching from. See docs/ci.md#renovate-hash-sync-dispatch-trap.
  workflow_dispatch:
    inputs:
      branch:
        description: "Plain branch name to refresh companion hashes on (e.g. renovate/kernel-longterm-6.18-6.x). NOT the branch you are dispatching from, and NOT a ref -- refs/heads/x and heads/x are rejected."
        required: true
        type: string

concurrency:
  # pull_request runs key on the PR number; dispatch runs key on the target
  # branch. Without the fallback every manual run would share one empty-suffix
  # group and cancel the previous one.
  group: renovate-hash-sync-${{ github.event.pull_request.number || inputs.branch }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  hash-sync:
    name: Refresh companion hashes for this branch's version bump(s)
    runs-on: ubuntu-26.04
    # Automatic runs: only Renovate's own PRs, and never a fork (pushing back
    # needs write access to the head branch, which a fork PR's default token
    # never has). Manual runs: workflow_dispatch is already restricted to
    # collaborators with write access, which is the same bar this gate enforces
    # for the automatic path -- so it does not widen who can drive this.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.actor == 'renovate[bot]' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    timeout-minutes: 10

    # Resolved once, as a shell var (not an inline expression), to avoid a
    # script-injection vector via github.event.pull_request.head.ref -- a
    # branch name is attacker-controlled text on a PR. See
    # docs/ci.md#branch-name-injection.
    env:
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.event.pull_request.head.ref }}

      # Bare filename (not a full path): the `runner` context isn't available
      # in a job-level env: block -- every step below prefixes it with
      # $RUNNER_TEMP instead. Scoped by run_id/run_attempt so an earlier abort
      # can't leak a stale run's outcomes into this run's summary. See
      # docs/ci.md#renovate-hash-sync-outcomes-gate.
      HASH_SYNC_OUTCOMES_FILE: hash-sync-outcomes-${{ github.run_id }}-${{ github.run_attempt }}.tsv

      # Single source of truth for the 12 github-sourced package pins -- shared
      # by step 1's loop and the job-summary gate's pin roster so they can't
      # drift apart. See docs/ci.md#renovate-hash-sync-outcomes-gate.
      HASH_SYNC_PACKAGES: "rtl8812au rtl8814au-morrownr rtl8821au-morrownr rtl8821cu-morrownr rtl8188fu rtl8188eu-aircrack-ng rtl88x2bu xone midilink munt bcm20702-firmware libchdr"

    steps:
      # A manual run pushes commits to whatever branch it is pointed at, so
      # refuse the default branch outright: that would land an auto-generated
      # hash commit on master with no review. The automatic path cannot hit
      # this (a PR head branch is never the base), but a mistyped input can.
      - name: Validate the target branch, and refuse the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ -z "$TARGET_BRANCH" ]; then
            echo "::error::target branch resolved to empty -- nothing to check out." >&2
            exit 1
          fi

          # Syntactic validation first: rejects empty, embedded spaces, "..",
          # a leading "-", and the other things git considers malformed. Runs
          # before checkout, which is fine -- check-ref-format needs no repo.
          if ! git check-ref-format --branch "$TARGET_BRANCH" >/dev/null 2>&1; then
            echo "::error::'$TARGET_BRANCH' is not a valid git branch name." >&2
            exit 1
          fi

          # REJECT ref-namespace forms rather than normalise: refs/heads/x and
          # heads/x both resolve to the same branch as x (verified with
          # `git push --dry-run`), which would bypass the compare below. See
          # docs/ci.md#renovate-hash-sync-branch-validation.
          case "$TARGET_BRANCH" in
            refs/*|heads/*|remotes/*|tags/*)
              echo "::error::pass a plain branch name, not a ref: '$TARGET_BRANCH'." >&2
              echo "::error::git resolves refs/heads/<x> and heads/<x> to the same branch as <x>, which would slip past the default-branch check below." >&2
              exit 1
              ;;
          esac

          if [ "$TARGET_BRANCH" = "$DEFAULT_BRANCH" ]; then
            echo "::error::refusing to run against the default branch ('$TARGET_BRANCH') -- this workflow commits and pushes hash fixes, which must go through a PR." >&2
            exit 1
          fi

          echo "target branch: $TARGET_BRANCH"

      # Same actions/checkout pin as every workflow in this repo -- kept in
      # sync so Renovate's github-actions manager tracks ONE dependency. See
      # docs/ci.md#pin-conventions.
      - name: Checkout the target branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The PR head branch, or the dispatch input -- NOT the ref this
          # workflow definition came from. On a manual run those differ by
          # design (see docs/ci.md#renovate-hash-sync-dispatch-trap).
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 1

      # A SECOND checkout -- of the hash-sync scripts only, at the ref THIS
      # workflow definition itself runs from, deliberately NOT the target
      # branch checked out above. Why this has to be a second checkout and
      # not just `scripts/hash-sync-*.sh` from the tree above: a kernel-bump
      # PR (or any branch) that predates this extraction does not have these
      # scripts at all, so invoking them out of the target-branch checkout
      # would exit 127 there -- and the workflow_dispatch escape hatch's
      # entire purpose (see docs/ci.md#renovate-hash-sync-dispatch-trap) is to
      # run a FIXED copy of this logic against a stale branch, which sourcing
      # the scripts from that same stale branch would defeat outright.
      # `path:` checks this out into its own subdirectory so it cannot
      # clobber the target-branch working tree checked out above.
      - name: Checkout hash-sync scripts at the workflow's own ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.workflow_sha }}
          path: .hash-sync-tools
          fetch-depth: 1

      # --- 1. Github-sourced packages (drivers/firmware + libchdr) -----------
      # Generic loop over the shared Buildroot `$(call github,...)` archive
      # naming convention (verified against every existing .hash file in this
      # tree). Only the FIRST sha256 line is ever rewritten -- a further line
      # legitimately changing fails the build closed for a human to re-derive.
      # See docs/ci.md#companion-hash-first-line-only.
      #
      # Runs from the SECOND checkout (.hash-sync-tools, at this workflow's
      # own ref), against the TARGET branch's tree ($GITHUB_WORKSPACE, the
      # first checkout) -- see that checkout step's comment for why. This is
      # also the step that creates/truncates the shared outcomes file for the
      # run (scripts/hash-sync-github-packages.sh's own header); the other
      # three cases append to it. HASH_SYNC_PACKAGES and
      # HASH_SYNC_OUTCOMES_FILE come from the job-level env: block above;
      # GITHUB_ENV/RUNNER_TEMP are supplied by Actions itself. See
      # docs/ci.md#renovate-hash-sync-outcomes-gate.
      - name: Refresh github-sourced package tarball hashes
        run: .hash-sync-tools/scripts/hash-sync-github-packages.sh "$GITHUB_WORKSPACE"

      # --- 2. Kernel tarball hash --------------------------------------------
      # Only touches board/mister/de10nano/patches/linux/linux.hash's own
      # sha256 data line; the header comment block above it is preserved
      # verbatim by only ever replacing the matched "sha256" line. Runs from
      # the .hash-sync-tools checkout (this workflow's own ref) against the
      # target branch's tree; see step 1's comment and
      # docs/ci.md#renovate-hash-sync-dispatch-trap for why -- this is the
      # case bug #42 and run 29669946883 both came from, so running a stale
      # copy of THIS script against a branch that needs the fix is exactly
      # the failure this second checkout exists to prevent.
      - name: Refresh kernel tarball hash from kernel.org's signed manifest
        run: .hash-sync-tools/scripts/hash-sync-kernel.sh "$GITHUB_WORKSPACE"

      # --- 3. lzma-sdk release-asset tarball hash ----------------------------
      # Bespoke, NOT part of step 1's generic loop: lzma-sdk's tarball is a
      # release ASSET, not a commit/tag archive, and its filename derives from
      # the version with the dots stripped (26.02 -> 7z2602-src.tar.xz). Only
      # the FIRST sha256 line is rewritten. See
      # docs/ci.md#companion-hash-first-line-only. Runs from the
      # .hash-sync-tools checkout against the target branch's tree; see step
      # 1's comment.
      - name: Refresh lzma-sdk release-asset tarball hash
        run: .hash-sync-tools/scripts/hash-sync-lzma-sdk.sh "$GITHUB_WORKSPACE"

      # --- 4. SD-card payload single-file pins -------------------------------
      # Pins update_all.sh + wifi.sh only, by commit AND sha256+size;
      # PINNED_CORES_COMMIT has no companion hash and is deliberately not
      # handled here. See docs/ci.md#renovate-hash-sync-not-automated. Runs
      # from the .hash-sync-tools checkout against the target branch's tree;
      # see step 1's comment.
      - name: Refresh sdcard payload script hashes (update_all.sh, wifi.sh)
        run: .hash-sync-tools/scripts/hash-sync-sdcard-payload.sh "$GITHUB_WORKSPACE"

      # Gate the push: ANY pin recorded "failed" (from any of the four steps
      # above) suppresses the commit/push below. MUST run and be evaluated
      # BEFORE the push -- the summary/gate step at the end of the job
      # deliberately runs LAST, which is exactly wrong for this check. See
      # docs/ci.md#renovate-hash-sync-outcomes-gate.
      - name: Check for a recorded workflow bug before pushing anything
        run: |
          set -euo pipefail
          # Resolved to a full path per-step; see
          # docs/ci.md#renovate-hash-sync-outcomes-gate.
          outcomes_file="$RUNNER_TEMP/$HASH_SYNC_OUTCOMES_FILE"
          touch "$outcomes_file"
          n_failed=$(awk -F'\t' '$2 == "failed" { c++ } END { print c+0 }' "$outcomes_file")
          echo "HASH_SYNC_FAILED=$n_failed" >> "$GITHUB_ENV"
          if [ "$n_failed" -gt 0 ]; then
            echo "::warning::$n_failed pin(s) recorded a 'failed' (workflow-bug) outcome this run -- suppressing the commit/push step below even though another pin's hash may have refreshed. The job summary step still fails the run; re-dispatch after the bug is fixed to pick up the suppressed refresh(es)."
          fi

      - name: Commit and push hash refresh, if anything changed
        if: >
          (env.PKG_HASH_CHANGED == '1' || env.PATCH_HASH_CHANGED == '1' ||
           env.LZMA_SDK_HASH_CHANGED == '1' || env.PAYLOAD_HASH_CHANGED == '1') &&
          env.HASH_SYNC_FAILED == '0'
        run: |
          set -euo pipefail
          git config user.name "renovate-hash-sync[bot]"
          git config user.email "renovate-hash-sync@users.noreply.github.com"
          git add package/*/*.hash board/mister/de10nano/patches/linux/linux.hash scripts/fetch-sdcard-payload.sh
          git commit -F - <<'COMMITMSG'
          renovate-hash-sync: refresh companion hash(es) for this PR

          Recomputed from a freshly-fetched artifact:
            - driver/firmware/libchdr package pins: sha256sum of the github
              archive tarball at the new pinned owner/repo/ref (same "locally
              computed" practice this tree's own .hash file headers already
              document)
            - kernel pin: kernel.org's signed sha256sums.asc for the
              matching v6.x series
            - lzma-sdk pin: sha256sum of the ip7z/7zip release ASSET for the
              new version (upstream publishes no checksums at all -- see
              package/lzma-sdk/lzma-sdk.hash's header)
            - sdcard payload pins (update_all.sh, wifi.sh): sha256 + size of
              the raw file at the new pinned commit, rewritten in place in
              scripts/fetch-sdcard-payload.sh

          BUILDROOT_SHA256 (root Makefile) is NEVER touched by this
          workflow -- see docs/renovate.md and the Makefile's own header
          comment. That value must come from Buildroot's GPG-signed .sign
          manifest and is a manual step.
          COMMITMSG
          # Shell variable, NOT a workflow-expression interpolation --
          # TARGET_BRANCH is attacker-controlled text on a PR (command-injection
          # vector otherwise). See docs/ci.md#branch-name-injection.
          # "--" stops a branch named like an option from being parsed as one.
          git push origin -- "HEAD:$TARGET_BRANCH"

      # --- Job summary + pass/fail gate over every pin's outcome -------------
      # `if: !cancelled()`, NOT `always()`: this table must survive an
      # unanticipated abort, but must NOT fire "workflow bug" errors when
      # GitHub's own cancel-in-progress cancels a superseded run -- that would
      # train readers to distrust the table. See
      # docs/ci.md#renovate-hash-sync-outcomes-gate.
      - name: Build job summary and fail on a bug or an all-skipped run
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          # Resolved to a full path per-step; see
          # docs/ci.md#renovate-hash-sync-outcomes-gate.
          outcomes_file="$RUNNER_TEMP/$HASH_SYNC_OUTCOMES_FILE"
          touch "$outcomes_file"

          # Every pin this workflow owns, in step order; cross-checked below so
          # an unhandled `set -e` abort mid-loop can't make a pin silently
          # vanish from this summary -- exactly how run 29669946883 went
          # unnoticed. See docs/ci.md#renovate-hash-sync-outcomes-gate.
          all_pins="$HASH_SYNC_PACKAGES kernel lzma-sdk PINNED_UPDATE_ALL PINNED_WIFI_SH"

          complete_file=$(mktemp)
          cp "$outcomes_file" "$complete_file"
          for pin in $all_pins; do
            if ! awk -F'\t' -v p="$pin" '$1 == p { found=1 } END { exit !found }' "$outcomes_file"; then
              # "not-run" != "failed": no outcome recorded means the pin's own
              # step never reached it, not proof of a parse bug -- still
              # counts toward the fail gate, just not the "workflow bug"
              # message. See docs/ci.md#renovate-hash-sync-outcomes-gate.
              printf '%s\t%s\t%s\n' "$pin" not-run \
                "no outcome recorded -- its step exited before reaching this pin (check the step logs above)" \
                >> "$complete_file"
            fi
          done

          {
            echo "## Renovate hash-sync outcomes"
            echo
            echo "A skip or failure here means a companion \`.hash\` (or the sdcard"
            echo "payload script) was NOT refreshed for this PR. That is only safe"
            echo "because Buildroot's own hash check fails the BUILD closed on a stale"
            echo "hash -- it is never silently accepted -- but a skip should still be"
            echo "investigated, not just left for the build to catch."
            echo
            echo "| Pin | Outcome | Reason |"
            echo "|---|---|---|"
            while IFS=$'\t' read -r pin outcome reason; do
              # Escape any literal pipe in a reason so it can't break the table.
              reason=${reason//|/\\|}
              echo "| \`$pin\` | $outcome | $reason |"
            done < "$complete_file"
          } >> "$GITHUB_STEP_SUMMARY"

          n_failed=$(awk -F'\t' '$2 == "failed" { c++ } END { print c+0 }' "$complete_file")
          n_notrun=$(awk -F'\t' '$2 == "not-run" { c++ } END { print c+0 }' "$complete_file")
          n_refreshed=$(awk -F'\t' '$2 == "refreshed" { c++ } END { print c+0 }' "$complete_file")
          n_current=$(awk -F'\t' '$2 == "already-current" { c++ } END { print c+0 }' "$complete_file")
          n_skipped=$(awk -F'\t' '$2 == "skipped" { c++ } END { print c+0 }' "$complete_file")
          echo "totals: refreshed=$n_refreshed already-current=$n_current skipped=$n_skipped not-run=$n_notrun failed=$n_failed"

          fail=0

          # Case 1: a genuine bug (a parse/extract failure against a file
          # THIS repo controls, or an unresolvable ambiguity in linux.hash).
          # These are never legitimate to wave through.
          if [ "$n_failed" -gt 0 ]; then
            echo "::error::$n_failed pin(s) failed (a workflow bug, not an upstream network condition) -- see the job summary table." >&2
            fail=1
          fi

          # Case 1b: "not-run" pins -- same "never vanish silently" reasoning
          # as above. See docs/ci.md#renovate-hash-sync-outcomes-gate.
          if [ "$n_notrun" -gt 0 ]; then
            echo "::error::$n_notrun pin(s) never ran -- an earlier step aborted before reaching them -- see the job summary table." >&2
            fail=1
          fi

          # Case 2: run-29669946883 signature -- EVERY pin skipped/not-run/
          # failed, nothing refreshed/current. A single pin's network blip is
          # fine; the WHOLE run doing nothing is not. See
          # docs/ci.md#renovate-hash-sync-outcomes-gate.
          if [ "$((n_refreshed + n_current))" -eq 0 ]; then
            echo "::error::every tracked pin was skipped, not-run, or failed -- this is the run-29669946883 signature (the job would otherwise report green while doing nothing). See the job summary table." >&2
            fail=1
          fi

          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
