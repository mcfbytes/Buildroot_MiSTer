################################################################################
#
# build.yml — CI build workflow (TASKS.md P4.1, PLAN.md §9 "Build").
#
# Builds the full MiSTer image the way a developer would locally — by calling
# this repo's own wrapper Makefile (`make all`) — then runs the non-hardware
# parity suite (scripts/ci-tests.sh, P3.12) and the ABI/SONAME checker (P2.2)
# against the result, and uploads the two shipped images plus the SBOM.
#
# Kernel variants (today: the PREEMPT_RT / Linux-7.2 beta, docs/rt-beta-kernel.md,
# ADR 0021 as amended 2026-07-18) are built FIRST by `build-kernel`, a one-job
# matrix of KERNEL-ONLY Buildroot builds behind the same gate. Each leg uploads
# its kernel + depmod'd module tree as an inter-job artifact; `build` then runs
# serially after the matrix, unpacks every leg's module tree into
# work/extra-modules-overlay/, and the unchanged `make all` folds them into the
# ONE shipped linux.img — so a single image carries the main 6.18 modules AND
# every variant's. Adding a kernel variant = one configs/mister_<name>.fragment
# + its Makefile targets — nothing to edit in this file. The matrix below is
# `fromJSON` of `gate`'s `kernel_variants` output, which `scripts/
# list-kernel-variants.sh` derives from the filesystem (configs/mister_*.fragment
# is the registry — the same one .github/actions/buildroot-build's
# fragment-existence check reads), so build.yml and release.yml consume the
# identical, single-source list instead of each hand-maintaining their own.
#
# The build recipe itself — disk reclaim, the five input caches, apt deps,
# defconfig, `make all` (or `make <variant>` for a kernel leg) — lives in
# .github/actions/buildroot-build, SHARED with release.yml and
# reproducibility.yml. It is deliberately not inlined here: the three workflows
# used to each carry their own copy, and the fixes that took build.yml five
# failed runs to find never reached the other two. Read that action's header
# before changing anything about how the build runs.
#
# The ABI/SONAME checker is scripts/check-abi.sh (P2.2), run below against the
# built rootfs. ci-tests.sh's own "ABI / stock-binary smoke" section still
# carries a lightweight interim of the two qemu-user gates (A-10/A-22) — cheap,
# and intentionally redundant on the two highest-value checks.
#
################################################################################

name: Build

# This build costs ~3h20m cold — and since ADR 0021 the kernel-variant matrix
# (`build-kernel`) runs SERIALLY BEFORE `build` (the image build consumes the
# legs' module trees, so it cannot start until they finish). That serialization
# is a deliberate trade: it adds roughly the kernel legs' wall-clock (~+1 h
# warm, more cold) to every gated PR run, in exchange for one shipped image
# carrying every kernel's modules. The cost levers, if that ever stops paying:
# shrink the matrix, or demote `build-kernel` to push/dispatch-only. That
# demotion is NOT a one-line `if:` — three other places hard-code "the kernel
# legs always ran", and skipping the job without touching them turns every PR
# run red instead of main-only: (1) `build`'s `if:` uses no status function,
# so a skipped need skips `build` itself (the needs-cascade rule documented at
# that job) — it would need an `always() && build_needed`-style guard; (2) the
# `status` truth table treats a skipped build-kernel while build_needed=true
# as a workflow bug — it would need a policy-skip success path; (3) the
# merge-kernel-modules action's "Populate the extra-modules overlay" step
# (.github/actions/merge-kernel-modules/action.yml) hard-errors on zero
# modules tars (the download step itself tolerates an unmatched pattern) —
# that guard would need relaxing, accepting that PR images then carry only
# main modules.
# What triggers the whole pipeline is a budget decision, not a detail.
# Two things are going on below.
#
# 1. `push` is scoped to master. It used to be a bare `push:`, which — next to
#    `pull_request:` — meant EVERY commit on a PR branch built TWICE, once per
#    event, ~6h40m of runner time for one commit. They didn't even cancel each
#    other: the concurrency group keys on github.ref, and the two events see
#    different refs (refs/heads/<branch> vs refs/pull/N/merge), so both ran to
#    completion. Confirmed from the run history, not deduced — every SHA in
#    `gh run list` appeared twice, once `push` and once `pull_request`.
#    Now: PRs build once via `pull_request`, master builds once post-merge via
#    `push`. A branch pushed with no PR open doesn't build, which is the point.
#
# 2. Doc-only changes don't compile. NOTE the mechanism: this is decided by the
#    `gate` job below, NOT by a `paths-ignore:` on this trigger. That was the
#    obvious implementation and it is a trap, because it is incompatible with
#    the branch protection this repo wants later: `paths-ignore` stops the
#    workflow from running AT ALL, so a required "Build" check is never
#    reported, sits pending forever, and a docs-only PR can never merge. A
#    skipped JOB has the same problem — "skipped" is not "success" to branch
#    protection. So the workflow always runs, and the thing that is safe to
#    mark required is the `status` job at the bottom, which always reports.
#
#    The gate is a DENYLIST ("build unless everything changed is a doc"), not
#    an allowlist ("build only when these paths change"). The allowlist is the
#    tempting read of "only build when a recompile is needed", but it fails the
#    wrong way: add a build-relevant path, forget to list it, and CI goes green
#    having compiled nothing. The denylist fails toward building — it wastes
#    minutes, it never hides a break. Same reasoning as `clean` erroring rather
#    than skipping in the top-level Makefile: a tree that looks tested and
#    isn't is worse than one that obviously wasn't.
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

# Cancel a superseded run for the same ref (e.g. a new push to an open PR)
# rather than burning CI minutes finishing a build nobody wants anymore.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only reads the repo and uploads artifacts,
# both covered by the default `contents: read` — no token write scope needed.
permissions:
  contents: read

jobs:
  # Costs seconds. Decides whether the 3h20m job below is worth starting.
  #
  # Deliberately plain git rather than a paths-filter action: this repo pins
  # every action by SHA for supply-chain reasons, and a `git diff --name-only`
  # plus a `case` is not worth a new third-party dependency to review forever.
  gate:
    name: Decide whether a build is needed
    runs-on: ubuntu-26.04
    outputs:
      build_needed: ${{ steps.decide.outputs.build_needed }}
      kernel_variants: ${{ steps.variants.outputs.kernel_variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history: the diff range below reaches back to a base commit
          # that a shallow clone would not have.
          fetch-depth: 0

      # Computed UNCONDITIONALLY -- i.e. before `decide` below, and regardless
      # of what it finds -- so `build-kernel`'s `strategy.matrix` always has a
      # well-formed JSON array to `fromJSON()`, including on a doc-only run
      # where `build-kernel` itself then never executes (its `if:` reads
      # `build_needed`, not this). A doc-only change must still produce a
      # valid kernel_variants output; only a genuine repo bug (zero fragments,
      # or one with an invalid name) may make this step -- and therefore the
      # whole gate job -- fail loudly. See scripts/list-kernel-variants.sh's
      # header for the full contract.
      - name: Derive kernel-variant matrix
        id: variants
        run: |
          set -euo pipefail
          json=$(scripts/list-kernel-variants.sh)
          echo "kernel_variants=$json" >> "$GITHUB_OUTPUT"

      - name: Decide
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          # Every path that provably cannot affect a compile. Everything else --
          # board/, configs/, package/, scripts/, Makefile, external.*,
          # Config.in, and .github/ itself (this file and the shared composite
          # action) -- builds. Verified before writing this: no .md is read by
          # the Makefile, external.mk, Config.in or post-build.sh.
          is_doc() {
            case "$1" in
              docs/*|*.md|LICENSE|.editorconfig|.gitignore) return 0 ;;
              *) return 1 ;;
            esac
          }

          # Establish a diff range, or give up and build. Every unknown here
          # resolves to "build": a wasted run costs minutes, a wrongly-skipped
          # one ships an untested image.
          if [ "$EVENT" = "pull_request" ] && [ -n "${BASE_SHA:-}" ] \
             && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            range="${BASE_SHA}...HEAD"
          elif [ "$EVENT" = "push" ] && [ -n "${BEFORE:-}" ] \
               && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] \
               && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            range="${BEFORE}..HEAD"
          else
            echo "No usable diff range for event '$EVENT' (new branch, force-push, or missing base) -- building."
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff --name-only "$range" --)
          if [ -z "$files" ]; then
            echo "Empty diff over '$range' -- building rather than guessing why."
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "--- changed files ($range) ---"
          echo "$files"
          echo "---"

          needed=false
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            if ! is_doc "$f"; then
              echo "Build input touched: $f"
              needed=true
              break
            fi
          done <<< "$files"

          if [ "$needed" = "true" ]; then
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Build required."
          else
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Documentation-only change -- skipping the image build."
          fi

  # The kernel-variant matrix (ADR 0021 as amended 2026-07-18). Each leg is a
  # KERNEL-ONLY Buildroot build (configs/mister_kernel_defconfig + the variant's
  # fragment): zImage_dtb + a depmod'd module tree, no userland. It runs BEFORE
  # `build` because `build` consumes the legs' module trees; a leg that fails
  # auto-skips `build` via `needs`, and `status` explains that cascade.
  # Adding a variant here = one new configs/mister_<name>.fragment (plus its
  # Makefile targets) — everything in this job, including the matrix itself,
  # derives from the name via `gate`'s `kernel_variants` output (see
  # scripts/list-kernel-variants.sh and the header above).
  build-kernel:
    name: Build kernel (${{ matrix.kernel }})
    needs: gate
    if: needs.gate.outputs.build_needed == 'true'
    runs-on: ubuntu-26.04
    strategy:
      matrix:
        kernel: ${{ fromJSON(needs.gate.outputs.kernel_variants) }}

    # Estimated: cold = cross-toolchain from scratch (~1h of main's measured
    # 3h19m) + the stage-1 initramfs (~30 min cold, its toolchain cached
    # separately) + one kernel build; warm is dominated by the kernel alone.
    # 240 leaves roughly 2x slack over that estimate while still killing a
    # hung leg well before GitHub's silent 6-hour default.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The shared leg recipe (build the variant, job-summary overview, stage
      # + upload the artifact) -- see .github/actions/kernel-leg. Both inputs
      # default to "false": manifest-only SBOM (a CI push distributes
      # nothing) and the CI-flavoured Trigger/Commit/Packages(SBOM) summary.
      - name: Build kernel leg (${{ matrix.kernel }})
        uses: ./.github/actions/kernel-leg
        with:
          kernel: ${{ matrix.kernel }}

  build:
    name: Build image (two-stage Buildroot)
    # needs on the matrix job aggregates ALL its legs; a failed (or cancelled)
    # leg therefore auto-skips this job — `status` below translates that skip
    # into "the kernel leg is the root cause", not a second failure.
    needs: [gate, build-kernel]
    if: needs.gate.outputs.build_needed == 'true'
    runs-on: ubuntu-26.04

    # 300 min, from a real measurement rather than a guess: the first green cold
    # build (run 29300460591 — empty caches, 4-vCPU runner) took 3h19m47s. This
    # is ~1.5x that, so a legitimately slow cold build still finishes while a
    # genuinely hung one is killed ahead of GitHub's silent 6-hour default.
    #
    # A cold build is NOT the rare case: any change to the toolchain fingerprint
    # busts the cross-toolchain cache. Ordinary package adds do NOT (see the
    # composite action) — those stay warm and are far quicker.
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Deliberately BEFORE the build, and deliberately in this job rather than a
      # job of its own: it needs no kernel tree and no network, runs in about a
      # second, and so costs no extra runner minutes here while failing fast
      # instead of after a possible 300-minute build.
      #
      # It guards an interface the build itself cannot: Buildroot applies these
      # patches with `patch -p1`, which ignores mail headers, so a malformed
      # `From:` builds green and only breaks when the series is replayed as git
      # history with `git am`. See the script's header.
      #
      # With no arguments it lints BOTH series -- the carried one Buildroot
      # applies, and linux-patches-upstream/, which is carried for the exported
      # tree only. The second needs this more than the first: nothing else in
      # this repo reads those files at all, so `git am` at export time is the
      # only thing that ever exercises their headers, and an export happens
      # rarely enough for a defect to sit there for months.
      - name: Lint kernel patch headers (git am-ability, both series)
        run: scripts/lint-kernel-patches.sh

      # Same fail-fast reasoning as the patch lint: the kernel-only base
      # defconfig is a COPY of the main defconfig's toolchain/kernel stanzas,
      # and this asserts the copy has not drifted. The composite action runs it
      # for every kernel leg too; running it here as well catches the main-only
      # edit path (main defconfig changed, mirror forgotten) in seconds.
      - name: Lint kernel-defconfig lockstep
        run: scripts/check-kernel-defconfig-sync.sh

      # Download the kernel-variant artifacts and populate the extra-modules
      # overlay -- see .github/actions/merge-kernel-modules/action.yml for the
      # mechanism and why it must run before the build below.
      - name: Download + populate kernel-variant module overlay
        uses: ./.github/actions/merge-kernel-modules
        with:
          phase: download

      # Everything from "prepare the runner" to "linux.img + zImage_dtb exist".
      - name: Build the image
        uses: ./.github/actions/buildroot-build
        with:
          run-legal-info: "true"

      # Assert every kernel-variant module tree merged into the image -- see
      # .github/actions/merge-kernel-modules/action.yml for the silent-overlay-
      # miss guard this runs.
      - name: Assert kernel-variant module trees merged
        uses: ./.github/actions/merge-kernel-modules
        with:
          phase: verify

      # --- Build overview on the run's Summary page --------------------------
      # Surfaces the facts a reviewer usually opens the log to hunt for --
      # kernel/glibc versions, the image sizes, /MiSTer.version, package count --
      # as a table on the Summary tab. Runs right after the build so it renders
      # ABOVE the ABI/SONAME section that scripts/check-abi.sh appends later.
      # Best-effort: every fact is guarded and defaults to "n/a"; a missing one
      # never fails the build.
      - name: Build overview (job summary)
        run: |
          set -u
          # ALL module trees in the image, not just the boot kernel's: since the
          # extra-modules overlay this list is the proof the variant trees are
          # really inside linux.img.
          kvers=$(find output/target/usr/lib/modules -mindepth 1 -maxdepth 1 -printf '%f\n' 2>/dev/null | LC_ALL=C sort | paste -sd', ' - || true)
          glibc=$(strings output/target/lib/libc.so.6 2>/dev/null | sed -n 's/.*release version \([0-9][0-9.]*[0-9]\).*/\1/p' | head -1)
          misterver=$(cat output/target/MiSTer.version 2>/dev/null || true)
          sz() { [ -f "$1" ] && numfmt --to=iec-i --suffix=B "$(stat -c %s "$1")" || echo "n/a"; }
          img=$(sz output/images/linux.img)
          zimg=$(sz output/images/zImage_dtb)
          pkgs=$( [ -f output/legal-info/manifest.csv ] && echo $(( $(wc -l < output/legal-info/manifest.csv) - 1 )) || echo "n/a" )
          case "${GITHUB_EVENT_NAME:-}" in
            push|workflow_dispatch) art="uploaded (mister-images + SBOM, 14-day retention)";;
            pull_request)           art="skipped (PR validation run -- artifacts upload on push/dispatch)";;
            *)                      art="n/a";;
          esac
          {
            echo "## 🧱 Build image summary"
            echo ""
            echo "| Fact | Value |"
            echo "|---|---|"
            echo "| Trigger | \`${GITHUB_EVENT_NAME:-?}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:12}\` |"
            echo "| Kernel module trees in image | \`${kvers:-n/a}\` |"
            echo "| glibc | \`${glibc:-n/a}\` |"
            echo "| \`/MiSTer.version\` | \`${misterver:-n/a}\` |"
            echo "| linux.img | ${img} |"
            echo "| zImage_dtb | ${zimg} |"
            echo "| Packages (SBOM) | ${pkgs} |"
            echo "| Artifacts | ${art} |"
            echo ""
            echo "Reproducible build (\`BR2_REPRODUCIBLE\`, pinned \`SOURCE_DATE_EPOCH\`). "
            echo "Parity suite (\`ci-tests.sh\`) and the ABI/SONAME section below run against this image."
          } >> "$GITHUB_STEP_SUMMARY"

      # Parity suite (ci-tests.sh, P3.12) + ABI/SONAME checker (check-abi.sh,
      # P2.2) against the image just built -- see
      # .github/actions/verify-image/action.yml for the full rationale,
      # including the if: always() on the parity-results upload.
      # skip-qemu-system: "true" matches the CI_TESTS_SKIP_QEMU_SYSTEM=1 this
      # job always ran; pass "false" for the full six-boot QEMU suite.
      - name: Run parity suite + ABI/SONAME checker
        uses: ./.github/actions/verify-image
        with:
          skip-qemu-system: "true"

      # --- Upload build artifacts: on push and manual dispatch ---------------
      # NOT on pull_request runs, to avoid doubling artifact storage for every
      # PR revision on top of its eventual push to the target branch. A manual
      # workflow_dispatch DOES upload: fetching the built image is usually the
      # whole reason someone triggers a build by hand, and without this a manual
      # run finishes green but publishes nothing (which is exactly what happened
      # once workflow_dispatch was added as a trigger without updating this gate).
      - name: Upload build artifacts
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mister-images-${{ github.sha }}
          path: |
            output/images/linux.img
            output/images/zImage_dtb
          if-no-files-found: error
          retention-days: 14

      # --- Upload SBOM / legal-info artifact (P4.2) --------------------------
      # WITHOUT sources/ and host-sources/. `make legal-info` copies every
      # package's upstream source TARBALL into those two directories -- the whole
      # target package set, plus gcc/glibc/binutils for the host. That made this
      # artifact 2109 MB, TWENTY-FOUR TIMES the size of the images it accompanies
      # (87 MB), uploaded on every single push.
      #
      # Those tarballs are the GPL "accompanying source" payload. They are needed
      # when we DISTRIBUTE the image (release.yml attaches them, sized and guarded
      # there) -- but a CI push distributes nothing, so there is no obligation to
      # carry them here, and nobody reviewing a push wants a 2 GB download.
      #
      # What remains is the part that is actually an SBOM and actually gets read:
      # manifest.csv (every package, version, license, upstream URL), the license
      # texts, buildroot.config, and the source hashes. ~4 MB.
      - name: Package legal-info for upload (SBOM, without the source tarballs)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          set -eu
          tar -czf legal-info.tar.gz \
            --exclude='legal-info/sources' \
            --exclude='legal-info/host-sources' \
            -C output legal-info
          echo "SBOM artifact: $(du -h legal-info.tar.gz | cut -f1) (source tarballs excluded -- see release.yml for those)"

      - name: Upload SBOM artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: legal-info-${{ github.sha }}
          path: legal-info.tar.gz
          if-no-files-found: error
          retention-days: 14

  # THE JOB TO MARK AS THE REQUIRED STATUS CHECK. Not `build` -- `build` is
  # skipped on doc-only changes, and branch protection does not count a skipped
  # check as a passing one, so requiring it directly would wedge exactly the
  # PRs the gate above is meant to make cheap.
  #
  # This job always runs (`if: always()`), so it always reports, and it turns
  # the upstream results into one honest answer:
  #
  #   job succeeded        -> pass   (it compiled, it worked)
  #   all skipped, no need -> pass   (docs only; nothing to compile -- the point)
  #   job failed           -> FAIL   (do not let a skipped-vs-failed confusion
  #                                   turn a broken build into a green check)
  #   job cancelled        -> FAIL   (a superseded run is not evidence)
  #   build skipped because
  #   build-kernel failed  -> FAIL, but NAMED as the needs-cascade: the kernel
  #                           leg is the root cause, build's "skipped" is not a
  #                           second, separate workflow bug
  #   gate itself sick     -> FAIL   (if we cannot tell whether a build was
  #                                   needed, we have not established one wasn't)
  #
  # `build-kernel` is DELIBERATELY gating (ADR 0021): its kernels ship as
  # first-class release assets AND their modules ride inside linux.img, so a PR
  # that breaks a kernel leg must not merge green. `needs` on the matrix job
  # aggregates all its legs, so one result covers however many variants the
  # matrix grows to.
  #
  # `needs.<job>.result` is used rather than `success()`/`failure()`, which
  # would fold "skipped" into the wrong bucket.
  status:
    name: Build status
    needs: [gate, build-kernel, build]
    if: always()
    runs-on: ubuntu-26.04
    steps:
      - name: Report
        env:
          GATE_RESULT: ${{ needs.gate.result }}
          KERNEL_RESULT: ${{ needs.build-kernel.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          BUILD_NEEDED: ${{ needs.gate.outputs.build_needed }}
        run: |
          set -euo pipefail
          echo "gate=$GATE_RESULT build-kernel=$KERNEL_RESULT build=$BUILD_RESULT build_needed=$BUILD_NEEDED"

          if [ "$GATE_RESULT" != "success" ]; then
            echo "::error::The gate job did not succeed ($GATE_RESULT), so whether a build was needed is unknown. Failing rather than assuming it wasn't."
            exit 1
          fi

          rc=0
          case "$KERNEL_RESULT" in
            success)
              echo "build-kernel: every kernel leg built and uploaded its module tree."
              ;;
            skipped)
              if [ "$BUILD_NEEDED" = "true" ]; then
                echo "::error::The gate asked for a build and build-kernel was skipped anyway. That is a workflow bug, not a docs change."
                rc=1
              else
                echo "build-kernel: documentation-only change, no build needed."
              fi
              ;;
            *)
              echo "::error::build-kernel $KERNEL_RESULT. (Expect build to show as skipped below -- that is this failure cascading through needs, not a second bug.)"
              rc=1
              ;;
          esac

          case "$BUILD_RESULT" in
            success)
              echo "build: built and checked."
              ;;
            skipped)
              if [ "$BUILD_NEEDED" != "true" ]; then
                echo "build: documentation-only change, no build needed."
              elif [ "$KERNEL_RESULT" != "success" ]; then
                echo "build: skipped because build-kernel did not succeed -- the needs-cascade, already failed above."
              else
                echo "::error::The gate asked for a build and build was skipped anyway. That is a workflow bug, not a docs change."
                rc=1
              fi
              ;;
            *)
              echo "::error::build $BUILD_RESULT."
              rc=1
              ;;
          esac
          exit "$rc"
