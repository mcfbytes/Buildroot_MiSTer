################################################################################
#
# fork-sync.yml — weekly backport queue for MiSTer-devel/Linux-Kernel_MiSTer.
#
# Fork drifts silently unless someone asks; nobody does without this job. See
# docs/ci.md#fork-sync-why.
#
# So: scripts/check-fork-sync.sh diffs docs/kernel-recon/fork-sync.conf (the last
# RECONCILED commit per fork branch) against the fork's live HEADs, and this opens an
# issue listing whatever has landed since. The queue becomes a fact rather than a memory.
#
# MiSTer-v6.18 commits MUST flow into linux-patches/ or linux-patches-upstream/ (see
# that dir's README) -- otherwise `make export` silently erases them. See
# docs/ci.md#fork-sync-v6-18.
#
# Cheap and read-only -- safe to run on a schedule. See docs/ci.md#fork-sync-cost.
#
# Update the existing issue in place -- do NOT open a new one per run (gets muted).
# See docs/ci.md#fork-sync-issue-queue.
#
################################################################################

name: Fork sync queue

on:
  schedule:
    # Mondays 06:00 UTC. Weekly is matched to how fast the fork actually moves (11
    # commits across 2026 so far) -- daily would just re-post the same list six more
    # times before anyone acts on it.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Only the issue write. No checkout of anything but this repo, no packages, no build.
permissions:
  contents: read
  issues: write

concurrency:
  group: fork-sync
  cancel-in-progress: false

jobs:
  check:
    name: Check fork for unreconciled commits
    runs-on: ubuntu-26.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Exit 1 (drift found) must NOT fail the job; exit 2 (real error) MUST. Call the
      # script exactly ONCE, with --markdown, for both the log and the issue body --
      # calling it twice previously let a `|| true` swallow a real failure. See
      # docs/ci.md#fork-sync-exit-codes.
      - name: Diff fork HEADs against the reconciled sync points
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          rc=0
          scripts/check-fork-sync.sh --markdown > body.md 2> err.txt || rc=$?

          case "$rc" in
            0) echo "drift=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "drift=true"  >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error title=fork-sync check failed::scripts/check-fork-sync.sh exited $rc"
              cat err.txt >&2
              exit "$rc"
              ;;
          esac

          # A body we would post must not be empty -- that is the failure mode the single
          # invocation is meant to close, so assert it rather than assume it.
          if [ ! -s body.md ]; then
            echo "::error title=fork-sync produced an empty report::exit was $rc but body.md is empty"
            exit 2
          fi

          cat body.md

      - name: Open or update the backport-queue issue
        env:
          GH_TOKEN: ${{ github.token }}
          DRIFT: ${{ steps.check.outputs.drift }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TITLE="Backport queue: unreconciled commits in Linux-Kernel_MiSTer"
          LABEL="fork-sync"

          # Label may not exist yet on a fresh repo; create it once, idempotently.
          gh label create "$LABEL" --repo "$REPO" --color 0E8A16 \
            --description "Upstream fork commits awaiting a disposition" 2>/dev/null || true

          # --limit 1: only the first match is used, and the default page of 30 is API
          # work we never look at.
          existing="$(gh issue list --repo "$REPO" --label "$LABEL" --state open \
            --limit 1 --json number --jq '.[0].number // empty')"

          if [ "$DRIFT" = "true" ]; then
            {
              cat body.md
              # shellcheck disable=SC2016 # literal backticks for GitHub-flavored-markdown
              # code formatting in the issue body, not command substitution -- must stay
              # single-quoted so they are NOT evaluated by the shell.
              printf '\n---\n<sub>Generated by `.github/workflows/fork-sync.yml` — '
              printf 'edited in place each run, so this is always the current queue. '
              printf 'Closes itself when everything has a disposition.</sub>\n'
            } > issue.md

            if [ -n "$existing" ]; then
              gh issue edit "$existing" --repo "$REPO" --body-file issue.md
              echo "::notice title=Backport queue updated::Issue #$existing refreshed."
            else
              # `gh issue create` has no --json/--jq; it prints the issue URL. Take the
              # number off the end rather than retrying the command -- a `||` fallback
              # around a create is how you end up filing two issues.
              url="$(gh issue create --repo "$REPO" --title "$TITLE" --label "$LABEL" \
                --body-file issue.md)"
              echo "::notice title=Backport queue opened::Issue ${url##*/} lists commits needing triage."
            fi
          elif [ -n "$existing" ]; then
            gh issue close "$existing" --repo "$REPO" \
              --comment "Everything on the watched fork branches now has a disposition in \`docs/patch-provenance.md\`, and \`docs/kernel-recon/fork-sync.conf\` has been advanced past it. Reopening automatically if the fork moves again."
            echo "::notice title=Backport queue empty::Closed issue #$existing."
          else
            echo "::notice title=Backport queue empty::Fork fully reconciled; nothing to do."
          fi
